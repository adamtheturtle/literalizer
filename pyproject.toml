[build-system]
build-backend = "setuptools.build_meta"
requires = [
  "setuptools",
]

[project]
name = "literalizer"
version = "0.0.1"
description = "Convert JSON data structures to native language literal syntax."
license = "MIT"
requires-python = ">=3.12"
classifiers = [
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
]

[tool.setuptools]
packages.find.where = [
  "src",
]
