---
fail_fast: true

ci:
  skip:
    - actionlint
    - check-manifest
    - deptry
    - doc8
    - docs
    - interrogate
    - interrogate-docs
    - linkcheck
    - mypy
    - mypy-docs
    - pydocstringformatter
    - pylint
    - pyproject-fmt-fix
    - pyrefly
    - pyrefly-docs
    - pyright
    - pyright-docs
    - pyright-verifytypes
    - pyroma
    - ruff-check-fix
    - ruff-check-fix-docs
    - ruff-format-fix
    - ruff-format-fix-docs
    - shellcheck
    - shellcheck-docs
    - shfmt
    - shfmt-docs
    - spelling
    - sphinx-lint
    - strict-kwargs-fix
    - ty
    - ty-docs
    - vulture
    - vulture-docs
    - yamlfix
    - zizmor

default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: meta
    hooks:
      - id: check-useless-excludes
        priority: 10
        stages: [pre-commit]
        groups: [fast]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        priority: 30
        stages: [pre-commit]
        groups: [fast]
      - id: check-case-conflict
        priority: 40
        stages: [pre-commit]
        groups: [fast]
      - id: check-executables-have-shebangs
        priority: 60
        stages: [pre-commit]
        groups: [fast]
      - id: check-merge-conflict
        priority: 20
        stages: [pre-commit]
        groups: [fast]
      - id: check-shebang-scripts-are-executable
        priority: 70
        stages: [pre-commit]
        groups: [fast]
      - id: check-symlinks
        priority: 50
        stages: [pre-commit]
        groups: [fast]
      - id: check-json
        priority: 90
        stages: [pre-commit]
        groups: [fast]
      - id: check-toml
        # Integration test fixtures use TOML v1.1 (multiline inline tables),
        # which tomllib (used by check-toml) does not support.
        exclude: ^tests/integration/cases/
        priority: 91
        stages: [pre-commit]
        groups: [fast]
      - id: check-vcs-permalinks
        priority: 80
        stages: [pre-commit]
        groups: [fast]
      - id: check-yaml
        priority: 92
        stages: [pre-commit]
        groups: [fast]
      - id: end-of-file-fixer
        priority: 100
        stages: [pre-commit]
        groups: [fast]
      - id: file-contents-sorter
        files: spelling_private_dict\.txt$
        priority: 110
        stages: [pre-commit]
        groups: [fast]
      - id: trailing-whitespace
        priority: 120
        stages: [pre-commit]
        groups: [fast]
  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      - id: rst-directive-colons
        priority: 410
        stages: [pre-commit]
        groups: [fast]
      - id: rst-inline-touching-normal
        priority: 420
        stages: [pre-commit]
        groups: [fast]
      - id: text-unicode-replacement-char
        priority: 430
        stages: [pre-commit]
        groups: [fast]
      - id: rst-backticks
        priority: 440
        stages: [pre-commit]
        groups: [fast]
  - repo: local
    hooks:
      - id: actionlint
        name: actionlint
        entry: uv run --extra=dev actionlint
        language: python
        pass_filenames: false
        types_or: [yaml]
        additional_dependencies: [&uv_version uv==0.11.7]
        priority: 500
        stages: [pre-commit]
        groups: [fast]

      - id: shellcheck
        name: shellcheck
        entry: uv run --extra=dev shellcheck --shell=bash
        language: python
        types_or: [shell]
        exclude: ^tests/integration/cases/
        additional_dependencies: [*uv_version]
        priority: 500
        stages: [pre-commit]
        groups: [fast]

      - id: shellcheck-docs
        name: shellcheck-docs
        entry: uv run --extra=dev doccmd --no-write-to-file --example-workers 0 --language=shell
          --language=console --command="shellcheck --shell=bash"
        language: python
        types_or: [markdown, rst]
        additional_dependencies: [*uv_version]
        priority: 500
        stages: [pre-commit]
        groups: [fast]

      - id: shfmt
        name: shfmt
        entry: uv run --extra=dev shfmt --write --space-redirects --indent=4
        language: python
        types_or: [shell]
        exclude: ^tests/integration/cases/
        additional_dependencies: [*uv_version]
        priority: 130
        stages: [pre-commit]
        groups: [fast]

      - id: shfmt-docs
        name: shfmt-docs
        entry: uv run --extra=dev doccmd --language=shell --language=console --skip-marker=shfmt
          --no-pad-file --command="shfmt --write --space-redirects --indent=4"
        language: python
        types_or: [markdown, rst]
        additional_dependencies: [*uv_version]
        priority: 140
        stages: [pre-commit]
        groups: [fast]

      - id: pydocstringformatter
        name: pydocstringformatter
        entry: uv run --extra=dev pydocstringformatter
        language: python
        types_or: [python]
        exclude: ^tests/integration/cases/
        additional_dependencies: [*uv_version]
        priority: 150
        stages: [pre-commit]
        groups: [fast]

      - id: mypy
        name: mypy
        stages: [pre-push]
        groups: [typecheck]
        priority: 520
        entry: uv run --extra=dev -m mypy --num-workers=4
        language: python
        types_or: [python, toml]
        pass_filenames: false
        additional_dependencies: [*uv_version]

      # We do not use --example-workers 0 due to https://github.com/python/mypy/issues/18283
      - id: mypy-docs
        name: mypy-docs
        stages: [pre-push]
        groups: [typecheck]
        priority: 540
        entry: uv run --extra=dev doccmd --no-write-to-file --language=python --command="mypy
          --num-workers=4"
        language: python
        types_or: [markdown, rst]
        additional_dependencies: [*uv_version]

      - id: check-manifest
        name: check-manifest
        stages: [pre-push]
        groups: [fast]
        priority: 520
        entry: uv run --extra=dev -m check_manifest
        language: python
        pass_filenames: false
        additional_dependencies: [*uv_version]

      - id: pyright
        name: pyright
        stages: [pre-push]
        groups: [typecheck]
        priority: 520
        entry: uv run --extra=dev -m pyright .
        language: python
        types_or: [python, toml]
        pass_filenames: false
        additional_dependencies: [*uv_version]

      - id: pyright-docs
        name: pyright-docs
        stages: [pre-push]
        groups: [typecheck]
        priority: 540
        entry: uv run --extra=dev doccmd --no-write-to-file --example-workers 0 --language=python
          --command="pyright"
        language: python
        types_or: [markdown, rst]
        additional_dependencies: [*uv_version]

      - id: pyright-verifytypes
        name: pyright-verifytypes
        stages: [pre-push]
        groups: [typecheck]
        priority: 530
        entry: uv run --extra=dev -m pyright --ignoreexternal --verifytypes literalizer
        language: python
        pass_filenames: false
        types_or: [python]
        additional_dependencies: [*uv_version]

      - id: ty
        name: ty
        stages: [pre-push]
        groups: [typecheck]
        priority: 520
        entry: uv run --extra=dev ty check
        language: python
        types_or: [python, toml]
        pass_filenames: false
        additional_dependencies: [*uv_version]

      - id: ty-docs
        name: ty-docs
        stages: [pre-push]
        groups: [typecheck]
        priority: 540
        entry: uv run --extra=dev doccmd --no-write-to-file --example-workers 0 --language=python
          --command="ty check"
        language: python
        types_or: [markdown, rst]
        additional_dependencies: [*uv_version]

      - id: pyrefly
        name: pyrefly
        stages: [pre-push]
        groups: [typecheck]
        priority: 520
        entry: uv run --extra=dev pyrefly check
        language: python
        types_or: [python, toml]
        pass_filenames: false
        additional_dependencies: [*uv_version]

      - id: pyrefly-docs
        name: pyrefly-docs
        stages: [pre-push]
        groups: [typecheck]
        priority: 540
        entry: uv run --extra=dev doccmd --no-write-to-file --example-workers 0 --language=python
          --command="pyrefly check"
        language: python
        types_or: [markdown, rst]
        additional_dependencies: [*uv_version]

      - id: vulture
        name: vulture
        entry: uv run --extra=dev -m vulture .
        language: python
        types_or: [python]
        pass_filenames: false
        additional_dependencies: [*uv_version]
        priority: 510
        stages: [pre-commit]
        groups: [fast]

      - id: vulture-docs
        name: vulture docs
        entry: uv run --extra=dev doccmd --no-write-to-file --example-workers 0 --language=python
          --command="vulture"
        language: python
        types_or: [markdown, rst]
        additional_dependencies: [*uv_version]
        priority: 510
        stages: [pre-commit]
        groups: [fast]

      - id: pyroma
        name: pyroma
        entry: uv run --extra=dev -m pyroma --min 10 .
        language: python
        pass_filenames: false
        types_or: [toml]
        additional_dependencies: [*uv_version]
        priority: 510
        stages: [pre-commit]
        groups: [fast]

      - id: deptry
        name: deptry
        entry: uv run --extra=dev -m deptry src/
        language: python
        pass_filenames: false
        additional_dependencies: [*uv_version]
        priority: 510
        stages: [pre-commit]
        groups: [fast]

      - id: pylint
        name: pylint
        entry: uv run --extra=dev -m pylint *.py src/ tests/ docs/
        language: python
        stages: [manual]
        groups: [pylint]
        priority: 600
        pass_filenames: false
        additional_dependencies: [*uv_version]

      - id: pylint-docs
        name: pylint-docs
        entry: uv run --extra=dev doccmd --no-write-to-file --example-workers 0 --language=python
          --command="pylint"
        language: python
        stages: [manual]
        groups: [pylint]
        priority: 605
        types_or: [markdown, rst]
        additional_dependencies: [*uv_version]

      - id: ruff-check-fix
        name: Ruff check fix
        entry: uv run --extra=dev -m ruff check --fix
        language: python
        types_or: [python]
        exclude: ^tests/integration/cases/
        additional_dependencies: [*uv_version]
        priority: 160
        stages: [pre-commit]
        groups: [fast]

      - id: ruff-check-fix-docs
        name: Ruff check fix docs
        entry: uv run --extra=dev doccmd --language=python --command="ruff check --fix"
        language: python
        types_or: [markdown, rst]
        additional_dependencies: [*uv_version]
        priority: 170
        stages: [pre-commit]
        groups: [fast]

      - id: ruff-format-fix
        name: Ruff format
        entry: uv run --extra=dev -m ruff format
        language: python
        types_or: [python]
        exclude: ^tests/integration/cases/
        additional_dependencies: [*uv_version]
        priority: 180
        stages: [pre-commit]
        groups: [fast]

      - id: ruff-format-fix-docs
        name: Ruff format docs
        entry: uv run --extra=dev doccmd --language=python --no-pad-file --command="ruff
          format"
        language: python
        types_or: [markdown, rst]
        additional_dependencies: [*uv_version]
        priority: 190
        stages: [pre-commit]
        groups: [fast]

      - id: strict-kwargs-fix
        name: strict-kwargs
        entry: uv run --extra=dev strict-kwargs check --fix --diff
        language: python
        types_or: [python]
        additional_dependencies: [*uv_version]
        stages: [pre-commit]
        groups: [fast]
        require_serial: true

      - id: doc8
        name: doc8
        entry: uv run --extra=dev -m doc8
        language: python
        types_or: [rst]
        additional_dependencies: [*uv_version]
        priority: 500
        stages: [pre-commit]
        groups: [fast]

      - id: interrogate
        name: interrogate
        entry: uv run --extra=dev -m interrogate
        language: python
        types_or: [python]
        exclude: ^tests/integration/cases/
        additional_dependencies: [*uv_version]
        priority: 510
        stages: [pre-commit]
        groups: [fast]

      - id: interrogate-docs
        name: interrogate docs
        entry: uv run --extra=dev doccmd --no-write-to-file --example-workers 0 --language=python
          --command="interrogate"
        language: python
        types_or: [markdown, rst]
        additional_dependencies: [*uv_version]
        priority: 510
        stages: [pre-commit]
        groups: [fast]

      - id: pyproject-fmt-fix
        name: pyproject-fmt
        entry: uv run --extra=dev pyproject-fmt
        language: python
        types_or: [toml]
        files: pyproject.toml
        additional_dependencies: [*uv_version]
        priority: 200
        stages: [pre-commit]
        groups: [fast]

      - id: linkcheck
        name: linkcheck
        entry: uv run --extra=dev sphinx-build -M linkcheck docs/source docs/build
          -W -d docs/build/.doctrees-linkcheck
        language: python
        types_or: [rst]
        stages: [manual]
        groups: [docs]
        priority: 610
        pass_filenames: false
        additional_dependencies: [*uv_version]

      - id: spelling
        name: spelling
        entry: uv run --extra=dev sphinx-build -M spelling docs/source docs/build
          -W -d docs/build/.doctrees-spelling
        language: python
        types_or: [rst]
        stages: [manual]
        groups: [docs]
        priority: 610
        pass_filenames: false
        additional_dependencies: [*uv_version]

      - id: docs
        name: Build Documentation
        entry: uv run --extra=dev sphinx-build -M html docs/source docs/build -W -d
          docs/build/.doctrees-html
        language: python
        stages: [manual]
        groups: [docs]
        priority: 610
        pass_filenames: false
        additional_dependencies: [*uv_version]

      - id: yamlfix
        name: yamlfix
        entry: uv run --extra=dev yamlfix
        language: python
        types_or: [yaml]
        exclude: ^tests/integration/cases/
        additional_dependencies: [*uv_version]
        priority: 210
        stages: [pre-commit]
        groups: [fast]

      - id: zizmor
        name: zizmor
        entry: uv run --extra=dev zizmor --strict-collection .github
        language: python
        pass_filenames: false
        types_or: [yaml]
        additional_dependencies: [*uv_version]
        priority: 500
        stages: [pre-commit]
        groups: [fast]

      - id: sphinx-lint
        name: sphinx-lint
        entry: uv run --extra=dev sphinx-lint --enable=all --disable=line-too-long
        language: python
        types_or: [rst]
        additional_dependencies: [*uv_version]
        priority: 500
        stages: [pre-commit]
        groups: [fast]
