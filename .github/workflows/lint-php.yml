---
name: Lint PHP

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-php:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/lint-lang
        with:
          lang_patterns: tests/integration/cases/**/*.php
          lint_command: xargs -0 php -l < /tmp/files-to-lint
