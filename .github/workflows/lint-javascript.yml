---
name: Lint JavaScript

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Check JavaScript syntax
        run: |-
          set -o pipefail
          find tests/integration/cases -name "*.js" -print0 | \
            while IFS= read -r -d '' f; do
              node --check "$f" || exit 1
            done
