---
name: Lint MATLAB

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-matlab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install Octave
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: octave
          version: 1.0
      # Octave is a practical CI substitute, but it accepts some
      # double-quoted backslash escapes (e.g. \") that MATLAB rejects.
      - name: Check MATLAB syntax (Octave-compatible files)
        run: |-
          set -o pipefail
          find tests/integration/cases -name "*.m" -print0 | \
            while IFS= read -r -d '' f; do
              if grep -q '""' "$f"; then
                echo "Skipping Octave parse check for MATLAB-escaped quotes in $f"
                continue
              fi
              octave --norc --no-gui "$f" || exit 1
            done
