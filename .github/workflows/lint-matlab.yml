---
name: Lint MATLAB

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-matlab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install Octave
        run: sudo apt-get install -y octave
      - name: Check MATLAB syntax
        run: |-
          set -o pipefail
          find tests/integration/cases -name "*.m" -print0 | \
            while IFS= read -r -d '' f; do
              octave --norc --no-gui "$f" || exit 1
            done
