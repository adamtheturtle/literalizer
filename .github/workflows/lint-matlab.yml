---
name: Lint MATLAB

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-matlab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Check for relevant changes
        id: changes
        env:
          BASE_REF: ${{ github.base_ref }}
          EVENT_NAME: ${{ github.event_name }}
        run: |-
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "should-lint=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changes=$(git diff --name-only "origin/${BASE_REF}...HEAD")
          if echo "$changes" | grep -qE '(^tests/integration/cases/|\.yml$|\.toml$)'; then
            echo "should-lint=true" >> "$GITHUB_OUTPUT"
          else
            echo "should-lint=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install Octave
        if: steps.changes.outputs.should-lint == 'true'
        run: sudo apt-get update && sudo apt-get install -y octave
      # Octave is a practical CI substitute, but it accepts some
      # double-quoted backslash escapes (e.g. \") that MATLAB rejects.
      - name: Check MATLAB syntax (Octave-compatible files)
        if: steps.changes.outputs.should-lint == 'true'
        run: |-
          set -o pipefail
          find tests/integration/cases -name "matlab*.m" -print0 | \
            while IFS= read -r -d '' f; do
              if grep -q '""' "$f"; then
                echo "Skipping Octave parse check for MATLAB-escaped quotes in $f"
                continue
              fi
              octave --norc --no-gui "$f" || exit 1
            done
