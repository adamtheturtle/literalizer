---
name: Lint MATLAB

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-matlab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/lint-lang
        with:
          lang_patterns: tests/integration/cases/**/Matlab*.m
          lint_command: |-
            sudo apt-get update && sudo apt-get install -y octave
            while IFS= read -r -d '' f; do
              if grep -q '""' "$f"; then
                echo "Skipping Octave parse check for MATLAB-escaped quotes in $f"
                continue
              fi
              if grep -qw 'datetime' "$f"; then
                echo "Skipping $f — uses datetime(), which Octave does not implement"
                continue
              fi
              octave --norc --no-gui "$f" || exit 1
            done < /tmp/files-to-lint
