---
name: Lint MATLAB

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-matlab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: tj-actions/changed-files@v46
        id: changes
        with:
          files_yaml: |
            config:
              - '**/*.yml'
              - '**/*.toml'
            lang:
              - 'tests/integration/cases/**/matlab*.m'
      - name: Find files to lint
        id: files
        if: github.event_name != 'pull_request' || steps.changes.outputs.config_any_changed
          == 'true' || steps.changes.outputs.lang_any_changed == 'true'
        env:
          CONFIG_CHANGED: ${{ steps.changes.outputs.config_any_changed }}
          LANG_FILES: ${{ steps.changes.outputs.lang_all_changed_files }}
        run: |-
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "$CONFIG_CHANGED" != "true" ]; then
            # shellcheck disable=SC2086
            printf '%s\0' $LANG_FILES
          else
            find tests/integration/cases -name "matlab*.m" -print0
          fi > /tmp/files-to-lint
      - name: Install Octave
        if: steps.files.outcome == 'success'
        run: sudo apt-get update && sudo apt-get install -y octave
      # Octave is a practical CI substitute, but it accepts some
      # double-quoted backslash escapes (e.g. \") that MATLAB rejects.
      - name: Check MATLAB syntax (Octave-compatible files)
        if: steps.files.outcome == 'success'
        run: |-
          while IFS= read -r -d '' f; do
            if grep -q '""' "$f"; then
              echo "Skipping Octave parse check for MATLAB-escaped quotes in $f"
              continue
            fi
            octave --norc --no-gui "$f" || exit 1
          done < /tmp/files-to-lint
