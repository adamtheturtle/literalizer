---
name: Lint Gleam

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-gleam:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/lint-lang
        id: lint-lang
        with:
          lang_patterns: tests/integration/cases/**/*.gleam
          extra_config_patterns: check_gleam_golden_syntax.py
      - name: Install Gleam
        if: steps.lint-lang.outputs.found == 'true'
        uses: erlef/setup-beam@v1
        with:
          gleam-version: latest
          otp-version: 27
      - name: Install uv
        if: steps.lint-lang.outputs.found == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      - name: Check Gleam compiles
        if: steps.lint-lang.outputs.found == 'true'
        run: xargs -0 uv run --no-project python check_gleam_golden_syntax.py < /tmp/files-to-lint
