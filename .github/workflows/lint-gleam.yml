---
name: Lint Gleam

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-gleam:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.gleam
          extra_config_patterns: check_gleam_golden_syntax.py
      - name: Install Gleam
        if: steps.find-files.outputs.found == 'true'
        uses: erlef/setup-beam@v1
        with:
          gleam-version: latest
          otp-version: 27
      - name: Install uv
        if: steps.find-files.outputs.found == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      - name: Check Gleam compiles
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 uv run --no-project python check_gleam_golden_syntax.py < /tmp/files-to-lint
