---
name: Lint Objective-C

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-objective-c:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/objective_c*.m
          exclude_dirs: |
            tests/integration/cases/comment_scalar
            tests/integration/cases/comment_scalar_document_markers
            tests/integration/cases/comment_scalar_only_comments
      - name: Check Objective-C syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            clang -fsyntax-only "$f" || exit 1
          done < /tmp/files-to-lint
