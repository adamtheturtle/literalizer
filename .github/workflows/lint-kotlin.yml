---
name: Lint Kotlin

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-kotlin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.kts
          exclude_dirs: |
            tests/integration/cases/comment_scalar
            tests/integration/cases/comment_scalar_document_markers
            tests/integration/cases/comment_scalar_only_comments
      - name: Install Kotlin
        if: steps.find-files.outputs.found == 'true'
        uses: fwilhe2/setup-kotlin@v1
      - name: Check Kotlin syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          xargs -0 -P "$(nproc)" -n 1 kotlinc -script < /tmp/files-to-lint
