---
name: Lint Kotlin

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-kotlin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |-
            relevant:
              - 'tests/integration/cases/**'
              - '**/*.yml'
              - '**/*.toml'
      - name: Install Kotlin
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant
          == 'true'
        uses: fwilhe2/setup-kotlin@v1
      - name: Check Kotlin syntax
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant
          == 'true'
        run: |-
          set -o pipefail
          find tests/integration/cases -name "*.kts" -print0 | \
            xargs -0 -P "$(nproc)" -n 1 kotlinc -script
