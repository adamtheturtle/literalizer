---
name: Lint Lua

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-lua:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install Lua
        uses: leafo/gh-actions-lua@v12
        with:
          luaVersion: '5.4'
      - name: Check Lua syntax
        run: find tests/integration/cases -name "*.lua" -exec luac -p {} +
