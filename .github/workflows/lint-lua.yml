---
name: Lint Lua

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-lua:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.lua
          exclude_dirs: |
            tests/integration/cases/comment_scalar
            tests/integration/cases/comment_scalar_document_markers
            tests/integration/cases/comment_scalar_only_comments
      - name: Install Lua
        if: steps.find-files.outputs.found == 'true'
        uses: leafo/gh-actions-lua@v12
        with:
          luaVersion: '5.4'
      - name: Check Lua syntax
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 luac -p < /tmp/files-to-lint
