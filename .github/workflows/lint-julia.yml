---
name: Lint Julia

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-julia:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |-
            relevant:
              - 'tests/integration/cases/**'
              - '**/*.yml'
              - '**/*.toml'
      - name: Install Julia
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant
          == 'true'
        uses: julia-actions/setup-julia@v2
      - name: Check Julia syntax
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant
          == 'true'
        run: |-
          set -o pipefail
          find tests/integration/cases -name "*.jl" -print0 | \
            while IFS= read -r -d '' f; do
              julia --startup-file=no -e 'Meta.parseall(read(ARGS[1], String))' -- "$f" || exit 1
            done
