---
name: Lint Julia

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-julia:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/lint-lang
        id: lint-lang
        with:
          lang_patterns: tests/integration/cases/**/*.jl
      - name: Install Julia
        if: steps.lint-lang.outputs.found == 'true'
        uses: julia-actions/setup-julia@v2
      - name: Check Julia syntax
        if: steps.lint-lang.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            julia --startup-file=no -e 'Meta.parseall(read(ARGS[1], String))' -- "$f" || exit 1
          done < /tmp/files-to-lint
