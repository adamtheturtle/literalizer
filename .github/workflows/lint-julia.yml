---
name: Lint Julia

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-julia:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.jl
          find_command: find tests/integration/cases -name "*.jl" -print0
      - name: Install Julia
        if: steps.find-files.outputs.found == 'true'
        uses: julia-actions/setup-julia@v2
      - name: Check Julia syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            julia --startup-file=no -e 'Meta.parseall(read(ARGS[1], String))' -- "$f" || exit 1
          done < /tmp/files-to-lint
