---
name: Lint JSON5

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-json5:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/lint-lang
        with:
          lang_patterns: tests/integration/cases/**/*.json5
          lint_command: |-
            npm install -g json5
            while IFS= read -r -d '' f; do
              json5 "$f" > /dev/null || exit 1
            done < /tmp/files-to-lint
