---
name: Lint Elixir

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-elixir:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/lint-lang
        id: lint-lang
        with:
          lang_patterns: tests/integration/cases/**/*.ex
      - name: Install Elixir
        if: steps.lint-lang.outputs.found == 'true'
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18'
          otp-version: '27'
      - name: Check Elixir syntax
        if: steps.lint-lang.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            tmpdir=$(mktemp -d)
            cp "$f" "$tmpdir/check.ex"
            (cd "$tmpdir" && elixirc check.ex) || exit 1
          done < /tmp/files-to-lint
