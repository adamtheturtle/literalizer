---
name: Lint R

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-r:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.R
          find_command: find tests/integration/cases -name "*.R" -print0
      - name: Install R
        if: steps.find-files.outputs.found == 'true'
        uses: r-lib/actions/setup-r@v2
        with:
          windows-path-include-rtools: false
      - name: Check R syntax
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 Rscript -e 'for (f in commandArgs(trailingOnly=TRUE)) parse(file=f)'
          < /tmp/files-to-lint
