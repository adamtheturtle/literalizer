---
name: Lint Dart

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-dart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: tj-actions/changed-files@v46
        id: changes
        with:
          files_yaml: |
            config:
              - '**/*.yml'
              - '**/*.toml'
            lang:
              - 'tests/integration/cases/**/*.dart'
      - name: Find files to lint
        id: files
        if: github.event_name != 'pull_request' || steps.changes.outputs.config_any_changed
          == 'true' || steps.changes.outputs.lang_any_modified == 'true'
        env:
          CONFIG_CHANGED: ${{ steps.changes.outputs.config_any_changed }}
          LANG_FILES: ${{ steps.changes.outputs.lang_all_modified_files }}
        run: |-
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "$CONFIG_CHANGED" != "true" ]; then
            # shellcheck disable=SC2086
            printf '%s\0' $LANG_FILES
          else
            find tests/integration/cases -name "*.dart" -print0
          fi > /tmp/files-to-lint
      - name: Install Dart
        if: steps.files.outcome == 'success'
        uses: dart-lang/setup-dart@v1
      - name: Check Dart syntax
        if: steps.files.outcome == 'success'
        run: |-
          while IFS= read -r -d '' f; do
            tmpdir=$(mktemp -d)
            printf 'name: check\nenvironment:\n  sdk: ^3.0.0\n' > "$tmpdir/pubspec.yaml"
            cp "$f" "$tmpdir/check.dart"
            dart analyze --fatal-infos "$tmpdir/check.dart" || exit 1
          done < /tmp/files-to-lint
