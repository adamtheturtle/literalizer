---
name: Lint YAML

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Check YAML syntax
        run: >-
          shopt -s extglob &&
          uvx yamllint --strict
          -d '{extends: default, rules: {line-length: disable, colons: disable,
          comments-indentation: disable, indentation: disable}}'
          tests/integration/cases/*/!(input).yaml
