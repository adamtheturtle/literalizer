---
name: Lint YAML

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Check YAML syntax
        run: >-
          uvx yamllint --strict
          -d '{extends: default, rules: {document-start: disable, truthy: disable,
          line-length: disable, comments-indentation: disable, indentation: {indent-sequences:
          whatever}}}'
          tests/integration/cases/*/yaml.yaml
          tests/integration/cases/*/yaml_combined.yaml
          tests/integration/cases/*/yaml_varname.yaml
