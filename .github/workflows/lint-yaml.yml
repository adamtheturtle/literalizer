---
name: Lint YAML

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: tj-actions/changed-files@v46
        id: changes
        with:
          files_yaml: |
            config:
              - '**/*.yml'
              - '**/*.toml'
            lang:
              - 'tests/integration/cases/**/*.yaml'
              - '!tests/integration/cases/**/input.yaml'
      - name: Find files to lint
        id: files
        if: github.event_name != 'pull_request' || steps.changes.outputs.config_any_changed
          == 'true' || steps.changes.outputs.lang_any_modified == 'true'
        env:
          CONFIG_CHANGED: ${{ steps.changes.outputs.config_any_changed }}
          LANG_FILES: ${{ steps.changes.outputs.lang_all_modified_files }}
        run: |-
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "$CONFIG_CHANGED" != "true" ]; then
            # shellcheck disable=SC2086
            printf '%s\0' $LANG_FILES
          else
            find tests/integration/cases -name "*.yaml" ! -name "input.yaml" -print0
          fi > /tmp/files-to-lint
          if [ -s /tmp/files-to-lint ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Install uv
        if: steps.files.outputs.found == 'true'
        uses: astral-sh/setup-uv@v7
      - name: Check YAML syntax
        if: steps.files.outputs.found == 'true'
        run: |-
          xargs -0 uvx yamllint --strict -d '{extends: default, rules: {document-start: disable, line-length: disable}}' -- < /tmp/files-to-lint
