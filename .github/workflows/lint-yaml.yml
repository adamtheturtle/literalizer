---
name: Lint YAML

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: |
            tests/integration/cases/**/*.yaml
            !tests/integration/cases/**/input.yaml
          find_command: find tests/integration/cases -name "*.yaml" ! -name "input.yaml"
            -print0
      - name: Install uv
        if: steps.find-files.outputs.found == 'true'
        uses: astral-sh/setup-uv@v7
      - name: Check YAML syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          xargs -0 uvx yamllint --strict -d '{extends: default, rules: {document-start: disable, line-length: disable}}' -- < /tmp/files-to-lint
