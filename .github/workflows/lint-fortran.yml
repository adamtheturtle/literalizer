---
name: Lint Fortran

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-fortran:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.f90
          exclude_dirs: |
            tests/integration/cases/comment_scalar
            tests/integration/cases/comment_scalar_document_markers
            tests/integration/cases/comment_scalar_only_comments
      - name: Install gfortran
        if: steps.find-files.outputs.found == 'true'
        run: sudo apt-get install -y gfortran
      - name: Check Fortran syntax
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 gfortran -std=f2008 -ffree-line-length-none -fsyntax-only <
          /tmp/files-to-lint
