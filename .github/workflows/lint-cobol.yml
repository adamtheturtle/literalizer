---
name: Lint COBOL

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-cobol:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/lint-lang
        with:
          lang_patterns: tests/integration/cases/**/*.cob
          lint_command: |-
            sudo apt-get install -y gnucobol
            while IFS= read -r -d '' f; do
              cobc -free -fsyntax-only "$f" || exit 1
            done < /tmp/files-to-lint
