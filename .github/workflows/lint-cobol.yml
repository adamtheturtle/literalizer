---
name: Lint COBOL

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-cobol:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.cob
          exclude_dirs: |
            tests/integration/cases/comment_scalar
            tests/integration/cases/comment_scalar_document_markers
            tests/integration/cases/comment_scalar_only_comments
      - name: Install GnuCOBOL
        if: steps.find-files.outputs.found == 'true'
        run: sudo apt-get install -y gnucobol
      - name: Check COBOL syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            cobc -free -fsyntax-only "$f" || exit 1
          done < /tmp/files-to-lint
