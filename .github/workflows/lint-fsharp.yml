---
name: Lint F#

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-fsharp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |-
            relevant:
              - 'tests/integration/cases/**'
              - '**/*.yml'
              - '**/*.toml'
      - name: Initialize .NET runtime
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant
          == 'true'
        run: |
          mkdir -p /tmp/.dotnet/shm
          dotnet --info
      - name: Check F# syntax
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant
          == 'true'
        run: |-
          set -o pipefail
          find tests/integration/cases \( -name "*.fs" -o -name "*.fsi" \) -print0 | \
            while IFS= read -r -d '' f; do
              tmpdir=$(mktemp -d)
              DOTNET_SKIP_FIRST_TIME_EXPERIENCE=1 DOTNET_NOLOGO=1 \
                TMPDIR="$tmpdir" HOME="$tmpdir" \
                dotnet fsi --nologo --exec "$f" || exit 1
            done
