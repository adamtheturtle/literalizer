---
name: Lint F#

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-fsharp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: |
            tests/integration/cases/**/*.fs
            tests/integration/cases/**/*.fsi
          exclude_dirs: |
            tests/integration/cases/comment_scalar
            tests/integration/cases/comment_scalar_document_markers
            tests/integration/cases/comment_scalar_only_comments
      - name: Initialize .NET runtime
        if: steps.find-files.outputs.found == 'true'
        run: |
          mkdir -p /tmp/.dotnet/shm
          dotnet --info
      - name: Check F# syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            tmpdir=$(mktemp -d)
            DOTNET_SKIP_FIRST_TIME_EXPERIENCE=1 DOTNET_NOLOGO=1 \
              TMPDIR="$tmpdir" HOME="$tmpdir" \
              dotnet fsi --nologo --exec "$f" || exit 1
          done < /tmp/files-to-lint
