---
name: Lint HCL

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-hcl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Check for relevant changes
        id: changes
        env:
          BASE_REF: ${{ github.base_ref }}
          EVENT_NAME: ${{ github.event_name }}
        run: |-
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "should-lint=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changes=$(git diff --name-only "origin/${BASE_REF}...HEAD")
          if echo "$changes" | grep -qE '(^tests/integration/cases/|\.yml$|\.toml$)'; then
            echo "should-lint=true" >> "$GITHUB_OUTPUT"
          else
            echo "should-lint=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install hcl2json
        if: steps.changes.outputs.should-lint == 'true'
        run: go install github.com/tmccombs/hcl2json@latest
      - name: Add Go bin to PATH
        if: steps.changes.outputs.should-lint == 'true'
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Check HCL syntax
        if: steps.changes.outputs.should-lint == 'true'
        run: |-
          set -o pipefail
          find tests/integration/cases -name "*.hcl" -print0 | \
            while IFS= read -r -d '' f; do
              hcl2json "$f" > /dev/null || exit 1
            done
