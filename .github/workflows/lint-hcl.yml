---
name: Lint HCL

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-hcl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.hcl
          exclude_dirs: |
            tests/integration/cases/comment_scalar
            tests/integration/cases/comment_scalar_document_markers
            tests/integration/cases/comment_scalar_only_comments
      - name: Install hcl2json
        if: steps.find-files.outputs.found == 'true'
        run: go install github.com/tmccombs/hcl2json@latest
      - name: Add Go bin to PATH
        if: steps.find-files.outputs.found == 'true'
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Check HCL syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            hcl2json "$f" > /dev/null || exit 1
          done < /tmp/files-to-lint
