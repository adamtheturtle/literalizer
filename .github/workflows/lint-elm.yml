---
name: Lint Elm

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-elm:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.elm
          extra_config_patterns: check_elm_golden_syntax.py
          find_command: find tests/integration/cases -name "*.elm" -print0
      - name: Install elm-format and elm
        if: steps.find-files.outputs.found == 'true'
        run: npm install -g elm-format elm
      - name: Install uv
        if: steps.find-files.outputs.found == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      - name: Check Elm formatting
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            elm-format --stdin < "$f" > /dev/null || exit 1
          done < /tmp/files-to-lint
      - name: Check Elm compiles
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 uv run --no-project python check_elm_golden_syntax.py < /tmp/files-to-lint
