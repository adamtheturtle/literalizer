---
name: Lint Elm

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-elm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: tj-actions/changed-files@v47
        id: changes
        with:
          files_yaml: |
            config:
              - '**/*.yml'
              - 'check_elm_golden_syntax.py'
            lang:
              - 'tests/integration/cases/**/*.elm'
      - name: Find files to lint
        id: files
        if: github.event_name != 'pull_request' || steps.changes.outputs.config_any_changed
          == 'true' || steps.changes.outputs.lang_any_modified == 'true'
        env:
          CONFIG_CHANGED: ${{ steps.changes.outputs.config_any_changed }}
          LANG_FILES: ${{ steps.changes.outputs.lang_all_modified_files }}
        run: |-
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "$CONFIG_CHANGED" != "true" ]; then
            # shellcheck disable=SC2086
            for f in $LANG_FILES; do [ -f "$f" ] && printf '%s\0' "$f"; done
          else
            find tests/integration/cases -name "*.elm" -print0
          fi > /tmp/files-to-lint
          if [ -s /tmp/files-to-lint ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Install elm-format and elm
        if: steps.files.outputs.found == 'true'
        run: npm install -g elm-format elm
      - name: Install uv
        if: steps.files.outputs.found == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      - name: Check Elm formatting
        if: steps.files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            elm-format --stdin < "$f" > /dev/null || exit 1
          done < /tmp/files-to-lint
      - name: Check Elm compiles
        if: steps.files.outputs.found == 'true'
        run: xargs -0 uv run --no-project python check_elm_golden_syntax.py < /tmp/files-to-lint
