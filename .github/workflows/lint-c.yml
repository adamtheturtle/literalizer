---
name: Lint C

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-c:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Check C syntax
        run: find tests/integration/cases -name "*.c" -exec clang -fsyntax-only -std=c11
          {} +
