---
name: Lint Ruby

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-ruby:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/lint-lang
        with:
          lang_patterns: tests/integration/cases/**/*.rb
          lint_command: |-
            while IFS= read -r -d '' f; do
              ruby -c "$f" || exit 1
            done < /tmp/files-to-lint
