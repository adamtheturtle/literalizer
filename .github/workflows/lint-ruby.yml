---
name: Lint Ruby

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-ruby:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Check Ruby syntax
        run: |-
          set -o pipefail
          find tests/integration/cases -name "*.rb" -print0 | \
            while IFS= read -r -d '' f; do
              ruby -c "$f" || exit 1
            done
