---
name: Lint VB.NET

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-vb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.vb
          extra_config_patterns: check_vb_golden_syntax.py
          exclude_dirs: |
            tests/integration/cases/comment_scalar
            tests/integration/cases/comment_scalar_document_markers
            tests/integration/cases/comment_scalar_only_comments
      - name: Initialize .NET runtime
        if: steps.find-files.outputs.found == 'true'
        run: |
          mkdir -p /tmp/.dotnet/shm
          dotnet --info
      - name: Install uv
        if: steps.find-files.outputs.found == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      - name: Check VB.NET syntax
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 uv run --no-project python check_vb_golden_syntax.py < /tmp/files-to-lint
