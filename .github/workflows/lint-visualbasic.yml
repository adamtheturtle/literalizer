---
name: Lint VB.NET

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-vb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: tj-actions/changed-files@v47
        id: changes
        with:
          files_yaml: |
            config:
              - '**/*.yml'
              - 'check_vb_golden_syntax.py'
            lang:
              - 'tests/integration/cases/**/*.vb'
      - name: Find files to lint
        id: files
        if: github.event_name != 'pull_request' || steps.changes.outputs.config_any_changed
          == 'true' || steps.changes.outputs.lang_any_modified == 'true'
        env:
          CONFIG_CHANGED: ${{ steps.changes.outputs.config_any_changed }}
          LANG_FILES: ${{ steps.changes.outputs.lang_all_modified_files }}
        run: |-
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "$CONFIG_CHANGED" != "true" ]; then
            # shellcheck disable=SC2086
            for f in $LANG_FILES; do [ -f "$f" ] && printf '%s\0' "$f"; done
          else
            find tests/integration/cases -name "*.vb" -print0
          fi > /tmp/files-to-lint
          if [ -s /tmp/files-to-lint ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Initialize .NET runtime
        if: steps.files.outputs.found == 'true'
        run: |
          mkdir -p /tmp/.dotnet/shm
          dotnet --info
      - name: Install uv
        if: steps.files.outputs.found == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      - name: Check VB.NET syntax
        if: steps.files.outputs.found == 'true'
        run: xargs -0 uv run --no-project python check_vb_golden_syntax.py < /tmp/files-to-lint
