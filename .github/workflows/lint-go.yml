---
name: Lint Go

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.go
          exclude_dirs: |
            tests/integration/cases/comment_scalar
            tests/integration/cases/comment_scalar_document_markers
            tests/integration/cases/comment_scalar_only_comments
      - name: Check Go syntax
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 gofmt -e < /tmp/files-to-lint
      - name: Check Go compilation
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 -n1 go vet < /tmp/files-to-lint
