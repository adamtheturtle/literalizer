---
name: Lint Go

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Check Go syntax
        run: find tests/integration/cases -name "*.go" -exec gofmt -e {} +
