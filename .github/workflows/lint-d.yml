---
name: Lint D

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-d:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |-
            relevant:
              - 'tests/integration/cases/**'
              - '**/*.yml'
              - '**/*.toml'
      - name: Install DMD
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant
          == 'true'
        uses: dlang-community/setup-dlang@v2
        with:
          compiler: dmd-latest
      - name: Check D syntax
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant
          == 'true'
        run: |-
          set -o pipefail
          find tests/integration/cases -name "*.d" -print0 | \
            while IFS= read -r -d '' f; do
              dmd -o- -c "$f" || exit 1
            done
