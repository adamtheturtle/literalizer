---
name: Lint TOML

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-toml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Check for relevant changes
        id: changes
        env:
          BASE_REF: ${{ github.base_ref }}
          EVENT_NAME: ${{ github.event_name }}
        run: |-
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "should-lint=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changes=$(git diff --name-only "origin/${BASE_REF}...HEAD")
          if echo "$changes" | grep -qE '(^tests/integration/cases/|\.yml$|\.toml$)'; then
            echo "should-lint=true" >> "$GITHUB_OUTPUT"
          else
            echo "should-lint=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install taplo
        if: steps.changes.outputs.should-lint == 'true'
        run: |-
          curl -fsSL https://github.com/tamasfe/taplo/releases/latest/download/taplo-linux-x86_64.gz \
            | gzip -d - \
            | install -m 755 /dev/stdin /usr/local/bin/taplo
      - name: Check TOML syntax
        if: steps.changes.outputs.should-lint == 'true'
        run: |-
          set -o pipefail
          find tests/integration/cases -name "*.toml" -print0 | \
            while IFS= read -r -d '' f; do
              # taplo only validates TOML v1.0. Files that use TOML v1.1
              # multiline inline table syntax (a line ending with "{") are
              # intentionally skipped.
              if grep -qP '\{ *$' "$f"; then
                continue
              fi
              taplo lint "$f" || exit 1
            done
