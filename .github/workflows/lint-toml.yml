---
name: Lint TOML

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-toml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.toml
          extra_config_patterns: |
            pyproject.toml
            check_toml_syntax.py
          find_command: find tests/integration/cases -name "*.toml" -print0
      - uses: astral-sh/setup-uv@v7
        if: steps.find-files.outputs.found == 'true'
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      - name: Check TOML syntax
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 uv run --with 'tomli>=2.4.0' --no-project python check_toml_syntax.py
          < /tmp/files-to-lint
