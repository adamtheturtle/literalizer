---
name: Lint TOML

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-toml:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/lint-lang
        id: lint-lang
        with:
          lang_patterns: tests/integration/cases/**/*.toml
          extra_config_patterns: |
            pyproject.toml
            check_toml_syntax.py
      - uses: astral-sh/setup-uv@v7
        if: steps.lint-lang.outputs.found == 'true'
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      - name: Check TOML syntax
        if: steps.lint-lang.outputs.found == 'true'
        run: xargs -0 uv run --with 'tomli>=2.4.0' --no-project python check_toml_syntax.py
          < /tmp/files-to-lint
