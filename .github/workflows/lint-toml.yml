---
name: Lint TOML

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-toml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: tj-actions/changed-files@v47
        id: changes
        with:
          files_yaml: |
            config:
              - '**/*.yml'
              - 'pyproject.toml'
            lang:
              - 'tests/integration/cases/**/*.toml'
      - name: Find files to lint
        id: files
        if: github.event_name != 'pull_request' || steps.changes.outputs.config_any_changed
          == 'true' || steps.changes.outputs.lang_any_modified == 'true'
        env:
          CONFIG_CHANGED: ${{ steps.changes.outputs.config_any_changed }}
          LANG_FILES: ${{ steps.changes.outputs.lang_all_modified_files }}
        run: |-
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "$CONFIG_CHANGED" != "true" ]; then
            # shellcheck disable=SC2086
            printf '%s\0' $LANG_FILES
          else
            find tests/integration/cases -name "*.toml" -print0
          fi > /tmp/files-to-lint
          if [ -s /tmp/files-to-lint ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Install taplo
        if: steps.files.outputs.found == 'true'
        run: |-
          curl -fsSL https://github.com/tamasfe/taplo/releases/latest/download/taplo-linux-x86_64.gz \
            | gzip -d - \
            | install -m 755 /dev/stdin /usr/local/bin/taplo
      - name: Check TOML syntax
        if: steps.files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            # taplo only validates TOML v1.0. Files that use TOML v1.1
            # multiline inline table syntax (a line ending with "{") are
            # intentionally skipped.
            if grep -qP '\{ *$' "$f"; then
              continue
            fi
            taplo lint "$f" || exit 1
          done < /tmp/files-to-lint
