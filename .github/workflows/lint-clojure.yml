---
name: Lint Clojure

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-clojure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |-
            relevant:
              - 'tests/integration/cases/**'
              - '**/*.yml'
              - '**/*.toml'
      - name: Install clj-kondo
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant
          == 'true'
        uses: DeLaGuardo/setup-clojure@13
        with:
          clj-kondo: latest
      - name: Check Clojure syntax
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant
          == 'true'
        run: >-
          find tests/integration/cases -name "*.clj" -print0 |
          xargs -0 clj-kondo --lint
