---
name: Lint Clojure

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-clojure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Check for relevant changes
        id: changes
        env:
          BASE_REF: ${{ github.base_ref }}
          EVENT_NAME: ${{ github.event_name }}
        run: |-
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "should-lint=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changes=$(git diff --name-only "origin/${BASE_REF}...HEAD")
          if echo "$changes" | grep -qE '(^tests/integration/cases/|\.yml$|\.toml$)'; then
            echo "should-lint=true" >> "$GITHUB_OUTPUT"
          else
            echo "should-lint=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install clj-kondo
        if: steps.changes.outputs.should-lint == 'true'
        uses: DeLaGuardo/setup-clojure@13
        with:
          clj-kondo: latest
      - name: Check Clojure syntax
        if: steps.changes.outputs.should-lint == 'true'
        run: >-
          find tests/integration/cases -name "*.clj" -print0 |
          xargs -0 clj-kondo --lint
