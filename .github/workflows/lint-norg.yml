---
name: Lint Norg

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-norg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Check Norg structure
        run: |-
          set -o pipefail
          find tests/integration/cases -name "*.norg" -print0 | \
            while IFS= read -r -d '' f; do
              # Non-empty
              if [ ! -s "$f" ]; then
                echo "FAIL (empty): $f" >&2
                exit 1
              fi

              # Balanced square brackets and curly braces
              opens=$(tr -cd '[{' < "$f" | wc -c)
              closes=$(tr -cd ']}' < "$f" | wc -c)
              if [ "$opens" -ne "$closes" ]; then
                echo "FAIL (unbalanced delimiters): $f (opens=$opens closes=$closes)" >&2
                exit 1
              fi

              # Matched =name / =end macro pairs
              macro_opens=$(grep -cE '^=' "$f" | tr -d ' ')
              # Each macro has an =name and an =end, so count should be even
              if [ $((macro_opens % 2)) -ne 0 ]; then
                echo "FAIL (unmatched macro tags): $f" >&2
                exit 1
              fi
              ends=$(grep -c '^=end$' "$f" || true)
              expected_opens=$((ends * 2))
              if [ "$macro_opens" -ne "$expected_opens" ]; then
                echo "FAIL (=name/=end mismatch): $f" >&2
                exit 1
              fi
            done
