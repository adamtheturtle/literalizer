---
name: Lint Norg

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-norg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |-
            relevant:
              - 'tests/integration/cases/**'
              - '**/*.yml'
              - '**/*.toml'
      - name: Install tree-sitter CLI
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant
          == 'true'
        run: npm install tree-sitter-cli
      - name: Build tree-sitter-norg parser
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant
          == 'true'
        run: |-
          git clone --depth=1 https://github.com/nvim-neorg/tree-sitter-norg.git /tmp/tree-sitter-norg
          cc -shared -fPIC -o /tmp/norg.so \
            -I /tmp/tree-sitter-norg/src \
            /tmp/tree-sitter-norg/src/parser.c \
            -x c++ /tmp/tree-sitter-norg/src/scanner.cc \
            -lstdc++
      - name: Check Norg syntax
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant
          == 'true'
        run: >-
          find tests/integration/cases -name "*.norg" -print0 |
          xargs -0 npx tree-sitter parse
          --lib-path /tmp/norg.so
          --lang-name norg
          --quiet
