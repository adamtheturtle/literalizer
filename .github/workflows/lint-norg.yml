---
name: Lint Norg

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-norg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: tj-actions/changed-files@v46
        id: changes
        with:
          files_yaml: |
            config:
              - '**/*.yml'
            lang:
              - 'tests/integration/cases/**/*.norg'
      - name: Find files to lint
        id: files
        if: github.event_name != 'pull_request' || steps.changes.outputs.config_any_changed
          == 'true' || steps.changes.outputs.lang_any_modified == 'true'
        env:
          CONFIG_CHANGED: ${{ steps.changes.outputs.config_any_changed }}
          LANG_FILES: ${{ steps.changes.outputs.lang_all_modified_files }}
        run: |-
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "$CONFIG_CHANGED" != "true" ]; then
            # shellcheck disable=SC2086
            printf '%s\0' $LANG_FILES
          else
            find tests/integration/cases -name "*.norg" -print0
          fi > /tmp/files-to-lint
          if [ -s /tmp/files-to-lint ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Install tree-sitter CLI
        if: steps.files.outputs.found == 'true'
        run: npm install tree-sitter-cli
      - name: Build tree-sitter-norg parser
        if: steps.files.outputs.found == 'true'
        run: |-
          git clone --depth=1 https://github.com/nvim-neorg/tree-sitter-norg.git /tmp/tree-sitter-norg
          cc -shared -fPIC -o /tmp/norg.so \
            -I /tmp/tree-sitter-norg/src \
            /tmp/tree-sitter-norg/src/parser.c \
            -x c++ /tmp/tree-sitter-norg/src/scanner.cc \
            -lstdc++
      - name: Check Norg syntax
        if: steps.files.outputs.found == 'true'
        run: xargs -0 npx tree-sitter parse --lib-path /tmp/norg.so --lang-name norg
          --quiet < /tmp/files-to-lint
