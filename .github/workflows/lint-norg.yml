---
name: Lint Norg

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-norg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Check for relevant changes
        id: changes
        env:
          BASE_REF: ${{ github.base_ref }}
          EVENT_NAME: ${{ github.event_name }}
        run: |-
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "should-lint=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changes=$(git diff --name-only "origin/${BASE_REF}...HEAD")
          if echo "$changes" | grep -qE '(^tests/integration/cases/|\.yml$|\.toml$)'; then
            echo "should-lint=true" >> "$GITHUB_OUTPUT"
          else
            echo "should-lint=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install tree-sitter CLI
        if: steps.changes.outputs.should-lint == 'true'
        run: npm install tree-sitter-cli
      - name: Build tree-sitter-norg parser
        if: steps.changes.outputs.should-lint == 'true'
        run: |-
          git clone --depth=1 https://github.com/nvim-neorg/tree-sitter-norg.git /tmp/tree-sitter-norg
          cc -shared -fPIC -o /tmp/norg.so \
            -I /tmp/tree-sitter-norg/src \
            /tmp/tree-sitter-norg/src/parser.c \
            -x c++ /tmp/tree-sitter-norg/src/scanner.cc \
            -lstdc++
      - name: Check Norg syntax
        if: steps.changes.outputs.should-lint == 'true'
        run: >-
          find tests/integration/cases -name "*.norg" -print0 |
          xargs -0 npx tree-sitter parse
          --lib-path /tmp/norg.so
          --lang-name norg
          --quiet
