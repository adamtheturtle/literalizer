---
name: Lint Haskell

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-haskell:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.hs
          find_command: find tests/integration/cases -name "*.hs" -print0
      - uses: haskell-actions/setup@v2
        if: steps.find-files.outputs.found == 'true'
        with:
          ghc-version: latest
      - name: Check Haskell syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          tmpdir=$(mktemp -d)
          while IFS= read -r -d '' f; do
            ghc -fno-code -outputdir "$tmpdir" "$f" || exit 1
          done < /tmp/files-to-lint
