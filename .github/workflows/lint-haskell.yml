---
name: Lint Haskell

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-haskell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Check for relevant changes
        id: changes
        env:
          BASE_REF: ${{ github.base_ref }}
          EVENT_NAME: ${{ github.event_name }}
        run: |-
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "should-lint=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changes=$(git diff --name-only "origin/${BASE_REF}...HEAD")
          if echo "$changes" | grep -qE '(^tests/integration/cases/|\.yml$|\.toml$)'; then
            echo "should-lint=true" >> "$GITHUB_OUTPUT"
          else
            echo "should-lint=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: haskell-actions/setup@v2
        if: steps.changes.outputs.should-lint == 'true'
        with:
          ghc-version: latest
      - name: Check Haskell syntax
        if: steps.changes.outputs.should-lint == 'true'
        run: |-
          tmpdir=$(mktemp -d)
          set -o pipefail
          find tests/integration/cases -name "*.hs" -print0 | \
            while IFS= read -r -d '' f; do
              ghc -fno-code -outputdir "$tmpdir" "$f" || exit 1
            done
