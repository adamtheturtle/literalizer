---
name: Lint Haskell

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-haskell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |-
            relevant:
              - 'tests/integration/cases/**'
              - '**/*.yml'
              - '**/*.toml'
      - uses: haskell-actions/setup@v2
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant
          == 'true'
        with:
          ghc-version: latest
      - name: Check Haskell syntax
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant
          == 'true'
        run: |-
          tmpdir=$(mktemp -d)
          set -o pipefail
          find tests/integration/cases -name "*.hs" \
            -not -name "*_date_haskell.hs" \
            -not -name "*_datetime_haskell.hs" \
            -print0 | \
            while IFS= read -r -d '' f; do
              ghc -fno-code -outputdir "$tmpdir" "$f" || exit 1
            done
