---
name: Lint Haskell

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-haskell:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/lint-lang
        id: lint-lang
        with:
          lang_patterns: tests/integration/cases/**/*.hs
      - uses: haskell-actions/setup@v2
        if: steps.lint-lang.outputs.found == 'true'
        with:
          ghc-version: latest
      - name: Check Haskell syntax
        if: steps.lint-lang.outputs.found == 'true'
        run: |-
          tmpdir=$(mktemp -d)
          while IFS= read -r -d '' f; do
            ghc -fno-code -outputdir "$tmpdir" "$f" || exit 1
          done < /tmp/files-to-lint
