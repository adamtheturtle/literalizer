---
name: Lint Racket

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-racket:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/lint-lang
        with:
          lang_patterns: tests/integration/cases/**/*.rkt
          lint_command: |-
            sudo apt-get install -y racket
            xargs -0 raco make < /tmp/files-to-lint
