---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: 0 1 * * *

permissions: {}

jobs:
  build:
    strategy:
      matrix:
        python-version: ['3.12', '3.13', '3.14']
        platform: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        id: setup-uv
        continue-on-error: true
        uses: astral-sh/setup-uv@v7
        with:
          # Pin uv because otherwise setup-uv looks up the latest
          # version, and that lookup sometimes fails.
          version: 0.11.7
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Install uv with pip fallback
        if: steps.setup-uv.outcome == 'failure'
        run: |
          python -m pip install uv==0.11.7
          python -c "import os, sysconfig; open(os.environ['GITHUB_PATH'], 'a', encoding='utf-8').write(sysconfig.get_path('scripts') + '\n')"

      - name: Run tests
        run: |
          uv run --extra=dev pytest -s -vvv -n auto --cov-fail-under 100 --cov=src/ --cov=tests --ignore=tests/benchmarks .
        env:
          UV_PYTHON: ${{ matrix.python-version }}

  benchmarks:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install uv
        id: setup-uv
        continue-on-error: true
        uses: astral-sh/setup-uv@v7
        with:
          # Pin uv because otherwise setup-uv looks up the latest
          # version, and that lookup sometimes fails.
          version: 0.11.7
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Install uv with pip fallback
        if: steps.setup-uv.outcome == 'failure'
        run: |
          python -m pip install uv==0.11.7
          python -c "import os, sysconfig; open(os.environ['GITHUB_PATH'], 'a', encoding='utf-8').write(sysconfig.get_path('scripts') + '\n')"

      - name: Run benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          run: uv run --extra=dev pytest tests/benchmarks --codspeed

  completion-ci:
    needs: [build, benchmarks]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check matrix job status
        run: |-
          if ! ${{ needs.build.result == 'success' && needs.benchmarks.result == 'success' }}; then
            echo "One or more matrix jobs failed"
            exit 1
          fi
