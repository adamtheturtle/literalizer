---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: 0 1 * * *

permissions: {}

# We often have a long CI queue, so cancel superseded runs for a PR as soon
# as a new commit is pushed. Non-PR runs (push/schedule on main) fall back to
# the unique run ID so they never cancel each other.
concurrency:
  group: ci-pr-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        python-version: ['3.12', '3.13', '3.14']
        platform: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Run tests
        run: |
          uv run --extra=dev pytest -s -vvv --cov-fail-under 100 --cov=src/ --cov=tests --ignore=tests/benchmarks .
        env:
          UV_PYTHON: ${{ matrix.python-version }}

  benchmarks:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Run benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          run: uv run --extra=benchmark pytest tests/benchmarks --codspeed -o addopts=

  completion-ci:
    needs: [build, benchmarks]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check matrix job status
        run: |-
          if ! ${{ needs.build.result == 'success' && needs.benchmarks.result == 'success' }}; then
            echo "One or more matrix jobs failed"
            exit 1
          fi
