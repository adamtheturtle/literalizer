---
name: Lint Nim

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-nim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.nim
          find_command: find tests/integration/cases -name "*.nim" -print0
      - name: Install Nim
        if: steps.find-files.outputs.found == 'true'
        uses: jiro4989/setup-nim-action@v2
      - name: Check Nim syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            tmpdir=$(mktemp -d)
            nim check --hints:off --nimcache:"$tmpdir" "$f" || exit 1
          done < /tmp/files-to-lint
