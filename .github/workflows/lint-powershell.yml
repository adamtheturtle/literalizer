---
name: Lint PowerShell

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-powershell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.ps1
          exclude_dirs: |
            tests/integration/cases/comment_scalar
            tests/integration/cases/comment_scalar_document_markers
            tests/integration/cases/comment_scalar_only_comments
      - name: Check PowerShell syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            pwsh -NoProfile -NonInteractive -Command \
              "\$null = [scriptblock]::Create((Get-Content -Raw '$f'))" || exit 1
          done < /tmp/files-to-lint
