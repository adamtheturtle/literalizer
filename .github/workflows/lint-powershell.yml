---
name: Lint PowerShell

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-powershell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: tj-actions/changed-files@v46
        id: changes
        with:
          files_yaml: |
            config:
              - '**/*.yml'
              - '**/*.toml'
            lang:
              - 'tests/integration/cases/**/*.ps1'
      - name: Find files to lint
        id: files
        if: github.event_name != 'pull_request' || steps.changes.outputs.config_any_changed
          == 'true' || steps.changes.outputs.lang_any_changed == 'true'
        env:
          CONFIG_CHANGED: ${{ steps.changes.outputs.config_any_changed }}
          LANG_FILES: ${{ steps.changes.outputs.lang_all_changed_files }}
        run: |-
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "$CONFIG_CHANGED" != "true" ]; then
            # shellcheck disable=SC2086
            printf '%s\0' $LANG_FILES
          else
            find tests/integration/cases -name "*.ps1" -print0
          fi > /tmp/files-to-lint
      - name: Check PowerShell syntax
        if: steps.files.outcome == 'success'
        run: |-
          while IFS= read -r -d '' f; do
            pwsh -NoProfile -NonInteractive -Command \
              "\$null = [scriptblock]::Create((Get-Content -Raw '$f'))" || exit 1
          done < /tmp/files-to-lint
