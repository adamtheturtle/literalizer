---
name: Lint Java

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.java
          exclude_dirs: |
            tests/integration/cases/comment_scalar
            tests/integration/cases/comment_scalar_document_markers
            tests/integration/cases/comment_scalar_only_comments
      - name: Check Java syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          tmpdir=$(mktemp -d)
          while IFS= read -r -d '' f; do
            javac -d "$tmpdir" "$f" || exit 1
          done < /tmp/files-to-lint
