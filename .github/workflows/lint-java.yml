---
name: Lint Java

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Check Java syntax
        run: |-
          tmpdir=$(mktemp -d)
          set -o pipefail
          find tests/integration/cases -name "*.java" -print0 | \
            while IFS= read -r -d '' f; do
              javac -d "$tmpdir" "$f" || exit 1
            done
