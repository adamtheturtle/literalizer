---
name: Lint Occam-pi

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-occam:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.occ
          extra_config_patterns: check_occam_golden_syntax.py
          exclude_dirs: |
            tests/integration/cases/comment_scalar
            tests/integration/cases/comment_scalar_document_markers
            tests/integration/cases/comment_scalar_only_comments
      - name: Install uv
        if: steps.find-files.outputs.found == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      - name: Check Occam-pi syntax
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 uv run --no-project python check_occam_golden_syntax.py < /tmp/files-to-lint
