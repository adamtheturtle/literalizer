---
name: Lint Occam-pi

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-occam:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: tj-actions/changed-files@v46
        id: changes
        with:
          files_yaml: |
            config:
              - '**/*.yml'
              - '**/*.toml'
              - 'check_occam_golden_syntax.py'
            lang:
              - 'tests/integration/cases/**/*.occ'
      - name: Find files to lint
        id: files
        if: github.event_name != 'pull_request' || steps.changes.outputs.config_any_changed
          == 'true' || steps.changes.outputs.lang_any_changed == 'true'
        env:
          CONFIG_CHANGED: ${{ steps.changes.outputs.config_any_changed }}
          LANG_FILES: ${{ steps.changes.outputs.lang_all_changed_files }}
        run: |-
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "$CONFIG_CHANGED" != "true" ]; then
            # shellcheck disable=SC2086
            printf '%s\0' $LANG_FILES
          else
            find tests/integration/cases -name "*.occ" -print0
          fi > /tmp/files-to-lint
      - name: Install uv
        if: steps.files.outcome == 'success'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      - name: Check Occam-pi syntax
        if: steps.files.outcome == 'success'
        run: xargs -0 uv run python check_occam_golden_syntax.py < /tmp/files-to-lint
