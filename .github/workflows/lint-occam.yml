---
name: Lint Occam-pi

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-occam:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Check Occam-pi syntax
        run: >-
          docker run --rm -v "$PWD:/work" omegahm/kroc
          sh -c '. /usr/local/kroc/bin/kroc-setup.sh &&
          find /work/tests/integration/cases -name "*.occ" |
          while read f; do tmpdir=$(mktemp -d) &&
          kroc -o "$tmpdir/check" "$f" || exit 1; done'
