---
name: Lint Bash

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-bash:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/lint-lang
        with:
          lang_patterns: tests/integration/cases/**/*.sh
          lint_command: xargs -0 bash -n < /tmp/files-to-lint
