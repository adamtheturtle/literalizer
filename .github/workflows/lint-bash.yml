---
name: Lint Bash

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-bash:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.sh
          exclude_dirs: |
            tests/integration/cases/comment_scalar
            tests/integration/cases/comment_scalar_document_markers
            tests/integration/cases/comment_scalar_only_comments
      - name: Check Bash syntax
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 bash -n < /tmp/files-to-lint
