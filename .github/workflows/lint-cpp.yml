---
name: Lint C++

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.cpp
          exclude_dirs: |
            tests/integration/cases/comment_scalar
            tests/integration/cases/comment_scalar_document_markers
            tests/integration/cases/comment_scalar_only_comments
      - name: Check C++ syntax
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 clang++ -fsyntax-only -std=c++20 < /tmp/files-to-lint
