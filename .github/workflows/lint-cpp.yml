---
name: Lint C++

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/lint-lang
        with:
          lang_patterns: tests/integration/cases/**/*.cpp
          lint_command: xargs -0 clang++ -fsyntax-only -std=c++20 < /tmp/files-to-lint
