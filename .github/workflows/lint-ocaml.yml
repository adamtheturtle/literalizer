---
name: Lint OCaml

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-ocaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/lint-lang
        with:
          lang_patterns: tests/integration/cases/**/*.ml
          lint_command: |-
            sudo apt-get install -y ocaml
            tmpdir=$(mktemp -d)
            while IFS= read -r -d '' f; do
              ocamlopt -c -o "$tmpdir/check.o" "$f" || exit 1
            done < /tmp/files-to-lint
