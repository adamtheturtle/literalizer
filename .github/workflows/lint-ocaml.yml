---
name: Lint OCaml

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-ocaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |-
            relevant:
              - 'tests/integration/cases/**'
              - '**/*.yml'
              - '**/*.toml'
      - name: Install OCaml
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant
          == 'true'
        run: sudo apt-get install -y ocaml
      - name: Check OCaml syntax
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant
          == 'true'
        run: |-
          tmpdir=$(mktemp -d)
          set -o pipefail
          find tests/integration/cases -name "*.ml" \
            -not -name "*_date_ocaml.ml" \
            -not -name "*_datetime_ocaml.ml" \
            -print0 | \
            while IFS= read -r -d '' f; do
              ocamlopt -c -o "$tmpdir/check.o" "$f" || exit 1
            done
