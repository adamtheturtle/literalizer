---
name: Lint Erlang

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-erlang:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/lint-lang
        id: lint-lang
        with:
          lang_patterns: tests/integration/cases/**/*.erl
      - name: Install Erlang
        if: steps.lint-lang.outputs.found == 'true'
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          install-rebar: false
          install-hex: false
      - name: Check Erlang syntax
        if: steps.lint-lang.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            tmpdir=$(mktemp -d)
            cp "$f" "$tmpdir/check.erl"
            (cd "$tmpdir" && erlc check.erl) || exit 1
          done < /tmp/files-to-lint
