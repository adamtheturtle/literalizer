---
name: Lint Erlang

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-erlang:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.erl
          find_command: find tests/integration/cases -name "*.erl" -print0
      - name: Install Erlang
        if: steps.find-files.outputs.found == 'true'
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          install-rebar: false
          install-hex: false
      - name: Check Erlang syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            tmpdir=$(mktemp -d)
            cp "$f" "$tmpdir/check.erl"
            (cd "$tmpdir" && erlc check.erl) || exit 1
          done < /tmp/files-to-lint
