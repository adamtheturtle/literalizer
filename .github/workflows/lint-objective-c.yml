---
name: Lint Objective-C

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-objective-c:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |-
            relevant:
              - 'tests/integration/cases/**'
              - '**/*.yml'
              - '**/*.toml'
      - name: Check Objective-C syntax
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant
          == 'true'
        run: |-
          set -o pipefail
          find tests/integration/cases -name "objective_c*.m" -print0 | \
            while IFS= read -r -d '' f; do
              clang -fsyntax-only "$f" || exit 1
            done
