---
name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: 0 1 * * *
  workflow_dispatch: {}

permissions: {}

jobs:
  build:
    strategy:
      matrix:
        python-version: ['3.13']
        platform: [ubuntu-latest, windows-latest]
        hook-stage: [pre-commit, pre-push, manual]

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18'
          otp-version: '27'
      - uses: coursier/setup-action@v1
        with:
          apps: scalac
      - name: Install Swift
        uses: SwiftyLab/setup-swift@v1
        with:
          cache: true
      - name: Install R
        uses: r-lib/actions/setup-r@v2
      - name: Install Dart
        uses: dart-lang/setup-dart@v1
      - name: Install Groovy
        uses: wtfjoke/setup-groovy@v2
        with:
          groovy-version: 4.x
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Initialize .NET runtime
        if: runner.os == 'Linux'
        run: |
          mkdir -p /tmp/.dotnet/shm
          dotnet --info

      - name: Lint
        shell: bash
        run: uv run --extra=dev prek run --all-files --hook-stage ${{ matrix.hook-stage }}
          --verbose
        env:
          UV_PYTHON: ${{ matrix.python-version }}
          SKIP: clojure-syntax-check

      - uses: pre-commit-ci/lite-action@v1.1.0
        if: always()

  completion-lint:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check matrix job status
        run: |-
          if ! ${{ needs.build.result == 'success' }}; then
            echo "One or more matrix jobs failed"
            exit 1
          fi
