  lint-crystal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.cr' -print0 > /tmp/files-to-lint
      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
      # Crystal derives the compiled binary name from the source file's
      # basename (e.g. Crystal.cr -> ~/.cache/crystal/crystal-run-Crystal.tmp).
      # Many fixtures share basenames, so parallel `crystal run` invocations
      # clobber each other's binaries. Give each invocation a private cache.
      - name: Run Crystal files
        run: |-
          cat > /tmp/run-crystal.sh <<'SCRIPT'
          tmpdir=$(mktemp -d)
          CRYSTAL_CACHE_DIR="$tmpdir" crystal run "$1"
          rc=$?
          rm -rf "$tmpdir"
          exit "$rc"
          SCRIPT
          xargs -0 -P "$(nproc)" -n1 bash /tmp/run-crystal.sh < /tmp/files-to-lint

  lint-matlab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name 'Matlab*.m' -print0 > /tmp/files-to-lint
      - name: Install Octave
        run: sudo apt-get update -qq && sudo apt-get install -y -qq octave
      # Octave is a practical CI substitute, but it does not support
      # every MATLAB builtin.  Skip files that use features Octave lacks:
      #  - datetime(): not yet implemented in Octave
      #  - ""-escaped quotes: Octave accepts some backslash escapes
      #    (e.g. \") that MATLAB rejects, so the check would be misleading
      - name: Check MATLAB syntax (Octave-compatible files)
        run: |-
          while IFS= read -r -d '' f; do
            if grep -q '""' "$f"; then
              echo "Skipping Octave parse check for MATLAB-escaped quotes in $f"
              continue
            fi
            if grep -qw 'datetime' "$f"; then
              echo "Skipping $f — uses datetime(), which Octave does not implement"
              continue
            fi
            octave --norc --no-gui "$f" || exit 1
          done < /tmp/files-to-lint

  lint-mojo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.mojo' -print0 > /tmp/files-to-lint
      - name: Install pixi
        uses: fabasoad/setup-mojo-action@v3
      - name: Install Mojo
        run: |-
          pixi init "$RUNNER_TEMP/mojo-env" \
            -c https://conda.modular.com/max \
            -c conda-forge
          pixi add --manifest-path "$RUNNER_TEMP/mojo-env/pixi.toml" mojo
          echo "MOJO_PIXI_MANIFEST=$RUNNER_TEMP/mojo-env/pixi.toml" >> "$GITHUB_ENV"
      # Mojo reserves ~3.6 GB of virtual address space per invocation
      # (upstream: modular/modular#6433). On the 7 GB GitHub runner the
      # kernel's default overcommit heuristic refuses the allocation and
      # Mojo crashes in libKGENCompilerRTShared.so before producing any
      # output. Allow overcommit and add a 4 GB swap file so the kernel
      # has enough headroom to accept the reservation — Mojo only
      # actually touches ~320 MB of it.
      - name: Expand memory headroom for Mojo
        # The GitHub runner already ships a /swapfile mounted as swap, so
        # add a second file at a fresh path instead of overwriting it.
        run: |-
          sudo sysctl -w vm.overcommit_memory=1
          sudo fallocate -l 4G /mnt/extra-swapfile
          sudo chmod 600 /mnt/extra-swapfile
          sudo mkswap /mnt/extra-swapfile
          sudo swapon /mnt/extra-swapfile
      # Even with the headroom above, Mojo occasionally still crashes
      # non-deterministically (tracked in  # 558). Retry each file a few
      # times so one crash does not block the rest.
      - name: Check Mojo syntax
        run: |-
          failed=0
          while IFS= read -r -d '' f; do
            ok=0
            for attempt in 1 2 3; do
              if pixi run --manifest-path "$MOJO_PIXI_MANIFEST" mojo run --Werror "$GITHUB_WORKSPACE/$f"; then
                ok=1
                break
              fi
              echo "::warning::Attempt $attempt failed for $f, retrying..."
              sleep 2
            done
            if [ "$ok" -eq 0 ]; then
              echo "::error::Failed after 3 attempts: $f"
              failed=1
            fi
          done < /tmp/files-to-lint
          exit "$failed"

  lint-nim:
    runs-on: ubuntu-latest
    # Promote every Nim warning to a CI failure. Nim's
    # ``--warningAsError`` rejects ``all:on`` and bare ``on``, so list
    # each warning name explicitly. The catalogue comes from
    # ``nim check --warnings:list`` — revisit when Nim is upgraded in
    # case new warnings have been added. Shared across both the syntax
    # check and the run step via a job-level env var.
    env:
      NIM_WARNING_FLAGS: >-
        --warningAsError:AboveMaxSizeSet:on
        --warningAsError:AmbiguousLink:on
        --warningAsError:AnyEnumConv:on
        --warningAsError:BareExcept:on
        --warningAsError:BrokenLink:on
        --warningAsError:CStringConv:on
        --warningAsError:CannotOpen:on
        --warningAsError:CannotOpenFile:on
        --warningAsError:CaseTransition:on
        --warningAsError:CastSizes:on
        --warningAsError:CommentXIgnored:on
        --warningAsError:ConfigDeprecated:on
        --warningAsError:CycleCreated:on
        --warningAsError:Deprecated:on
        --warningAsError:Destructor:on
        --warningAsError:DotLikeOps:on
        --warningAsError:EachIdentIsTuple:on
        --warningAsError:Effect:on
        --warningAsError:EnumConv:on
        --warningAsError:FieldXNotSupported:on
        --warningAsError:FileChanged:on
        --warningAsError:GcMem:on
        --warningAsError:GcUnsafe:on
        --warningAsError:GcUnsafe2:on
        --warningAsError:GlobalVarConstructorTemporary:on
        --warningAsError:HoleEnumConv:on
        --warningAsError:IgnoredSymbolInjection:on
        --warningAsError:ImplicitDefaultValue:on
        --warningAsError:ImplicitRangeConversion:on
        --warningAsError:ImplicitTemplateRedefinition:on
        --warningAsError:IndexCheck:on
        --warningAsError:InheritFromException:on
        --warningAsError:LanguageXNotSupported:on
        --warningAsError:LockLevel:on
        --warningAsError:LongLiterals:on
        --warningAsError:ObservableStores:on
        --warningAsError:OctalEscape:on
        --warningAsError:ProveField:on
        --warningAsError:ProveIndex:on
        --warningAsError:ProveInit:on
        --warningAsError:PtrToCstringConv:on
        --warningAsError:RedefinitionOfLabel:on
        --warningAsError:ResultShadowed:on
        --warningAsError:ResultUsed:on
        --warningAsError:SmallLshouldNotBeUsed:on
        --warningAsError:Spacing:on
        --warningAsError:StdPrefix:on
        --warningAsError:StmtListLambda:on
        --warningAsError:StrictNotNil:on
        --warningAsError:TypelessParam:on
        --warningAsError:Uninit:on
        --warningAsError:UnknownMagic:on
        --warningAsError:UnknownNotes:on
        --warningAsError:UnknownSubstitutionX:on
        --warningAsError:UnnamedBreak:on
        --warningAsError:UnreachableCode:on
        --warningAsError:UnreachableElse:on
        --warningAsError:UnsafeCode:on
        --warningAsError:UnsafeDefault:on
        --warningAsError:UnsafeSetLen:on
        --warningAsError:UnusedImport:on
        --warningAsError:UnusedImportdoc:on
        --warningAsError:UseBase:on
        --warningAsError:User:on
        --warningAsError:WriteToForeignHeap:on
        --warningAsError:XIsNeverRead:on
        --warningAsError:XmightNotBeenInit:on
        --warningAsError:warnRstStyle:on
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.nim' -print0 > /tmp/files-to-lint
      - name: Install Nim
        uses: jiro4989/setup-nim-action@v2
      - name: Check Nim syntax
        run: |-
          read -r -a warning_flags <<< "$NIM_WARNING_FLAGS"
          while IFS= read -r -d '' f; do
            tmpdir=$(mktemp -d)
            nim check --hints:off "${warning_flags[@]}" \
              --nimcache:"$tmpdir" "$f" || exit 1
          done < /tmp/files-to-lint
      - name: Run Nim files
        run: |-
          read -r -a warning_flags <<< "$NIM_WARNING_FLAGS"
          while IFS= read -r -d '' f; do
            tmpdir=$(mktemp -d)
            nim c -r --hints:off "${warning_flags[@]}" \
              --nimcache:"$tmpdir" "$f" || exit 1
          done < /tmp/files-to-lint

