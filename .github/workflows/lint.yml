---
name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: 0 1 * * *
  workflow_dispatch: {}

permissions: {}

# We often have a long CI queue, so cancel superseded runs for a PR as soon
# as a new commit is pushed. Non-PR runs (push/schedule on main) fall back to
# the unique run ID so they never cancel each other.
concurrency:
  group: lint-pr-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  pre-commit:
    strategy:
      matrix:
        python-version: ['3.12', '3.13', '3.14']
        platform: [ubuntu-latest, windows-latest]
        hook-stage: [pre-commit, pre-push, manual]
        # Windows is dropped from the heavy stages (pre-push, manual)
        # because the type checkers and pylint dominate wall time on
        # Windows runners and are platform-agnostic in practice. Re-add
        # Windows here once prek supports hook groups so we can shard
        # the heavy hooks across runners:
        # https://github.com/j178/prek/issues/1385
        exclude:
          - platform: windows-latest
            hook-stage: pre-push
          - platform: windows-latest
            hook-stage: manual

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Lint
        shell: bash
        run: uv run --extra=dev prek run --all-files --hook-stage ${{ matrix.hook-stage }}
          --verbose
        env:
          UV_PYTHON: ${{ matrix.python-version }}

      - uses: pre-commit-ci/lite-action@v1.1.0
        if: always()

  # Fixture languages whose lint is a handful of seconds — either the
  # toolchain is preinstalled on ubuntu-latest, or the install is quick
  # enough that splitting them into separate runners would spend more
  # time on runner startup than on linting.
  lint-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      # ``luaVersion: '5.4'`` matches ``Lua.language_version`` (``V5_4``)
      # in ``src/literalizer/languages/lua.py``; keep them in sync.
      - name: Install Lua
        uses: leafo/gh-actions-lua@v13
        with:
          luaVersion: '5.4'
      # ``luarocks`` is needed by the ``Lua roundtrip`` step below to
      # install the ``dkjson`` JSON library; Lua has no standard-library
      # JSON serializer.  Pinned to a recent ``leafo/gh-actions-luarocks``
      # release; the action picks the LuaRocks version compatible with
      # the Lua installed above.  See ``.github/scripts/run_lua_roundtrip.py``.
      - name: Install LuaRocks
        uses: leafo/gh-actions-luarocks@v5
      # ``dkjson`` is the pure-Lua JSON library used by
      # ``.github/scripts/run_lua_roundtrip.py``; pinned to a ``2.x``
      # release.  Installed into the per-job tree provisioned above so
      # ``require "dkjson"`` resolves under the ``Lua roundtrip`` step.
      - name: Install dkjson
        run: luarocks install dkjson 2.10-1
      # The pinned Nix ``2.34.7`` is in the Nix 2.x series, which is
      # ``>=`` the ``V2`` default of ``Nix.language_version`` in
      # ``src/literalizer/languages/nix.py``; keep them in sync. ``V2``
      # is a fixed language generation, so the pin is for build
      # reproducibility rather than to track a moving standard.
      # ``cachix/install-nix-action`` has no version input, so the
      # ``install_url`` release URL is the only mechanism for pinning
      # the Nix version.
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          install_url: https://releases.nixos.org/nix/nix-2.34.7/install
      # ``gforth`` is pinned to ``0.7.3+dfsg-9build4.1`` (the Ubuntu
      # 24.04 build), which implements ANS Forth, matching
      # ``Forth.language_version`` (``ANS``) in
      # ``src/literalizer/languages/forth.py``; keep them in sync.
      # ``ANS`` is a fixed standard, so the version pin here is for
      # reproducibility rather than language selection.
      # The ``tcl`` apt package is pinned to ``8.6.14build1`` (the
      # Ubuntu 24.04 build of Tcl 8.6.14), which is ``>=`` the ``V8_6``
      # (Tcl 8.6) default of ``Tcl.language_version`` in
      # ``src/literalizer/languages/tcl.py``; keep them in sync.
      # ``tcllib`` (pinned to the Ubuntu 24.04 build of ``1.21+dfsg-1``)
      # provides the ``json::write`` package used by
      # ``.github/scripts/run_tcl_roundtrip.py`` to re-emit JSON from a
      # literalized Tcl ``dict``; Tcl itself ships no JSON library.
      # The ``guile-3.0`` apt package pins Guile to the 3.x series,
      # which implements ``R7RS``, matching ``Scheme.language_version``
      # (``R7RS``) in ``src/literalizer/languages/scheme.py``; keep them
      # in sync. ``R7RS`` is a fixed standard, so the version pin here
      # is for reproducibility rather than language selection. apt
      # provides no point-release pin, so the ``-3.0`` package suffix
      # is the only available version constraint.
      - name: Install apt packages
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: tcl=8.6.14build1 tcllib=1.21+dfsg-1 gforth=0.7.3+dfsg-9build4.1
            guile-3.0
          version: 1.0
      - name: Install Dhall
        # The pinned ``dhall-haskell`` 1.42.2 binary implements Dhall
        # language standard 23.1.0, which is ``>=`` the ``V17`` (Dhall
        # standard 17.0.0) default of ``Dhall.language_version`` in
        # ``src/literalizer/languages/dhall.py``; keep them in sync.
        # Note the binary version (1.42.2) is distinct from the Dhall
        # *language* standard version (23.1.0) it implements.
        run: |-
          curl -fsSL https://github.com/dhall-lang/dhall-haskell/releases/download/1.42.2/dhall-1.42.2-x86_64-linux.tar.bz2 \
            | tar -xj
          echo "$PWD/bin" >> "$GITHUB_PATH"
      # The ``0.4.0`` wren-cli release downloaded here matches
      # ``Wren.language_version`` (``V0_4``) in
      # ``src/literalizer/languages/wren.py``; keep them in sync. Wren
      # has no ``--langversion``-style flag, so the pinned CLI release
      # is the only mechanism for pinning the language version.
      - name: Install Wren CLI
        run: |
          curl -fsSL https://github.com/wren-lang/wren-cli/releases/download/0.4.0/wren-cli-linux-0.4.0.zip -o /tmp/wren.zip
          unzip -o /tmp/wren.zip -d /tmp/wren
          sudo install /tmp/wren/wren-cli-linux-0.4.0/wren_cli /usr/local/bin/wren_cli
      # ``ubuntu-latest`` preinstalls a ``pwsh``, but that runner default
      # drifts, so install an explicit release and put it first on
      # ``PATH`` for the ``Lint PowerShell`` / ``Run PowerShell files``
      # steps. The pinned PowerShell ``7.4.6`` (LTS) is ``>=`` the ``V7``
      # default of ``PowerShell.language_version`` in
      # ``src/literalizer/languages/powershell.py``; keep them in sync.
      # PowerShell has no ``--langversion``-style flag, so the pinned
      # release is the only mechanism for pinning the language version.
      - name: Install PowerShell
        run: |-
          mkdir -p /tmp/powershell
          curl -fsSL https://github.com/PowerShell/PowerShell/releases/download/v7.4.6/powershell-7.4.6-linux-x64.tar.gz \
            | tar -xz -C /tmp/powershell
          chmod +x /tmp/powershell/pwsh
          echo "/tmp/powershell" >> "$GITHUB_PATH"
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          # Pinned to the ``requires-python = ">=3.12"`` floor in
          # ``pyproject.toml``; keep this in sync with that floor so the
          # Python fixture gate runs under the declared minimum
          # interpreter. The ``Python.VersionFormats`` enum
          # (``PY38``/``PY39``) only selects typing-alias syntax and does
          # not encode this runtime floor, so it is not the source of
          # truth here.
          python-version: '3.12'

      # The fixture set spans every `Java.VersionFormats` member in
      # `src/literalizer/languages/java.py`; the installed JDK must be at
      # least the highest member (`JDK_16`) so `--release 16` is accepted.
      # 21 is the current LTS and also accepts `--release 11`.
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      # `.js` fixtures are executed by `node` below;
      # `JavaScript.language_version` is `VersionFormats.ES2015` in
      # `src/literalizer/languages/javascript.py`. Without an explicit
      # `node-version` the runtime drifts with the `setup-node` action
      # default. Node 22 is a current LTS and fully supports that ES2015
      # default. This same pin is repeated on every Node lint job
      # (`lint-npm-installed`, `lint-typescript-run`, `lint-elm`,
      # `lint-elm-run`); keep all of them and that `language_version`
      # declaration in sync.
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      # ``php-version: '8.1'`` matches ``Php.language_version`` (``V8_1``)
      # in ``src/literalizer/languages/php.py``; keep them in sync. PHP
      # has no ``--langversion``-style flag, so the pinned interpreter is
      # the only mechanism for pinning the language version. Without this
      # step `php` is whatever `ubuntu-latest` ships and drifts.
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      # ``ubuntu-latest`` preinstalls the ``bash`` that both runs this job
      # and lints/executes the ``.sh`` fixtures. That runner default (the
      # 5.x series) is ``>=`` the ``V5_1`` default of
      # ``Bash.language_version`` in ``src/literalizer/languages/bash.py``;
      # keep them in sync. Bash has no ``--langversion``-style flag and is
      # the workflow's own shell, so rather than swap the interpreter the
      # runner default is the pinned floor; the ``BASH_VERSINFO`` guard
      # below fails the job if that floor ever drifts below 5.1.
      - name: Lint Bash
        run: |-
          if (( BASH_VERSINFO[0] < 5 || (BASH_VERSINFO[0] == 5 && BASH_VERSINFO[1] < 1) )); then
            echo "bash ${BASH_VERSION} is below the pinned V5_1 floor" >&2
            exit 1
          fi
          find tests/integration/cases -name '*.sh' -print0 > /tmp/files-bash && test -s /tmp/files-bash
          xargs -0 bash -n < /tmp/files-bash
          xargs -0 -P "$(nproc)" -n1 bash < /tmp/files-bash

      # ``ruby-version: '3.4'`` is ``>=`` the ``V3`` (Ruby 3.x) default of
      # ``Ruby.language_version`` in ``src/literalizer/languages/ruby.py``;
      # keep them in sync. Without this setup step the ``ruby`` binary is
      # whatever ``ubuntu-latest`` ships and drifts.
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'

      - name: Lint Ruby
        run: |-
          find tests/integration/cases -name '*.rb' -print0 > /tmp/files-ruby && test -s /tmp/files-ruby
          xargs -0 -P "$(nproc)" -n1 ruby -c < /tmp/files-ruby
          xargs -0 -P "$(nproc)" -n1 ruby < /tmp/files-ruby

      # Basic JSON -> Ruby -> JSON round-trip (issue 1867). Runs here
      # because this is the job with the Ruby toolchain; `uv run`
      # (project mode, not `--no-project`) is required so
      # `import literalizer` resolves. See
      # `.github/scripts/run_ruby_roundtrip.py`.
      - name: Ruby roundtrip
        run: uv run python .github/scripts/run_ruby_roundtrip.py

      - name: Lint JavaScript
        run: |-
          find tests/integration/cases -name '*.js' -print0 > /tmp/files-js && test -s /tmp/files-js
          xargs -0 -P "$(nproc)" -n1 node --check < /tmp/files-js
          xargs -0 -P "$(nproc)" -n1 node < /tmp/files-js

      # Basic JSON -> JavaScript -> JSON round-trip (issue 1867). Runs
      # here because this is the job with the Node toolchain (pinned by
      # the `Set up Node` step above); `uv run` (project mode, not
      # `--no-project`) is required so `import literalizer` resolves.
      # See `.github/scripts/run_javascript_roundtrip.py`.
      - name: JavaScript roundtrip
        run: uv run python .github/scripts/run_javascript_roundtrip.py

      # The host compiles each fixture into an in-memory assembly, then
      # reflectively constructs `Main` and invokes its `main()` method
      # (or runs field initializers on field-only fixtures), so javac
      # emit-success and runtime errors (e.g. bad `Instant.parse` input)
      # both fail here. Each `@jdk_<release>` golden is compiled at the
      # matching `--release`; the `11` / `16` literals match
      # `Java.VersionFormats.JDK_11` / `JDK_16` in
      # `src/literalizer/languages/java.py`. Keep them in sync.
      # Jackson jars are needed by `Java(json_type=...)` fixtures so they
      # compile and run under `CheckJavaSyntax`. Pinned to a recent 2.x
      # release; bump together. The classpath is exported through
      # `LITERALIZER_LINT_CLASSPATH`, which `CheckJavaSyntax.java` adds
      # to both the in-process compile and the per-fixture
      # `URLClassLoader`. Keep this enum value paired with the literal in
      # `Java.JsonTypes.JACKSON_JSON_NODE` in
      # `src/literalizer/languages/java.py`.
      - name: Set up Jackson for Java
        run: |-
          mkdir -p /tmp/jackson-jars
          jackson_version=2.18.2
          for f in jackson-databind/$jackson_version/jackson-databind-$jackson_version.jar \
                   jackson-core/$jackson_version/jackson-core-$jackson_version.jar \
                   jackson-annotations/$jackson_version/jackson-annotations-$jackson_version.jar; do
            name=$(basename "$f")
            curl -fsSL "https://repo1.maven.org/maven2/com/fasterxml/jackson/core/$f" -o "/tmp/jackson-jars/$name"
          done

      - name: Lint Java
        env:
          LITERALIZER_LINT_CLASSPATH: /tmp/jackson-jars/*
        run: |-
          find tests/integration/cases -name '*@jdk_11.java' -print0 > /tmp/files-java-11 && test -s /tmp/files-java-11
          xargs -0 java CheckJavaSyntax.java 11 < /tmp/files-java-11
          find tests/integration/cases -name '*@jdk_16.java' -print0 > /tmp/files-java-16 && test -s /tmp/files-java-16
          xargs -0 java CheckJavaSyntax.java 16 < /tmp/files-java-16

      # Basic JSON -> Java -> JSON round-trip (issue 1867). Runs here
      # because this is the job with the JDK toolchain; `uv run` (project
      # mode, not `--no-project`) is required so `import literalizer`
      # resolves. See `.github/scripts/run_java_roundtrip.py`.
      - name: Java roundtrip
        run: uv run python .github/scripts/run_java_roundtrip.py

      - name: Lint Php
        run: |-
          find tests/integration/cases -name '*.php' -print0 > /tmp/files-php && test -s /tmp/files-php
          xargs -0 php -l < /tmp/files-php
          xargs -0 -P "$(nproc)" -n1 php < /tmp/files-php

      # Basic JSON -> PHP -> JSON round-trip (issue 1867). Runs here
      # because this is the job with the PHP toolchain; `uv run` (project
      # mode, not `--no-project`) is required so `import literalizer`
      # resolves. See `.github/scripts/run_php_roundtrip.py`.
      - name: Php roundtrip
        run: uv run python .github/scripts/run_php_roundtrip.py

      # Parse every fixture inside a single pwsh invocation so the .NET
      # and PowerShell startup cost is paid once instead of per fixture.
      # The run step reuses the same trick: one pwsh process iterates
      # every fixture, executing its script block in a child scope so
      # `$my_data` (and anything else) does not leak between fixtures.
      - name: Lint Python
        run: |-
          find tests/integration/cases -name '*.py' -print0 > /tmp/files-python
          xargs -0 -P "$(nproc)" -n1 uv run --no-project python -m py_compile < /tmp/files-python
          xargs -0 -P "$(nproc)" -n1 uv run --no-project python < /tmp/files-python

      - name: Lint PowerShell
        run: |-
          find tests/integration/cases -name '*.ps1' -print0 > /tmp/files-ps1 && test -s /tmp/files-ps1
          pwsh -NoProfile -NonInteractive -File .github/scripts/lint-powershell.ps1 < /tmp/files-ps1

      - name: Run PowerShell files
        run: pwsh -NoProfile -NonInteractive -File .github/scripts/run-powershell.ps1
          < /tmp/files-ps1

      # Every fixture defines its own `fval_m` module, and the syntax
      # check leaves an `fval_m.mod` in the working directory (gfortran
      # emits .mod files even under `-fsyntax-only`). gfortran would
      # then reuse that stale .mod instead of recompiling each file's
      # inline module, masking references to names defined only in the
      # current file. Compile each file from inside a private tmpdir so
      # the stale .mod is not on the module search path and parallel
      # runs cannot clobber each other's output.
      # ``Fortran.VersionFormats`` (``src/literalizer/languages/fortran.py``)
      # has ``V2003`` and ``V2008`` members; golden files are tagged
      # ``@v2003`` / ``@v2008`` and each is linted with the matching
      # ``-std=`` flag.  The ``-std=f2003``/``-std=f2008`` flags and the
      # ``@v2003``/``@v2008`` globs below mirror those enum members; keep
      # them in sync.  ``test -s`` fails the job if a version tag drifts
      # so a glob silently matches no files.
      - name: Lint Fortran
        run: |-
          find tests/integration/cases -name '*@v2003.f90' -print0 > /tmp/files-fortran2003 && test -s /tmp/files-fortran2003
          find tests/integration/cases -name '*@v2008.f90' -print0 > /tmp/files-fortran2008 && test -s /tmp/files-fortran2008
          xargs -0 gfortran -std=f2003 -ffree-line-length-none -fsyntax-only < /tmp/files-fortran2003
          xargs -0 gfortran -std=f2008 -ffree-line-length-none -fsyntax-only < /tmp/files-fortran2008
          cat > /tmp/run-fortran.sh <<'SCRIPT'
          std=$1
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          src=$(realpath "$2")
          cd "$tmpdir" || exit 1
          gfortran "-std=$std" -ffree-line-length-none "$src" -o run || exit 1
          ./run || exit 1
          SCRIPT
          xargs -0 -P "$(nproc)" -n1 bash /tmp/run-fortran.sh f2003 < /tmp/files-fortran2003
          xargs -0 -P "$(nproc)" -n1 bash /tmp/run-fortran.sh f2008 < /tmp/files-fortran2008

      - name: Lint Lua
        run: |-
          find tests/integration/cases -name '*.lua' -print0 > /tmp/files-lua && test -s /tmp/files-lua
          xargs -0 luac -p < /tmp/files-lua
          xargs -0 -P "$(nproc)" -n1 lua < /tmp/files-lua

      # Basic JSON -> Lua -> JSON round-trip (issue 1867). Runs here
      # because this is the job with the Lua toolchain (pinned by the
      # `Install Lua` step above) and the `dkjson` rock provisioned by
      # the `Install dkjson` step; `uv run` (project mode, not
      # `--no-project`) is required so `import literalizer` resolves.
      # See `.github/scripts/run_lua_roundtrip.py`.
      - name: Lua roundtrip
        run: uv run python .github/scripts/run_lua_roundtrip.py

      - name: Lint Nix
        run: |-
          find tests/integration/cases -name '*.nix' -print0 > /tmp/files-nix && test -s /tmp/files-nix
          xargs -0 -P "$(nproc)" -n1 nix-instantiate --parse < /tmp/files-nix > /dev/null

      - name: Lint Tcl
        run: |-
          find tests/integration/cases -name '*.tcl' -print0 > /tmp/files-tcl && test -s /tmp/files-tcl
          xargs -0 -P "$(nproc)" -n1 tclsh < /tmp/files-tcl

      # Driven from `lint-fast` because that is the job where the `tcl`
      # apt package (pinned by the `Install apt packages` step above) is
      # installed; `uv run` (project mode, not `--no-project`) is required
      # so `import literalizer` resolves.
      # See `.github/scripts/run_tcl_roundtrip.py`.
      - name: Tcl roundtrip
        run: uv run python .github/scripts/run_tcl_roundtrip.py

      - name: Lint Forth
        run: |-
          find tests/integration/cases -name '*.fth' -print0 > /tmp/files-forth && test -s /tmp/files-forth
          xargs -0 -P "$(nproc)" -I{} gforth {} -e bye < /tmp/files-forth

      # Invoke ``guile-3.0`` directly rather than ``guile`` because
      # cache-apt-pkgs-action does not replay the package's
      # ``update-alternatives`` postinst on cache hit, so ``/usr/bin/guile``
      # is missing.
      - name: Lint Scheme
        run: |-
          find tests/integration/cases -name '*.scm' -print0 > /tmp/files-scheme && test -s /tmp/files-scheme
          xargs -0 -P "$(nproc)" -I{} guile-3.0 --no-auto-compile -s {} < /tmp/files-scheme

      - name: Lint Dhall
        run: |-
          find tests/integration/cases -name '*.dhall' -print0 > /tmp/files-dhall && test -s /tmp/files-dhall
          cat > /tmp/check-dhall.sh <<'SCRIPT'
          dhall < "$1" > /dev/null
          SCRIPT
          xargs -0 -P "$(nproc)" -n1 bash /tmp/check-dhall.sh < /tmp/files-dhall

      # Basic JSON -> Dhall -> JSON round-trip (issue 1867).  Runs here
      # because this is the job with the `dhall` binary on PATH (the
      # `Install Dhall` step above); `uv run` (project mode, not
      # `--no-project`) is required so `import literalizer` resolves.
      # See `.github/scripts/run_dhall_roundtrip.py`.
      - name: Dhall roundtrip
        run: uv run python .github/scripts/run_dhall_roundtrip.py

      - name: Lint Wren
        run: |-
          find tests/integration/cases -name '*.wren' -print0 > /tmp/files-wren && test -s /tmp/files-wren
          xargs -0 -P "$(nproc)" -n1 wren_cli < /tmp/files-wren

      # Driven from `lint-fast` because that is the job where the
      # `wren_cli` binary (pinned by the `Install Wren CLI` step above)
      # is installed; `uv run` (project mode, not `--no-project`) is
      # required so `import literalizer` resolves.
      # See `.github/scripts/run_wren_roundtrip.py`.
      - name: Wren roundtrip
        run: uv run python .github/scripts/run_wren_roundtrip.py

      # Each fixture defines its own main, so compile and run directly.
      # The build-and-run step also surfaces any syntax errors, so a
      # separate `-fsyntax-only` pass would be redundant.
      # ``-std=c99`` matches ``C.language_version`` in
      # ``src/literalizer/languages/c.py``; keep them in sync.
      - name: Lint C
        run: |-
          find tests/integration/cases -name '*.c' -print0 > /tmp/files-c && test -s /tmp/files-c
          cat > /tmp/run-c.sh <<'SCRIPT'
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          clang -std=c99 "$1" -o "$tmpdir/run" || exit 1
          "$tmpdir/run" || exit 1
          SCRIPT
          xargs -0 -P "$(nproc)" -n1 bash /tmp/run-c.sh < /tmp/files-c

  # Keep Odin isolated.  This fixture set is good at finding compiler
  # instability because many generated files combine [dynamic]any,
  # map[string]any, nested literals, and variadic proc(..any) stubs.
  # There is not yet one exact upstream issue for our CI symptom, but
  # these related Odin issues document the relevant failure modes:
  #
  # - Race-condition-like threaded compiler crash:
  #   https://github.com/odin-lang/Odin/issues/5051
  # - Open compiler crash involving any:
  #   https://github.com/odin-lang/Odin/issues/3988
  # - Older [dynamic]any miscompile/crash history:
  #   https://github.com/odin-lang/Odin/issues/79
  #
  # In literalizer CI, Odin has failed in two ways:
  # 1. Parallel odin invocations on one runner deadlocked, even when
  #    each build used its own working directory.
  # 2. A serial build segfaulted, then the retry spawned an odin process
  #    that never exited; GitHub Actions later killed it as an orphan.
  #
  # Files are run serially in a single job so no two odin processes
  # share a kernel.
  lint-odin:
    runs-on: ubuntu-latest
    # Normal runs finish in minutes.  If the compiler, setup action, or
    # cleanup hangs, stop this job promptly instead of leaving the
    # completion gate blocked until the workflow-wide timeout.
    timeout-minutes: 10
    # Pinned: `release: latest` (dev-2026-05) crashes at runtime under
    # `odin run .`, and the compiler itself segfaults on some fixtures
    # under `odin build .`.  dev-2026-04 was the last release known to
    # work with `odin run .`.  Every Odin fixture on disk carries the
    # tag from ``Odin.VersionFormats`` (e.g. `Odin@dev_2024.odin`); the
    # compiler pin here and that enum member name are reviewed together.
    env:
      ODIN_VERSION: dev-2026-04
      ODIN_FIXTURE_TAG: dev_2024
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install Odin
        uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release: ${{ env.ODIN_VERSION }}
      - name: Run Odin files
        run: |-
          mapfile -d '' -t files < <(python3 -m tests.integration.list_fixtures .odin "$ODIN_FIXTURE_TAG")
          n=${#files[@]}
          test "$n" -gt 0
          run_odin() {
            local src="$1"
            local wd
            wd=$(mktemp -d)
            trap 'rm -rf "$wd"' RETURN
            cp "$src" "$wd/main.odin"
            # Bound each compiler attempt.  A retry is useful for
            # transient segfaults, but without this timeout the retry can
            # hang forever and leave only "operation was canceled" plus
            # an orphan odin process in the Actions log.
            ( cd "$wd" && timeout --verbose --kill-after=10s 60s odin run . -out:"$wd/prog" )
          }
          for (( i=0; i<n; i+=1 )); do
            src=$(realpath "${files[i]}")
            # Print before running so a timeout log identifies the
            # fixture to minimize for an upstream Odin bug report.
            printf 'Running %s\n' "$src"
            run_odin "$src" || run_odin "$src" || exit 1
          done

  lint-roc:
    runs-on: ubuntu-latest
    # Roc has no stable release, and the upstream ``nightly`` GitHub
    # release only ever retains the moving
    # ``roc_nightly-linux_x86_64-latest.tar.gz`` asset -- old dated
    # nightlies are not kept, so there is no dated URL to ``curl``.
    # Instead we download ``-latest`` and assert its embedded build id
    # (the tarball's top-level directory, which carries the build date
    # and commit) equals ``ROC_NIGHTLY_BUILD``, so CI fails loudly when
    # upstream replaces the nightly instead of silently drifting. This
    # ``2025-10-28`` build is documented against the ``V0`` default of
    # ``Roc.language_version`` in ``src/literalizer/languages/roc.py``;
    # keep them in sync. Roc has no ``--langversion``-style flag, so the
    # pinned nightly build is the only mechanism for pinning the
    # language version.
    env:
      ROC_NIGHTLY_BUILD: roc_nightly-linux_x86_64-2025-10-28-ea210f57
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install Roc
        run: |-
          curl -fsSL https://github.com/roc-lang/roc/releases/download/nightly/roc_nightly-linux_x86_64-latest.tar.gz \
            -o /tmp/roc.tar.gz
          mkdir -p /tmp/roc-nightly
          tar -xzf /tmp/roc.tar.gz -C /tmp/roc-nightly
          # Read the extracted top-level directory by globbing rather
          # than `tar -tzf | head`: under the default `bash -eo
          # pipefail` shell, `head` closing the pipe sends `tar`
          # SIGPIPE (exit 141), which `pipefail` would propagate and
          # `set -e` would abort on.
          actual=$(cd /tmp/roc-nightly && echo *)
          if [ "$actual" != "$ROC_NIGHTLY_BUILD" ]; then
            echo "Roc nightly drifted: got '$actual', pinned '$ROC_NIGHTLY_BUILD'." >&2
            echo "Update ROC_NIGHTLY_BUILD here and the Roc.language_version comment in src/literalizer/languages/roc.py together." >&2
            exit 1
          fi
          sudo install "/tmp/roc-nightly/$ROC_NIGHTLY_BUILD/roc" /usr/local/bin/roc
      - name: Lint Roc
        run: |-
          find tests/integration/cases -name '*.roc' -print0 > /tmp/files-roc && test -s /tmp/files-roc
          xargs -0 -P "$(nproc)" -n1 roc check < /tmp/files-roc

      # `uv` is needed by the `Roc roundtrip` step below; it runs the
      # helper in project mode so `import literalizer` resolves.
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      # Basic JSON -> Roc -> JSON round-trip (issue 1867). Runs here
      # because this is the job with the Roc toolchain (the pinned
      # nightly installed above); `uv run` (project mode, not
      # `--no-project`) is required so `import literalizer` resolves.
      # The first invocation downloads and caches the basic-cli
      # platform tarball pinned in
      # `.github/scripts/run_roc_roundtrip.py`.
      - name: Roc roundtrip
        run: uv run python .github/scripts/run_roc_roundtrip.py

  # Octave is a practical CI substitute, but it does not support
  # every MATLAB builtin.  The per-fixture skip rules (for ``""``
  # escaped quotes and the ``datetime`` builtin) are documented in
  # .github/scripts/lint-matlab-fixture.sh.
  lint-matlab:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Use a prebuilt Octave image instead of `apt-get install octave`, which
    # is slow (the Ubuntu package pulls a large dependency tree) and which
    # cache-apt-pkgs-action could not reliably restore (liblapack.so.3 kept
    # going missing even with the package listed explicitly).
    container:
      image: gnuoctave/octave:9.2.0
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Lint Matlab
        run: |-
          find tests/integration/cases -name 'Matlab*.m' -print0 > /tmp/files-matlab && test -s /tmp/files-matlab
          xargs -0 -P "$(nproc)" -n1 bash .github/scripts/lint-matlab-fixture.sh < /tmp/files-matlab

  lint-perl:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      # ``perl-version: '5.36'`` is ``>=`` the ``V5_36``
      # ``Perl.language_version`` default in
      # ``src/literalizer/languages/perl.py``; keep them in sync. Without
      # this setup step the ``perl`` binary is whatever ``ubuntu-latest``
      # ships and drifts. The action also bundles ``cpanm`` for the
      # pinned interpreter, so ``DateTime`` installs against it (no
      # ``sudo``, which would target the system Perl instead).
      - name: Set up Perl
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: '5.36'
      - name: Install Perl DateTime
        run: cpanm --notest DateTime
      - name: Lint Perl
        run: |-
          find tests/integration/cases -name '*.pl' -print0 > /tmp/files-perl && test -s /tmp/files-perl
          xargs -0 -P "$(nproc)" -n1 perl -c < /tmp/files-perl
          xargs -0 -P "$(nproc)" -n1 perl < /tmp/files-perl

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      # Basic JSON -> Perl -> JSON round-trip (issue 1867). Runs here
      # because this is the job with the pinned Perl toolchain; `uv run`
      # (project mode, not `--no-project`) is required so
      # `import literalizer` resolves. ``JSON::PP`` and ``Math::BigInt``
      # are core in the pinned 5.36 interpreter so no extra ``cpanm``
      # step is needed. See `.github/scripts/run_perl_roundtrip.py`.
      - name: Perl roundtrip
        run: uv run python .github/scripts/run_perl_roundtrip.py

  # Fixture languages linted by small tools fetched via `go install`.
  lint-go-installed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install Go-sourced linters
        run: |-
          go install github.com/google/go-jsonnet/cmd/jsonnet@latest
          go install github.com/tmccombs/hcl2json@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Lint Jsonnet
        run: |-
          find tests/integration/cases -name '*.jsonnet' -print0 > /tmp/files-jsonnet && test -s /tmp/files-jsonnet
          xargs -0 -P "$(nproc)" -n1 jsonnet < /tmp/files-jsonnet > /dev/null
      # Basic JSON -> Jsonnet -> JSON round-trip (issue 1867). Runs here
      # because this is the job with the `jsonnet` binary (from the
      # `go install` above) already on PATH; `uv run` (project mode, not
      # `--no-project`) is required so `import literalizer` resolves.
      # See `.github/scripts/run_jsonnet_roundtrip.py`.
      - name: Jsonnet roundtrip
        run: uv run python .github/scripts/run_jsonnet_roundtrip.py

      - name: Lint Hcl
        run: |-
          find tests/integration/cases -name '*.hcl' -print0 > /tmp/files-hcl && test -s /tmp/files-hcl
          xargs -0 -P "$(nproc)" -n1 hcl2json < /tmp/files-hcl > /dev/null
      # Basic JSON -> HCL -> JSON round-trip (issue 2657). Runs here
      # because this is the job with the `hcl2json` binary (from the
      # `go install` above) already on PATH; `uv run` (project mode, not
      # `--no-project`) is required so `import literalizer` resolves.
      # See `.github/scripts/run_hcl_roundtrip.py`.
      - name: Hcl roundtrip
        run: uv run python .github/scripts/run_hcl_roundtrip.py

  # Json5 + Norg + TypeScript syntax check. The Run-TypeScript and Elm
  # passes are split into sibling jobs (`lint-typescript-run`, `lint-elm`)
  # so each long-running per-fixture loop fans out instead of serializing.
  lint-npm-installed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      # `node-version` pinned to Node 22 LTS, which supports the
      # `ES2015` `JavaScript.language_version` default; keep in sync with
      # the other Node lint jobs and the `language_version` declaration in
      # `src/literalizer/languages/javascript.py` (see the `Set up Node`
      # step in `lint-fast` for the full rationale).
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: .github/npm-linters/package-lock.json
      - name: Install npm-sourced linters
        run: |
          npm ci --prefix .github/npm-linters
          echo "$GITHUB_WORKSPACE/.github/npm-linters/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Build tree-sitter-norg parser
        run: |-
          git clone --depth=1 https://github.com/nvim-neorg/tree-sitter-norg.git /tmp/tree-sitter-norg
          cc -shared -fPIC -o /tmp/norg.so \
            -I /tmp/tree-sitter-norg/src \
            /tmp/tree-sitter-norg/src/parser.c \
            -x c++ /tmp/tree-sitter-norg/src/scanner.cc \
            -lstdc++

      - name: Lint Json5
        run: |-
          find tests/integration/cases -name '*.json5' -print0 > /tmp/files-json5 && test -s /tmp/files-json5
          xargs -0 -P "$(nproc)" -n1 json5 < /tmp/files-json5 > /dev/null

      - name: Lint Norg
        run: |-
          find tests/integration/cases -name '*.norg' -print0 > /tmp/files-norg && test -s /tmp/files-norg
          xargs -0 tree-sitter parse --lib-path /tmp/norg.so --lang-name norg --quiet < /tmp/files-norg

      # ``tsc`` parses these ``.ts`` fixtures at
      # ``TypeScript.language_version`` (``V5``) in
      # ``src/literalizer/languages/typescript.py``; ``--target es2015
      # --lib es2015`` matches ``JavaScript.language_version`` (``ES2015``)
      # in ``src/literalizer/languages/javascript.py``. Keep all three in
      # sync.
      - name: Lint TypeScript
        run: |-
          find tests/integration/cases -name '*.ts' -print0 > /tmp/files-ts && test -s /tmp/files-ts
          xargs -0 -P "$(nproc)" -n1 tsc --noEmit --noResolve --skipLibCheck --target es2015 --lib es2015 < /tmp/files-ts

  # Execute TypeScript fixtures via tsx. Split from `lint-npm-installed`
  # so the per-fixture tsx startups run in parallel with the tsc syntax
  # check instead of after it.
  lint-typescript-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      # `node-version` pinned to Node 22 LTS, which supports the
      # `ES2015` `JavaScript.language_version` default; keep in sync with
      # the other Node lint jobs and the `language_version` declaration in
      # `src/literalizer/languages/javascript.py` (see the `Set up Node`
      # step in `lint-fast` for the full rationale).
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: .github/npm-linters/package-lock.json
      - name: Install npm-sourced linters
        run: |
          npm ci --prefix .github/npm-linters
          echo "$GITHUB_WORKSPACE/.github/npm-linters/node_modules/.bin" >> "$GITHUB_PATH"
      # `uv` is needed by the `TypeScript roundtrip` step below; it runs
      # the helper in project mode so `import literalizer` resolves.
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Run TypeScript files
        run: |-
          find tests/integration/cases -name '*.ts' -print0 > /tmp/files-ts && test -s /tmp/files-ts
          xargs -0 -P "$(nproc)" -n1 tsx < /tmp/files-ts

      # Basic JSON -> TypeScript -> JSON round-trip (issue 1867).  Runs
      # here because this is the job with the Node + `tsx` toolchain;
      # `uv run` (project mode, not `--no-project`) is required so
      # `import literalizer` resolves.  See
      # `.github/scripts/run_typescript_roundtrip.py`.
      - name: TypeScript roundtrip
        run: uv run python .github/scripts/run_typescript_roundtrip.py

  # Elm format + syntax check. Split from `lint-elm-run` so the two
  # `elm make`-based passes (compile-only vs. compile + Node execute)
  # fan out instead of running back-to-back; recent main runs show the
  # combined step taking 1:30-3:50, so the parallel split saves
  # meaningful wall-clock for ~10-15s of extra setup.
  lint-elm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      # `node-version` pinned to Node 22 LTS, which supports the
      # `ES2015` `JavaScript.language_version` default; keep in sync with
      # the other Node lint jobs and the `language_version` declaration in
      # `src/literalizer/languages/javascript.py` (see the `Set up Node`
      # step in `lint-fast` for the full rationale).
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: .github/npm-linters/package-lock.json
      - name: Install npm-sourced linters
        run: |
          npm ci --prefix .github/npm-linters
          echo "$GITHUB_WORKSPACE/.github/npm-linters/node_modules/.bin" >> "$GITHUB_PATH"
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Lint Elm
        run: |-
          find tests/integration/cases -name '*.elm' -print0 > /tmp/files-elm && test -s /tmp/files-elm
          while IFS= read -r -d '' f; do
            elm-format --stdin < "$f" > /dev/null || exit 1
          done < /tmp/files-elm
          xargs -0 uv run --no-project python .github/scripts/check_elm_syntax.py < /tmp/files-elm

  # Elm runtime check. Sibling to `lint-elm` so the compile + Node
  # execute pass runs in parallel with the format + compile-only pass.
  lint-elm-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      # `node-version` pinned to Node 22 LTS, which supports the
      # `ES2015` `JavaScript.language_version` default; keep in sync with
      # the other Node lint jobs and the `language_version` declaration in
      # `src/literalizer/languages/javascript.py` (see the `Set up Node`
      # step in `lint-fast` for the full rationale).
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: .github/npm-linters/package-lock.json
      - name: Install npm-sourced linters
        run: |
          npm ci --prefix .github/npm-linters
          echo "$GITHUB_WORKSPACE/.github/npm-linters/node_modules/.bin" >> "$GITHUB_PATH"
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Run Elm
        run: |-
          find tests/integration/cases -name '*.elm' -print0 > /tmp/files-elm && test -s /tmp/files-elm
          xargs -0 uv run --no-project python .github/scripts/run_elm.py < /tmp/files-elm
      # Basic JSON -> Elm -> JSON round-trip (issue 1867). Runs here
      # because this is the job with the `elm` binary (from the
      # npm-linters install above) and Node 22 already on PATH; `uv run`
      # (project mode, not `--no-project`) is required so
      # `import literalizer` resolves. See
      # `.github/scripts/run_elm_roundtrip.py`.
      - name: Elm roundtrip
        run: uv run python .github/scripts/run_elm_roundtrip.py

  # Fixture languages whose check is a small `uv run python ...` helper.
  lint-uv-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install apt packages for Ada
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: gnat
          version: 1.0
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Lint Ada
        run: |-
          find tests/integration/cases -name '*.adb' -print0 > /tmp/files-ada && test -s /tmp/files-ada
          xargs -0 -P "$(nproc)" -n1 uv run --no-project python .github/scripts/check_ada_syntax.py < /tmp/files-ada
      - name: Run Ada files
        run: xargs -0 -P "$(nproc)" -n1 uv run --no-project python .github/scripts/run_ada.py
          < /tmp/files-ada

      # KRoC (the only maintained Occam-pi compiler, last updated 2020) cannot
      # compile these fixtures for several fundamental reasons:
      #
      # 1. MOBILE DATA TYPE ... IS CASE is in the occam-pi specification but
      #    absent from KRoC's occ21 parser.  occ21's rspecification() handles
      #    MOBILE by calling rspecifier(), which has no S_DATA case; and the
      #    DATA TYPE parse path in rspecification() is entirely separate and
      #    never reaches the MOBILE branch.  The two paths do not intersect, so
      #    the construct parses as "expected specifier, found DATA".
      #
      # 2. KRoC identifiers may only contain alphanumerics and dots.
      #    Underscores (ASCII 95) are illegal in standard mode, so names like
      #    my_data are rejected as "illegal character (ASCII 95)".
      #
      # 3. KRoC uses * as its escape character, not \.  String literals in the
      #    fixtures use \" (standard C/Python convention) but KRoC requires *"
      #    for a literal double-quote and ** for a literal asterisk.
      #
      # 4. Recursive MOBILE DATA TYPE (a MOBILE RECORD containing MOBILE []LIT
      #    children) is not supported.  The RECURSIVE keyword in KRoC only
      #    applies to CHAN TYPE declarations (channel bundles), not DATA TYPE.
      #
      # Because the fixture format itself is structurally incompatible with
      # KRoC, we fall back to this Python-based structural checker.
      - name: Lint Occam
        run: |-
          find tests/integration/cases -name '*.occ' -print0 > /tmp/files-occam && test -s /tmp/files-occam
          xargs -0 -P "$(nproc)" -n1 uv run --no-project python .github/scripts/check_occam_syntax.py < /tmp/files-occam

      - name: Lint Toml
        run: |-
          find tests/integration/cases -name '*.toml' -print0 > /tmp/files-toml && test -s /tmp/files-toml
          xargs -0 -P "$(nproc)" -n1 uv run --with 'tomli>=2.4.0' --no-project python .github/scripts/check_toml_syntax.py < /tmp/files-toml

      # Basic JSON -> TOML -> JSON round-trip (issue 1867). Runs here
      # because this is the job with the ``tomli`` TOML parser already
      # configured; ``uv run`` (project mode, not ``--no-project``) is
      # required so ``import literalizer`` resolves, and ``--with`` adds
      # ``tomli`` on top.  See ``.github/scripts/run_toml_roundtrip.py``.
      - name: Toml roundtrip
        run: uv run --with 'tomli>=2.4.0' python .github/scripts/run_toml_roundtrip.py

      # Basic JSON -> JSON5 -> JSON round-trip (issue 1867).  ``pyjson5``
      # is already a core ``literalizer`` dependency, so plain ``uv run``
      # (project mode) resolves it without an extra ``--with`` layer.
      # See ``.github/scripts/run_json5_roundtrip.py``.
      - name: Json5 roundtrip
        run: uv run python .github/scripts/run_json5_roundtrip.py

      - name: Lint Yaml
        run: |-
          find tests/integration/cases -name '*.yaml' ! -name 'input.yaml' -print0 > /tmp/files-yaml && test -s /tmp/files-yaml
          xargs -0 uvx yamllint --strict -d '{extends: default, rules: {document-start: disable, line-length: disable}}' -- < /tmp/files-yaml

      # Basic JSON -> YAML -> JSON round-trip (issue 1867). Runs here
      # alongside the existing Yaml syntax check; ``uv run`` (project
      # mode, not ``--no-project``) is required so ``import literalizer``
      # resolves, and ``--with`` layers ``pyyaml`` on top.  See
      # ``.github/scripts/run_yaml_roundtrip.py``.
      - name: Yaml roundtrip
        run: uv run --with 'pyyaml' python .github/scripts/run_yaml_roundtrip.py

  # .NET-hosted linters. Run host builds in parallel-looking sequential
  # steps so the .NET runtime startup is paid once for the whole job.
  lint-dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Initialize .NET runtime
        run: |
          mkdir -p /tmp/.dotnet/shm
          dotnet --info

      # Build a small Roslyn host once, then feed every fixture through
      # its stdin so the .NET runtime and C# compiler load once instead
      # of per fixture. Replaces `dotnet build` per fixture, which paid
      # MSBuild + NuGet restore + compiler startup each time.
      - name: Build C# lint host
        run: dotnet publish .github/scripts/lint-csharp/lint-csharp.csproj -c Release
          -o /tmp/lint-csharp --nologo
      # Build a small Roslyn host once, then feed every fixture through
      # its stdin so the .NET runtime and VB compiler load once instead
      # of per fixture.
      - name: Build VB lint host
        run: dotnet publish .github/scripts/lint-vb/lint-vb.csproj -c Release -o /tmp/lint-vb
          --nologo

      # The host compiles each fixture into an in-memory assembly and
      # invokes its entry point, so emit-success and runtime errors
      # (e.g. undefined members on an unstubbed object) both fail here.
      - name: Lint CSharp
        run: |-
          find tests/integration/cases -name '*.cs' -print0 > /tmp/files-cs && test -s /tmp/files-cs
          dotnet /tmp/lint-csharp/lint-csharp.dll < /tmp/files-cs

      # `uv` is needed by the `CSharp roundtrip` step below; it runs the
      # helper in project mode so `import literalizer` resolves.
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      # Basic JSON -> C# -> JSON round-trip (issue 1867). Runs here
      # because this is the job with the .NET toolchain; `uv run`
      # (project mode, not `--no-project`) is required so
      # `import literalizer` resolves. See
      # `.github/scripts/run_csharp_roundtrip.py`.
      - name: CSharp roundtrip
        run: uv run python .github/scripts/run_csharp_roundtrip.py

      - name: Lint VisualBasic
        run: |-
          find tests/integration/cases -name '*.vb' -print0 > /tmp/files-vb && test -s /tmp/files-vb
          dotnet /tmp/lint-vb/lint-vb.dll < /tmp/files-vb

      # Generate an FSX driver that `#load`s every fixture, then
      # evaluate it in a single `dotnet fsi --exec` invocation so the
      # .NET runtime and FSI compiler start up once instead of per
      # fixture. Each fixture re-declares `module Check`; FSI shadows
      # the previous definition, which is fine because the top-level
      # bindings still execute at load time.
      # ``--langversion:8.0`` matches ``FSharp.language_version`` in
      # ``src/literalizer/languages/fsharp.py``; keep them in sync.
      - name: Lint FSharp
        run: |-
          find tests/integration/cases \( -name '*.fs' -o -name '*.fsi' \) -print0 > /tmp/files-fs && test -s /tmp/files-fs
          driver=$(mktemp -d)/driver.fsx
          while IFS= read -r -d '' f; do
            printf '#load "%s"\n' "$(realpath "$f")"
          done < /tmp/files-fs > "$driver"
          DOTNET_SKIP_FIRST_TIME_EXPERIENCE=1 DOTNET_NOLOGO=1 \
            dotnet fsi --nologo --langversion:8.0 --exec "$driver"

      # Basic JSON -> F# -> JSON round-trip (issue 2653). Runs here
      # because this is the job with the .NET toolchain; `uv run`
      # (project mode, not `--no-project`) is required so
      # `import literalizer` resolves. See
      # `.github/scripts/run_fsharp_roundtrip.py`.
      - name: FSharp roundtrip
        run: uv run python .github/scripts/run_fsharp_roundtrip.py

  lint-sml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      # The pinned MLton implements SML '97, matching
      # ``SML.language_version`` (``SML_97``) in
      # ``src/literalizer/languages/sml.py``; keep them in sync.
      # ``SML_97`` is a fixed standard, so the version pin here is for
      # reproducibility rather than language selection.
      - name: Install MLton
        run: |
          curl -fsSL https://github.com/MLton/mlton/releases/download/on-20241230-release/mlton-20241230-1.amd64-linux.ubuntu-24.04_static.tgz | tar xz -C /tmp
          echo "/tmp/mlton-20241230-1.amd64-linux.ubuntu-24.04_static/bin" >> "$GITHUB_PATH"
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      # Every fixture defines its own entry point at top level, so compile
      # and run each file directly. Each invocation gets a private tmpdir
      # so parallel builds don't clobber each other's output binary.
      - name: Lint Sml
        run: |-
          find tests/integration/cases -name '*.sml' -print0 > /tmp/files-sml && test -s /tmp/files-sml
          cat > /tmp/run-sml.sh <<'SCRIPT'
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          cp "$1" "$tmpdir/check.sml"
          mlton -output "$tmpdir/out" "$tmpdir/check.sml" || exit 1
          "$tmpdir/out" || exit 1
          SCRIPT
          xargs -0 -P "$(nproc)" -n1 bash /tmp/run-sml.sh < /tmp/files-sml

      # Driven from `lint-sml` because that is the job where MLton (pinned
      # by the `Install MLton` step above) is installed; `uv run` (project
      # mode, not `--no-project`) is required so `import literalizer`
      # resolves. See `.github/scripts/run_sml_roundtrip.py`.
      - name: SML roundtrip
        run: uv run python .github/scripts/run_sml_roundtrip.py

  lint-elixir:
    runs-on: ubuntu-latest
    # Every Elixir fixture on disk carries the tag from
    # ``Elixir.VersionFormats`` (e.g. `Elixir@v1_14.ex`); bumping the
    # compiler pin and the enum member name are reviewed together.
    env:
      ELIXIR_VERSION: '1.18'
      ELIXIR_FIXTURE_TAG: v1_14
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: '27'

      # Fixtures only declare `defmodule Check` with a `def x` body, so
      # `elixir` compiles the module but never invokes it. The script
      # compiles each fixture, calls `Check.x()` to force the body to
      # execute, and purges the module between fixtures, all inside a
      # single BEAM VM, paying the cold-start cost once instead of twice
      # per fixture (serial `elixirc` + `elixir` loops).
      - name: Lint Elixir
        run: |-
          python3 -m tests.integration.list_fixtures .ex "$ELIXIR_FIXTURE_TAG" > /tmp/files-elixir && test -s /tmp/files-elixir
          elixir .github/scripts/lint-elixir.exs < /tmp/files-elixir

  lint-erlang:
    runs-on: ubuntu-latest
    # Every Erlang fixture on disk carries the tag from
    # ``Erlang.VersionFormats`` (e.g. `Erlang@otp_25.erl`); bumping the
    # OTP pin and the enum member name are reviewed together.
    env:
      OTP_VERSION: '27'
      ERLANG_FIXTURE_TAG: otp_25
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install Erlang
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}

      # Compile every fixture in a single erlc invocation to pay the
      # BEAM VM startup cost once. Each fixture already carries a unique
      # module name derived from its case directory and stem, so a plain
      # copy suffices; no sed rewriting needed.
      - name: Lint Erlang
        env:
          ERLANG_FIXTURE_DIR: ${{ runner.temp }}/lint-erlang
        run: |-
          python3 -m tests.integration.list_fixtures .erl "$ERLANG_FIXTURE_TAG" > /tmp/files-erlang && test -s /tmp/files-erlang
          mkdir -p "$ERLANG_FIXTURE_DIR"
          while IFS= read -r -d '' f; do
            dir=${f%/*}; dir=${dir##*/}
            stem=$(basename "$f" .erl)
            stem="${stem%@*}"  # strip @version so filename matches -module(...)
            name="fixture_${dir,,}_${stem,,}"
            cp "$f" "$ERLANG_FIXTURE_DIR/$name.erl"
          done < /tmp/files-erlang
          (cd "$ERLANG_FIXTURE_DIR" && erlc -Werror fixture_*.erl)

      # `erlc` only compiles; runtime errors (undefined functions, missing
      # imports, failed assertions) slip past unless each fixture is
      # actually executed. Every module name starts with ``fixture_``;
      # invoke each in a single BEAM VM and collect failures so one bad
      # fixture does not mask others.
      - name: Run Erlang files
        env:
          ERLANG_FIXTURE_DIR: ${{ runner.temp }}/lint-erlang
        run: |-
          modules=$(find "$ERLANG_FIXTURE_DIR" -maxdepth 1 -name '*.beam' -printf '%f\n' | sed 's|\.beam$||' | paste -sd, -)
          test -n "$modules"
          erl -noshell -pa "$ERLANG_FIXTURE_DIR" -eval "
            Run = fun(M) ->
                try M:x(), ok
                catch K:R:S -> io:format(\"FAIL ~p: ~p:~p~n~p~n\", [M,K,R,S]), error
                end
            end,
            Results = [Run(M) || M <- [$modules]],
            case lists:member(error, Results) of true -> halt(1); false -> halt(0) end."

      # `uv` is needed by the `Erlang roundtrip` step below; it runs the
      # helper in project mode so `import literalizer` resolves.
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      # Basic JSON -> Erlang -> JSON round-trip (issue 1867). Runs here
      # because this is the job with the Erlang/OTP toolchain (`escript`
      # on PATH, OTP 27's built-in `json` module available); `uv run`
      # (project mode, not `--no-project`) is required so
      # `import literalizer` resolves. See
      # `.github/scripts/run_erlang_roundtrip.py`.
      - name: Erlang roundtrip
        run: uv run python .github/scripts/run_erlang_roundtrip.py

  lint-gleam:
    runs-on: ubuntu-latest
    # Every Gleam fixture on disk carries the tag from
    # ``Gleam.VersionFormats`` (e.g. `gleam_combined@v1.gleam`);
    # bumping the compiler pin and the enum member name are reviewed
    # together.
    env:
      GLEAM_VERSION: v1.16.0
      GLEAM_FIXTURE_TAG: v1
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install Gleam
        uses: erlef/setup-beam@v1
        with:
          gleam-version: ${{ env.GLEAM_VERSION }}
          otp-version: '27'
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      # Prime a project with downloaded dependencies once up front. The
      # check and run scripts each copy this primed dir and drop every
      # fixture into it, so they never pay `gleam deps download`.
      - name: Prime Gleam project
        run: |-
          mkdir -p "$RUNNER_TEMP/lint-gleam-primed/src"
          cp .github/scripts/lint-gleam.toml "$RUNNER_TEMP/lint-gleam-primed/gleam.toml"
          (cd "$RUNNER_TEMP/lint-gleam-primed" && gleam deps download)

      # All ~350 fixtures are checked in a single `gleam check` invocation
      # because each Gleam invocation boots the BEAM VM (~1s) and that
      # startup cost -- not the per-fixture compile work -- dominated the
      # old per-file parallel approach.
      - name: Lint Gleam
        env:
          LINT_GLEAM_PRIMED_DIR: ${{ runner.temp }}/lint-gleam-primed
        run: |-
          python3 -m tests.integration.list_fixtures .gleam "$GLEAM_FIXTURE_TAG" | tr '\0' '\n' > /tmp/files-gleam && test -s /tmp/files-gleam
          uv run --no-project python .github/scripts/check_gleam_syntax.py < /tmp/files-gleam

      # All ~350 fixtures are run in a single `gleam run` invocation; the
      # script generates a runner module that calls each fixture's `main`
      # in sequence. See the check step for the BEAM-startup rationale.
      - name: Run Gleam files
        env:
          LINT_GLEAM_PRIMED_DIR: ${{ runner.temp }}/lint-gleam-primed
        run: |-
          python3 -m tests.integration.list_fixtures .gleam "$GLEAM_FIXTURE_TAG" | tr '\0' '\n' > /tmp/files-gleam && test -s /tmp/files-gleam
          uv run --no-project python .github/scripts/run_gleam.py < /tmp/files-gleam

      # Basic JSON -> Gleam -> JSON round-trip (issue 1867). Runs here
      # because this is the job with the Gleam toolchain and the primed
      # project (with `gleam_json` already downloaded) on disk; `uv run`
      # (project mode, not `--no-project`) is required so
      # `import literalizer` resolves. See
      # `.github/scripts/run_gleam_roundtrip.py`.
      - name: Gleam roundtrip
        env:
          LINT_GLEAM_PRIMED_DIR: ${{ runner.temp }}/lint-gleam-primed
        run: uv run python .github/scripts/run_gleam_roundtrip.py

  # Small JVM-based lints that each do a quick action install.
  lint-jvm-mini:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      # ``bb: 1.12.218`` bundles Clojure 1.12.x, which is ``>=`` the
      # ``V1_11`` (Clojure 1.11) default of ``Clojure.language_version``
      # in ``src/literalizer/languages/clojure.py``; keep them in sync.
      # Babashka determines the effective Clojure runtime, so it must be
      # pinned (not ``latest``) to stop the effective version drifting.
      # ``clj-kondo`` is a static linter, pinned for reproducibility.
      - name: Install clj-kondo and Babashka
        uses: DeLaGuardo/setup-clojure@13
        with:
          clj-kondo: 2026.04.15
          bb: 1.12.218
      # The pinned Apache Groovy 4.0.32 binary distribution is ``>=`` the
      # ``V4`` (Groovy 4.x) default of ``Groovy.language_version`` in
      # ``src/literalizer/languages/groovy.py``; keep them in sync. The
      # Ubuntu ``groovy`` apt package is Groovy 2.4.x (``< V4``), so the
      # pinned binary distribution is the only mechanism for installing a
      # Groovy ``>= V4``.
      - name: Install Groovy
        run: |-
          curl -fsSL https://archive.apache.org/dist/groovy/4.0.32/distribution/apache-groovy-binary-4.0.32.zip -o /tmp/groovy.zip
          unzip -q -o /tmp/groovy.zip -d /tmp/groovy
          echo "/tmp/groovy/groovy-4.0.32/bin" >> "$GITHUB_PATH"

      - name: Lint Clojure
        run: |-
          find tests/integration/cases -name '*.clj' -print0 > /tmp/files-clj && test -s /tmp/files-clj
          xargs -0 clj-kondo --lint < /tmp/files-clj
      - name: Run Clojure files
        run: xargs -0 -P "$(nproc)" -n1 bb < /tmp/files-clj

      # Parse and run every fixture inside a single Groovy JVM via
      # GroovyShell, so the compiler stays warm across iterations
      # instead of cold-starting groovyc/groovy per file. A fresh
      # GroovyShell per fixture keeps classloaders isolated, since
      # some fixtures declare top-level classes with shared names.
      - name: Lint Groovy
        run: |-
          find tests/integration/cases -name '*.groovy' -print0 > /tmp/files-groovy && test -s /tmp/files-groovy
          groovy .github/scripts/lint-groovy.groovy < /tmp/files-groovy

      # `uv` is needed by the `Clojure roundtrip` and `Groovy roundtrip`
      # steps below; they run their helpers in project mode so
      # `import literalizer` resolves.
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      # Basic JSON -> Clojure -> JSON round-trip (issue 2642). Runs here
      # because this is the job with Babashka (pinned by the
      # `Install clj-kondo and Babashka` step above); `cheshire.core`
      # ships built in with Babashka so no extra rock is needed.
      # `uv run` (project mode, not `--no-project`) is required so
      # `import literalizer` resolves.
      # See `.github/scripts/run_clojure_roundtrip.py`.
      - name: Clojure roundtrip
        run: uv run python .github/scripts/run_clojure_roundtrip.py

      # Basic JSON -> Groovy -> JSON round-trip (issue 1867). Runs here
      # because this is the job with the Groovy toolchain (pinned by the
      # `Install Groovy` step above); `uv run` (project mode, not
      # `--no-project`) is required so `import literalizer` resolves.
      # See `.github/scripts/run_groovy_roundtrip.py`.
      - name: Groovy roundtrip
        run: uv run python .github/scripts/run_groovy_roundtrip.py

  # Haskell + PureScript share the Haskell toolchain.
  lint-haskell-family:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: haskell-actions/setup@v2
        id: setup-haskell
        with:
          ghc-version: latest

      # Cache the cabal store (compiled aeson and its deps) used by the
      # `Haskell roundtrip` step's cabal-script. Keyed on the resolved
      # GHC version and the script file (whose `{- cabal: ... -}` block
      # holds the build-depends list), so a dependency bump invalidates
      # automatically. `~/.cabal/packages` holds the Hackage index.
      - name: Cache cabal store
        uses: actions/cache@v5
        with:
          path: |
            ~/.cabal/store
            ~/.cabal/packages
          key: cabal-${{ runner.os }}-ghc${{ steps.setup-haskell.outputs.ghc-version
            }}-${{ hashFiles('.github/scripts/run_haskell_roundtrip.py') }}
          restore-keys: |
            cabal-${{ runner.os }}-ghc${{ steps.setup-haskell.outputs.ghc-version }}-
      # ``purescript: 0.15.15`` is ``>=`` the ``V0_15`` (PureScript
      # 0.15.x) default of ``PureScript.language_version`` in
      # ``src/literalizer/languages/purescript.py``; keep them in sync.
      # Without an explicit pin ``setup-purescript`` installs whatever
      # ``purescript: latest`` resolves to and drifts.
      - uses: purescript-contrib/setup-purescript@main
        with:
          purescript: 0.15.15
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      # The `aeson` and `aeson-qq` packages are needed by the
      # `Haskell(json_type=Haskell.json_types.AESON_VALUE)` fixtures so
      # they compile under the bare `ghc` invocation below (which does
      # not see the cabal-script `build-depends` block used by the
      # `Haskell roundtrip` step). `cabal install --lib` registers them
      # in the user package database so the subsequent `ghc` call
      # resolves `Data.Aeson` and `Data.Aeson.QQ`. The file-level
      # `{-# LANGUAGE QuasiQuotes  #-}` pragma is honored by `ghc`, so
      # no extra `-XQuasiQuotes` command-line flag is needed.
      # `template-haskell` ships with GHC.  `base`, `time`, and
      # `bytestring` are also listed here because `cabal install --lib`
      # writes a default package environment whose visibility is
      # restricted to the packages named on the command line plus their
      # transitive dependencies; without an explicit listing the
      # subsequent `ghc` call cannot resolve boot libraries like
      # `Data.Time` that non-`json_type` Haskell fixtures rely on.
      # Keep this paired with the `AESON_VALUE` member in
      # `Haskell.JsonTypes` in `src/literalizer/languages/haskell.py`.
      - name: Install aeson / aeson-qq for Haskell lint
        run: |-
          cabal update
          cabal install --lib aeson aeson-qq base time bytestring

      # Compile all fixtures in a single ghc invocation to pay GHC's
      # startup cost once. Each fixture already carries a unique module
      # name derived from its case directory and stem, so a plain copy
      # suffices; no sed rewriting needed. A generated Main.hs driver
      # imports every fixture qualified and calls its main so one run
      # exercises them all.
      # ``-XGHC2021`` matches ``Haskell.language_version`` in
      # ``src/literalizer/languages/haskell.py``; keep them in sync.
      - name: Lint Haskell
        run: |-
          find tests/integration/cases -name '*.hs' -print0 > /tmp/files-haskell && test -s /tmp/files-haskell
          workspace=$(mktemp -d)
          tmpdir=$(mktemp -d)
          imports=$(mktemp)
          calls=$(mktemp)
          while IFS= read -r -d '' f; do
            dir=$(basename "$(dirname "$f")")
            stem=$(basename "$f" .hs)
            stem="${stem%@*}"  # strip @version so Main.hs imports a valid module
            mod="Fixture_${dir}_${stem}"
            cp "$f" "$workspace/${mod}.hs"
            printf '%s.hs <- %s\n' "$mod" "$f"
            printf 'import qualified %s\n' "$mod" >> "$imports"
            printf '  %s.main\n' "$mod" >> "$calls"
          done < /tmp/files-haskell
          {
            printf 'module Main where\n'
            cat "$imports"
            printf 'main :: IO ()\nmain = do\n'
            cat "$calls"
          } > "$workspace/Main.hs"
          (cd "$workspace" && ghc -XGHC2021 -Wall -Werror -j -outputdir "$tmpdir" -o "$tmpdir/run" Main.hs)
          "$tmpdir/run"

      # Basic JSON -> Haskell -> JSON round-trip (issue 1867). Runs
      # here because this is the job with the GHC toolchain; `uv run`
      # (project mode, not `--no-project`) is required so
      # `import literalizer` resolves. See
      # `.github/scripts/run_haskell_roundtrip.py`.
      - name: Haskell roundtrip
        run: uv run python .github/scripts/run_haskell_roundtrip.py

      - name: Lint PureScript
        run: |-
          find tests/integration/cases -name '*.purs' -print0 > /tmp/files-purescript && test -s /tmp/files-purescript
          xargs -0 -P "$(nproc)" -n 1 uv run --no-project python .github/scripts/check_purescript_syntax.py < /tmp/files-purescript
      - name: Run PureScript files
        run: xargs -0 uv run --no-project python .github/scripts/run_purescript.py
          < /tmp/files-purescript

      # Basic JSON -> PureScript -> JSON round-trip (issue 1867). Runs
      # here because this is the job with the `purs` binary (from
      # `setup-purescript`) and Node already on PATH; `uv run`
      # (project mode, not `--no-project`) is required so
      # `import literalizer` resolves. See
      # `.github/scripts/run_purescript_roundtrip.py`.
      - name: PureScript roundtrip
        run: uv run python .github/scripts/run_purescript_roundtrip.py

  # Ubuntu's packaged clang-tidy is several releases behind and is the
  # dominant cost of this job on runners. Pull a recent build from PyPI
  # via uv instead.
  # Pass compile flags after `--` so clang-tidy treats them as the full
  # compile command and skips searching for a compile_commands.json.
  lint-c-tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      - name: Install clang-tidy
        run: uv tool install clang-tidy
      # ``-std=c99`` matches ``C.language_version`` in
      # ``src/literalizer/languages/c.py``; keep them in sync.
      - name: Run clang-tidy on C files
        run: |-
          find tests/integration/cases -name '*.c' -print0 > /tmp/files-c-tidy && test -s /tmp/files-c-tidy
          xargs -0 -P "$(nproc)" -n1 -I{} clang-tidy {} -- -std=c99 < /tmp/files-c-tidy

  lint-cpp-tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      - name: Install clang-tidy
        run: uv tool install clang-tidy
      # ``nlohmann::json`` fixtures (``Cpp(json_type=NLOHMANN_JSON)``)
      # need the single-header library; the Ubuntu package ships
      # ``<nlohmann/json.hpp>`` under the default include path.
      - name: Install nlohmann/json
        run: sudo apt-get update && sudo apt-get install -y nlohmann-json3-dev
      # ``-std=c++20`` matches ``Cpp.language_version`` in
      # ``src/literalizer/languages/cpp.py``; keep them in sync.
      - name: Run clang-tidy on C++ files
        run: |-
          find tests/integration/cases -name '*.cpp' -print0 > /tmp/files-cpp-tidy && test -s /tmp/files-cpp-tidy
          xargs -0 -P "$(nproc)" -n1 -I{} clang-tidy {} -- -std=c++20 < /tmp/files-cpp-tidy

  lint-cobol:
    runs-on: ubuntu-latest
    env:
      # Pin the GnuCOBOL toolchain so the implicitly installed compiler
      # does not drift. ``3.2`` supports the COBOL 2002 standard, which
      # matches ``Cobol.language_version`` (``V2002``) in
      # ``src/literalizer/languages/cobol.py``; keep them in sync (the
      # pin must stay ``>=`` that ``V2002`` default).
      GNUCOBOL_VERSION: '3.2'
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.cob' -print0 > /tmp/files-to-lint
          && test -s /tmp/files-to-lint
      - name: Install GnuCOBOL
        uses: fabasoad/setup-cobol-action@v1.6.2
        with:
          version: ${{ env.GNUCOBOL_VERSION }}
      # GnuCOBOL caps the file base name length and rejects ``@``-laden
      # names that exceed it, so copy each fixture to a fixed short
      # filename before invoking ``cobc``.
      - name: Check COBOL syntax
        run: |-
          cat > /tmp/check-cobol.sh <<'SCRIPT'
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          cp "$1" "$tmpdir/check.cob"
          cobc -free -fsyntax-only "$tmpdir/check.cob"
          SCRIPT
          xargs -0 -P "$(nproc)" -n1 bash /tmp/check-cobol.sh < /tmp/files-to-lint
      - name: Run COBOL files
        run: |-
          cat > /tmp/run-cobol.sh <<'SCRIPT'
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          cp "$1" "$tmpdir/check.cob"
          cobc -x -free "$tmpdir/check.cob" -o "$tmpdir/run" || exit 1
          "$tmpdir/run" || exit 1
          SCRIPT
          xargs -0 -P "$(nproc)" -n1 bash /tmp/run-cobol.sh < /tmp/files-to-lint

  lint-cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.cpp' -print0 > /tmp/files-to-lint
          && test -s /tmp/files-to-lint
      # ``nlohmann::json`` fixtures (``Cpp(json_type=NLOHMANN_JSON)``)
      # need the single-header library; the Ubuntu package ships
      # ``<nlohmann/json.hpp>`` under the default include path.
      - name: Install nlohmann/json
        run: sudo apt-get update && sudo apt-get install -y nlohmann-json3-dev
      # Fixtures are tiny TUs whose cost is dominated by re-parsing the
      # same standard headers 269 times. Build a precompiled header once
      # covering every header any fixture includes, then preload it in
      # each compile invocation so the parsed AST is reused instead of
      # re-parsed per file.
      # ``-std=c++20`` matches ``Cpp.language_version`` in
      # ``src/literalizer/languages/cpp.py``; keep them in sync.
      - name: Build precompiled header
        run: clang++ -std=c++20 -x c++-header .github/scripts/lint-cpp-pch.hpp -o
          /tmp/pch.hpp.pch
      # Each fixture defines its own main, so compile and run directly.
      # The build-and-run step also surfaces any syntax errors, so a
      # separate `-fsyntax-only` pass would be redundant.
      - name: Run C++ files
        run: |-
          cat > /tmp/run-cpp.sh <<'SCRIPT'
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          clang++ -std=c++20 -include-pch /tmp/pch.hpp.pch "$1" \
            -o "$tmpdir/run" || exit 1
          "$tmpdir/run" || exit 1
          SCRIPT
          xargs -0 -P "$(nproc)" -n1 bash /tmp/run-cpp.sh < /tmp/files-to-lint
      # `uv` is needed by the `C++ roundtrip` step below; it runs the
      # helper in project mode so `import literalizer` resolves.
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      # Basic JSON -> C++ -> JSON round-trip (issue 1867). Runs here
      # because this is the job with the C++ toolchain and the
      # `nlohmann-json3-dev` package; `uv run` (project mode, not
      # `--no-project`) is required so `import literalizer` resolves.
      # See `.github/scripts/run_cpp_roundtrip.py`.
      - name: C++ roundtrip
        run: uv run python .github/scripts/run_cpp_roundtrip.py

  lint-kotlin:
    runs-on: ubuntu-latest
    # 2.3.10's kotlin-scripting-jvm references a legacy
    # ``ScriptExpectedLocation`` class that is no longer shipped, so
    # ``K2JVMCompiler.exec("-script", ...)`` from inside a
    # ``.main.kts`` host blows up with NoClassDefFoundError.  2.3.20
    # drops the stale reference.  Every Kotlin fixture on disk carries
    # the tag from ``Kotlin.VersionFormats`` (e.g. `Kotlin@v1_9.kts`);
    # the compiler pin and that enum member name are reviewed together.
    env:
      KOTLIN_VERSION: 2.3.20
      KOTLIN_FIXTURE_TAG: v1_9
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: python3 -m tests.integration.list_fixtures .kts "$KOTLIN_FIXTURE_TAG"
          > /tmp/files-to-lint && test -s /tmp/files-to-lint
      - name: Install Kotlin
        uses: fwilhe2/setup-kotlin@v1
        with:
          version: ${{ env.KOTLIN_VERSION }}
      # kotlinx-serialization-json jars are needed by
      # `Kotlin(json_type=...)` fixtures so they type-check under the
      # K2JVMCompiler script host. Pinned to a recent 1.x release;
      # bump together. The classpath is exported through
      # `LITERALIZER_LINT_CLASSPATH`, which
      # `.github/scripts/lint-kotlin.main.kts` forwards via `-classpath`
      # to every per-fixture compile. Keep this enum value paired with
      # the literal in `Kotlin.JsonTypes.KOTLINX_JSON_ELEMENT` in
      # `src/literalizer/languages/kotlin.py`.
      - name: Set up kotlinx-serialization-json for Kotlin
        run: |-
          mkdir -p /tmp/kotlinx-jars
          serialization_version=1.7.3
          for f in kotlinx-serialization-json-jvm/$serialization_version/kotlinx-serialization-json-jvm-$serialization_version.jar \
                   kotlinx-serialization-core-jvm/$serialization_version/kotlinx-serialization-core-jvm-$serialization_version.jar; do
            name=$(basename "$f")
            curl -fsSL "https://repo1.maven.org/maven2/org/jetbrains/kotlinx/$f" -o "/tmp/kotlinx-jars/$name"
          done
      # Jackson jars are needed by `run_kotlin_roundtrip.py`, which uses
      # `ObjectMapper().writeValueAsString(...)` to dump the heterogeneous
      # `Any?` literalized value (including primitive `IntArray`/`LongArray`
      # etc) without a hand-rolled `JsonElement` walker. Pinned alongside
      # the `Set up Jackson for Java` step above; bump together.
      - name: Set up Jackson for Kotlin
        run: |-
          mkdir -p /tmp/jackson-jars
          jackson_version=2.18.2
          for f in jackson-databind/$jackson_version/jackson-databind-$jackson_version.jar \
                   jackson-core/$jackson_version/jackson-core-$jackson_version.jar \
                   jackson-annotations/$jackson_version/jackson-annotations-$jackson_version.jar; do
            name=$(basename "$f")
            curl -fsSL "https://repo1.maven.org/maven2/com/fasterxml/jackson/core/$f" -o "/tmp/jackson-jars/$name"
          done
      # Invoke K2JVMCompiler from a single `.main.kts` JVM instead of
      # spawning one `kotlinc -script` per fixture. The JVM + compiler
      # classes load once and each fixture is compiled against the warm
      # compiler, cutting ~355 cold JVM starts to one.
      - name: Check Kotlin syntax
        env:
          LITERALIZER_LINT_CLASSPATH: /tmp/kotlinx-jars/*
        run: kotlin .github/scripts/lint-kotlin.main.kts < /tmp/files-to-lint
      # `uv` is needed by the `Kotlin roundtrip` step below; it runs the
      # helper in project mode so `import literalizer` resolves.
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      # Basic JSON -> Kotlin -> JSON round-trip (issue 1867). Runs here
      # because this is the job with the Kotlin toolchain on hand; the
      # script (issue 2709) prints
      # `ObjectMapper().writeValueAsString(myData)` so the classpath
      # points at the Jackson jars set up above. `uv run` (project mode,
      # not `--no-project`) is required so `import literalizer`
      # resolves. See `.github/scripts/run_kotlin_roundtrip.py`.
      - name: Kotlin roundtrip
        env:
          LITERALIZER_LINT_CLASSPATH: /tmp/jackson-jars/*
        run: uv run python .github/scripts/run_kotlin_roundtrip.py

  lint-swift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.swift' -print0 > /tmp/files-to-lint
          && test -s /tmp/files-to-lint
      - name: Install Swift
        uses: SwiftyLab/setup-swift@v1
        with:
          cache-snapshot: true
      # `-swift-version 5` matches the major version of
      # `Swift.language_version` in `src/literalizer/languages/swift.py`
      # (`V5_9`); keep them in sync. `-swift-version` only accepts the
      # language mode (4/4.2/5/6), not a point release.
      - name: Check Swift syntax
        run: |-
          cat > /tmp/check-swift.sh <<'SCRIPT'
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          cp "$1" "$tmpdir/check.swift"
          swiftc -swift-version 5 -typecheck -warnings-as-errors "$tmpdir/check.swift" || exit 1
          SCRIPT
          xargs -0 -P "$(nproc)" -n1 bash /tmp/check-swift.sh < /tmp/files-to-lint
      - name: Run Swift files
        run: xargs -0 -P "$(nproc)" -n1 swift -swift-version 5 -warnings-as-errors
          < /tmp/files-to-lint
      # `uv` is needed by the `Swift roundtrip` step below; it runs the
      # helper in project mode so `import literalizer` resolves.
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      # Basic JSON -> Swift -> JSON round-trip (issue 1867). Runs here
      # because this is the job with the Swift toolchain; `uv run`
      # (project mode, not `--no-project`) is required so
      # `import literalizer` resolves. See
      # `.github/scripts/run_swift_roundtrip.py`.
      - name: Swift roundtrip
        run: uv run python .github/scripts/run_swift_roundtrip.py

  lint-ocaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.ml' -print0 > /tmp/files-to-lint
          && test -s /tmp/files-to-lint
      - name: Install OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          # ``ocaml-compiler: 5`` resolves to the latest OCaml 5.x
          # release, which is ``>=`` the ``V5`` default of
          # ``OCaml.language_version`` in
          # ``src/literalizer/languages/ocaml.py``; keep them in sync.
          ocaml-compiler: 5
      - name: Check OCaml syntax
        run: |-
          tmpdir=$(mktemp -d)
          xargs -0 -n1 opam exec -- ocamlopt -c -o "$tmpdir/check.o" < /tmp/files-to-lint
      # Fixtures only declare ``module Check = struct ... end`` with a
      # ``my_data`` let-binding; OCaml evaluates struct bodies when the
      # module is initialized, so running the file as a script forces
      # the binding's right-hand side to execute.
      - name: Run OCaml files
        run: xargs -0 -P "$(nproc)" -n1 opam exec -- ocaml < /tmp/files-to-lint
      # ``uv`` is needed by the ``OCaml roundtrip`` step below; it runs
      # the helper in project mode so ``import literalizer`` resolves.
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      # Basic JSON -> OCaml -> JSON round-trip (issue 1867). Runs here
      # because this is the job with the OCaml toolchain; ``uv run``
      # (project mode, not ``--no-project``) is required so
      # ``import literalizer`` resolves. See
      # ``.github/scripts/run_ocaml_roundtrip.py``.
      # ``ocamlfind`` is not installed by ``ocaml/setup-ocaml@v3``; the
      # roundtrip helper invokes ``ocamlfind ocamlopt -package yojson``
      # to compile the literalized program, so install it alongside
      # yojson here.
      - name: Install yojson
        run: opam install -y yojson ocamlfind
      - name: OCaml roundtrip
        run: opam exec -- uv run python .github/scripts/run_ocaml_roundtrip.py

  lint-commonlisp:
    runs-on: ubuntu-latest
    # The ``LISP`` environment variable pins the SBCL build that
    # 40ants/setup-lisp installs to ``sbcl-bin/2.6.4`` (without the
    # version, ``sbcl-bin`` drifts to whatever is latest). SBCL
    # implements the fixed ``ANSI`` standard that
    # ``CommonLisp.language_version`` defaults to in
    # ``src/literalizer/languages/common_lisp.py``; the pin keeps the
    # installed SBCL build stable across CI runs rather than selecting
    # a language standard. Keep them in sync.
    env:
      LISP: sbcl-bin/2.6.4
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.lisp' -print0 > /tmp/files-to-lint
          && test -s /tmp/files-to-lint
      - name: Install SBCL
        uses: 40ants/setup-lisp@v4
      - name: Check Common Lisp syntax
        run: >-
          xargs -0 -P "$(nproc)" -I{} ros run
          --eval '(sb-ext:disable-debugger)'
          --load {}
          --quit
          < /tmp/files-to-lint

  lint-scala:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.scala' -print0 > /tmp/files-to-lint
          && test -s /tmp/files-to-lint
      - name: Cache Coursier artifacts
        uses: coursier/cache-action@v8
      - name: Install scala-cli
        uses: VirtusLab/scala-cli-setup@v1
      # Compile every fixture in a single scala-cli invocation to pay
      # the Scala compile + Bloop daemon startup cost once instead of
      # per fixture. Each fixture already carries a unique object name
      # derived from its case directory and stem, so a plain copy
      # suffices; no sed rewriting needed.
      #
      # `-S 3` matches the major version of `Scala.language_version` in
      # `src/literalizer/languages/scala.py` (`V3`); keep them in sync.
      # `-S` only accepts the Scala major version, not a point release.
      # ``--dep io.circe::circe-core:0.14.10`` supplies the
      # ``io.circe.Json`` value type the ``json_type=Scala.json_types.CIRCE``
      # fixtures import; keep the version aligned with the ``CIRCE``
      # entry in ``Scala.JsonTypes`` in ``src/literalizer/languages/scala.py``.
      - name: Run Scala files
        run: |-
          workspace=$(mktemp -d)
          main="$workspace/Main.scala"
          printf '@main def __run(): Unit = {\n' > "$main"
          while IFS= read -r -d '' f; do
            dir=$(basename "$(dirname "$f")")
            stem=$(basename "$f" .scala)
            stem="${stem%@*}"  # strip @version so the Scala object name is a valid identifier
            name="Fixture_${dir}_${stem}"
            cp "$f" "$workspace/${name}.scala"
            printf '%s.scala <- %s\n' "$name" "$f"
            printf '  val _%s = %s\n' "$name" "$name" >> "$main"
          done < /tmp/files-to-lint
          printf '}\n' >> "$main"
          scala-cli run "$workspace" -S 3 \
            --dep io.circe::circe-core:0.14.10 \
            --main-class __run
      # `uv` is needed by the `Scala roundtrip` step below; it runs the
      # helper in project mode so `import literalizer` resolves.
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      # Basic JSON -> Scala -> JSON round-trip (issue 1867). Runs here
      # because this is the job with the Scala toolchain; `uv run`
      # (project mode, not `--no-project`) is required so
      # `import literalizer` resolves.  See
      # `.github/scripts/run_scala_roundtrip.py`.
      - name: Scala roundtrip
        run: uv run python .github/scripts/run_scala_roundtrip.py

  lint-haxe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.hx' -print0 > /tmp/files-to-lint
          && test -s /tmp/files-to-lint
      # `haxe-version: 4.3.6` matches the major version of
      # `Haxe.language_version` (`V4`) in
      # `src/literalizer/languages/haxe.py`; keep them in sync.
      - name: Install Haxe
        uses: krdlab/setup-haxe@v2
        with:
          haxe-version: 4.3.6
      # Each fixture already carries a unique class name derived from
      # its case directory and stem (`Fixture_<dir>_<stem>`), so a plain
      # copy to `<class>.hx` suffices; no sed rewriting needed. The
      # fixtures are compiled and run in a single `haxe --interp`
      # invocation via a generated `Driver` that calls every fixture's
      # `main()`, paying Haxe compiler startup once across all fixtures.
      - name: Check Haxe syntax and run fixtures
        run: |-
          workspace=$(mktemp -d)
          driver="$workspace/Driver.hx"
          printf 'class Driver {\n  public static function main() {\n' > "$driver"
          while IFS= read -r -d '' f; do
            dir=$(basename "$(dirname "$f")")
            stem=$(basename "$f" .hx)
            stem="${stem%@*}"  # strip @version so the Haxe class name is a valid identifier
            name="Fixture_${dir}_${stem}"
            cp "$f" "$workspace/${name}.hx"
            printf '%s.hx <- %s\n' "$name" "$f"
            printf '    %s.main();\n' "$name" >> "$driver"
          done < /tmp/files-to-lint
          printf '  }\n}\n' >> "$driver"
          haxe -p "$workspace" --main Driver --interp
      # `uv` is needed by the `Haxe roundtrip` step below; it runs the
      # helper in project mode so `import literalizer` resolves.
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      # Basic JSON -> Haxe -> JSON round-trip (issue  # 1867). Runs here
      # because this is the job with the Haxe toolchain; `uv run`
      # (project mode, not `--no-project`) is required so `import
      # literalizer` resolves. See
      # `.github/scripts/run_haxe_roundtrip.py`.
      - name: Haxe roundtrip
        run: uv run python .github/scripts/run_haxe_roundtrip.py

  lint-dart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.dart' -print0 > /tmp/files-to-lint
          && test -s /tmp/files-to-lint
      - name: Install Dart
        uses: dart-lang/setup-dart@v1
      # Each fixture is its own implicit Dart library (no `library`
      # or `part` directives), so copying them all into one package
      # and analyzing in a single `dart analyze` invocation pays the
      # Dart VM startup cost once instead of per fixture. Fixtures are
      # renamed to `fixture_N.dart` because several fixtures share a
      # basename (e.g. `Dart.dart`); the mapping is printed so failures
      # still point back to the original path.
      #
      # Fixtures only declare a top-level `final my_data = ...`, and
      # Dart initializes top-level `final` lazily — `dart run` on a
      # bare fixture would never evaluate its initializer. Generate a
      # `main.dart` driver that imports every fixture and references
      # each `my_data`, so one `dart run` forces all initializers to
      # execute and surfaces runtime errors (e.g. a bad
      # `DateTime.parse` argument). Paying Dart VM startup once across
      # all fixtures keeps this step cheap.
      - name: Check Dart syntax and run fixtures
        run: |-
          tmpdir=$(mktemp -d)
          # `sdk: ^3.0.0` matches `Dart.language_version` (`V3`) in
          # `src/literalizer/languages/dart.py`; keep them in sync. Dart
          # has no `--langversion`-style flag, so the pubspec SDK
          # constraint is the only mechanism for pinning the version.
          printf 'name: check\nenvironment:\n  sdk: ^3.0.0\n' > "$tmpdir/pubspec.yaml"
          driver="$tmpdir/main.dart"
          : > "$driver"
          i=0
          while IFS= read -r -d '' f; do
            cp "$f" "$tmpdir/fixture_$i.dart"
            printf 'import "fixture_%d.dart" as f%d;\n' "$i" "$i" >> "$driver"
            printf 'fixture_%s.dart <- %s\n' "$i" "$f"
            i=$((i+1))
          done < /tmp/files-to-lint
          {
            printf 'void main() {\n'
            printf '  final sink = <Object?>[\n'
            for ((j=0; j<i; j++)); do
              printf '    f%d.my_data,\n' "$j"
            done
            printf '  ];\n'
            printf "  if (sink.isEmpty) throw StateError('unreachable');\n"
            printf '}\n'
          } >> "$driver"
          dart analyze --fatal-infos "$tmpdir"
          (cd "$tmpdir" && dart run main.dart)
      # `uv` is needed by the `Dart roundtrip` step below; it runs the
      # helper in project mode so `import literalizer` resolves.
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      # Basic JSON -> Dart -> JSON round-trip (issue 1867). Runs here
      # because this is the job with the Dart toolchain; `uv run`
      # (project mode, not `--no-project`) is required so `import
      # literalizer` resolves. See
      # `.github/scripts/run_dart_roundtrip.py`.
      - name: Dart roundtrip
        run: uv run python .github/scripts/run_dart_roundtrip.py

  lint-julia:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.jl' -print0 > /tmp/files-to-lint
          && test -s /tmp/files-to-lint
      # `version: '1.9'` is `>=` `Julia.language_version` (`V1_9`) in
      # `src/literalizer/languages/julia.py`; keep them in sync so the
      # fixture gate runs under the declared minimum Julia.
      - name: Install Julia
        uses: julia-actions/setup-julia@v3
        with:
          version: '1.9'
      # `JSON` is needed by the `Julia roundtrip` step below (see
      # `.github/scripts/run_julia_roundtrip.py`); `DataStructures`
      # backs the `OrderedDict` literals the fixture goldens use.
      - name: Set up Julia project
        run: |
          mkdir -p /tmp/julia-lint
          julia --startup-file=no --project=/tmp/julia-lint -e \
            'using Pkg; Pkg.add(["DataStructures", "JSON"]); Pkg.precompile()'
      - name: Run Julia golden files
        run: xargs -0 -P "$(nproc)" -n1 julia --startup-file=no --project=/tmp/julia-lint
          < /tmp/files-to-lint
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      # Basic JSON -> Julia -> JSON round-trip (issue 1867). Runs here
      # because this is the job with `julia` on PATH and the
      # `/tmp/julia-lint` project (with the `JSON` package) already
      # provisioned above; `JULIA_PROJECT` points the script's `julia`
      # subprocess at that project so `using JSON` resolves. `uv run`
      # (project mode, not `--no-project`) is required so
      # `import literalizer` resolves. See
      # `.github/scripts/run_julia_roundtrip.py`.
      - name: Julia roundtrip
        env:
          JULIA_PROJECT: /tmp/julia-lint
        run: uv run python .github/scripts/run_julia_roundtrip.py

  lint-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.go' -print0 > /tmp/files-to-lint
          && test -s /tmp/files-to-lint
      - name: Check Go syntax
        run: xargs -0 gofmt -e < /tmp/files-to-lint
      # `go 1.18` in the generated go.mod matches `Go.language_version`
      # in `src/literalizer/languages/go.py`; keep them in sync. `go vet`
      # and `go run` honour the module's `go` directive when invoked on
      # a file inside a module, so wrap each fixture in a tmpdir module.
      - name: Check Go compilation and run
        run: |-
          cat > /tmp/run-go.sh <<'SCRIPT'
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          cp "$1" "$tmpdir/main.go"
          { printf 'module fixture\n\ngo 1.18\n'; } > "$tmpdir/go.mod"
          (cd "$tmpdir" && go vet ./...) || exit 1
          (cd "$tmpdir" && go run ./...) || exit 1
          SCRIPT
          xargs -0 -P "$(nproc)" -n1 bash /tmp/run-go.sh < /tmp/files-to-lint
      # `uv` is needed by the `Go roundtrip` step below; it runs the
      # helper in project mode so `import literalizer` resolves.
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      # Basic JSON -> Go -> JSON round-trip (issue 1867). Runs here
      # because this is the job with the Go toolchain; `uv run` (project
      # mode, not `--no-project`) is required so `import literalizer`
      # resolves. See `.github/scripts/run_go_roundtrip.py`.
      - name: Go roundtrip
        run: uv run python .github/scripts/run_go_roundtrip.py

  lint-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.rs' -print0 > /tmp/files-to-lint
          && test -s /tmp/files-to-lint
      # Build chrono + serde_json once and stash the rlib paths in
      # `$GITHUB_ENV`; both the per-fixture compile step below and the
      # `Rust roundtrip` step reuse them. The build tmpdir is kept for
      # the rest of the job (the runner is ephemeral).
      - name: Build Rust dependencies
        run: |-
          tmpdir=$(mktemp -d)
          cargo init "$tmpdir/chrono-check"
          cargo add --manifest-path "$tmpdir/chrono-check/Cargo.toml" chrono
          cargo add --manifest-path "$tmpdir/chrono-check/Cargo.toml" serde_json
          cargo build --manifest-path "$tmpdir/chrono-check/Cargo.toml"
          deps="$tmpdir/chrono-check/target/debug/deps"
          chrono_rlib=$(find "$deps" -name "libchrono-*.rlib" -print -quit)
          test -n "$chrono_rlib"
          serde_json_rlib=$(find "$deps" -name "libserde_json-*.rlib" -print -quit)
          test -n "$serde_json_rlib"
          {
            echo "RUST_TMPDIR=$tmpdir"
            echo "RUST_DEPS=$deps"
            echo "RUST_CHRONO_RLIB=$chrono_rlib"
            echo "RUST_SERDE_JSON_RLIB=$serde_json_rlib"
          } >> "$GITHUB_ENV"
      - name: Check Rust syntax and run binaries
        run: |-
          # ``--edition 2021`` matches ``Rust.language_version`` in
          # ``src/literalizer/languages/rust.py``; keep them in sync.
          # rustc infers a crate name from the source filename and
          # rejects ``@`` in that name, so pass ``--crate-name`` with
          # the ``@<version>`` suffix sanitized to an underscore.
          while IFS= read -r -d '' f; do
            stem=$(basename "$f" .rs)
            crate_name=${stem//@/_}
            rustc --edition 2021 \
              --crate-name "$crate_name" \
              -L "dependency=$RUST_DEPS" \
              --extern "chrono=$RUST_CHRONO_RLIB" \
              --extern "serde_json=$RUST_SERDE_JSON_RLIB" \
              "$f" -o "$RUST_TMPDIR/out" 2>&1 || exit 1
            "$RUST_TMPDIR/out" || exit 1
          done < /tmp/files-to-lint
      # `uv` is needed by the `Rust roundtrip` step below; it runs the
      # helper in project mode so `import literalizer` resolves.
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      # Basic JSON -> Rust -> JSON round-trip (issue 1867). Runs here
      # because this is the job with the Rust toolchain and a prebuilt
      # `libserde_json-*.rlib`; `uv run` (project mode, not
      # `--no-project`) is required so `import literalizer` resolves.
      # See `.github/scripts/run_rust_roundtrip.py`.
      - name: Rust roundtrip
        run: uv run python .github/scripts/run_rust_roundtrip.py "$RUST_DEPS" "$RUST_SERDE_JSON_RLIB"

  lint-r:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.R' -print0 > /tmp/files-to-lint
          && test -s /tmp/files-to-lint
      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          windows-path-include-rtools: false
          # `4.4.0` is `>=` the `R.language_version` default (`V4`) in
          # `src/literalizer/languages/r.py`; keep them in sync. Without
          # this pin `setup-r` installs whatever it considers `release`,
          # so the R that compiles the fixtures drifts.
          r-version: 4.4.0
      - name: Check R syntax
        run: xargs -0 Rscript -e 'for (f in commandArgs(trailingOnly=TRUE)) parse(file=f)'
          < /tmp/files-to-lint
      - name: Run R files
        run: xargs -0 -P "$(nproc)" -n1 Rscript < /tmp/files-to-lint
      # `jsonlite` is needed by the `R roundtrip` step below (see
      # `.github/scripts/run_r_roundtrip.py`); install it into a
      # per-job library directory and point `R_LIBS_USER` at it so the
      # script's `Rscript` subprocess can `library(jsonlite)`.
      - name: Install jsonlite
        run: |
          mkdir -p /tmp/r-lint-libs
          Rscript -e 'install.packages("jsonlite", lib="/tmp/r-lint-libs", repos="https://cloud.r-project.org")'
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      # Basic JSON -> R -> JSON round-trip (issue 1867). Runs here
      # because this is the job with `Rscript` on PATH and the
      # `/tmp/r-lint-libs` library (with the `jsonlite` package) already
      # provisioned above; `R_LIBS_USER` points the script's `Rscript`
      # subprocess at that library so `library(jsonlite)` resolves.
      # `uv run` (project mode, not `--no-project`) is required so
      # `import literalizer` resolves. See
      # `.github/scripts/run_r_roundtrip.py`.
      - name: R roundtrip
        env:
          R_LIBS_USER: /tmp/r-lint-libs
        run: uv run python .github/scripts/run_r_roundtrip.py

  lint-d:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.d' -print0 > /tmp/files-to-lint
          && test -s /tmp/files-to-lint
      # ``compiler: dmd-2.112.0`` implements D ``>=`` the ``V2`` default
      # of ``D.language_version`` in ``src/literalizer/languages/d.py``;
      # keep them in sync. Every ``dmd-2.x`` release implements the D2
      # language, so this pin tracks a concrete compiler build rather
      # than a language standard, and avoids the ``dmd-latest`` drift.
      - name: Install DMD
        uses: dlang-community/setup-dlang@v2
        with:
          compiler: dmd-2.112.0
      # D derives the module name from the source filename and rejects
      # ``@`` as a non-identifier character, so copy each fixture to a
      # sanitized name before invoking ``dmd``.
      - name: Check D syntax
        run: |-
          cat > /tmp/check-d.sh <<'SCRIPT'
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          cp "$1" "$tmpdir/check.d"
          dmd -o- -c "$tmpdir/check.d"
          SCRIPT
          xargs -0 -P "$(nproc)" -n1 bash /tmp/check-d.sh < /tmp/files-to-lint
      # Each fixture defines its own main, so compile and run directly.
      # Each invocation gets a private tmpdir so parallel builds don't
      # clobber each other's intermediate object files or output binary.
      - name: Run D files
        run: |-
          cat > /tmp/run-d.sh <<'SCRIPT'
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          cp "$1" "$tmpdir/check.d"
          dmd -of="$tmpdir/run" -od="$tmpdir" "$tmpdir/check.d" || exit 1
          "$tmpdir/run" || exit 1
          SCRIPT
          xargs -0 -P "$(nproc)" -n1 bash /tmp/run-d.sh < /tmp/files-to-lint
      # `uv` is needed by the `D roundtrip` step below; it runs the
      # helper in project mode so `import literalizer` resolves.
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      # Basic JSON -> D -> JSON round-trip (issue 1867). Runs here
      # because this is the job with the D toolchain; `uv run` (project
      # mode, not `--no-project`) is required so `import literalizer`
      # resolves. See `.github/scripts/run_d_roundtrip.py`.
      - name: D roundtrip
        run: uv run python .github/scripts/run_d_roundtrip.py

  lint-crystal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.cr' -print0 > /tmp/files-to-lint
          && test -s /tmp/files-to-lint
      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          # `crystal: 1.20.0` is `>=` `Crystal.language_version` (`V1`,
          # i.e. Crystal 1.x) in `src/literalizer/languages/crystal.py`;
          # keep them in sync.
          crystal: 1.20.0
      # Compile every fixture in a single `crystal run` invocation to
      # pay Crystal's front-end + LLVM codegen + link cost once instead
      # of per fixture. Each fixture already carries a unique module name
      # derived from its case directory and stem, so a plain copy
      # suffices; no shell wrapping or sed rewriting needed. The driver
      # `require`s every fixture so each module body executes at program
      # start. The `name.cr <- original-path` mapping is printed so
      # failures still point back to the source.
      - name: Run Crystal files
        run: |-
          workspace=$(mktemp -d)
          driver="$workspace/run_all.cr"
          : > "$driver"
          while IFS= read -r -d '' f; do
            dir=$(basename "$(dirname "$f")")
            stem=$(basename "$f" .cr)
            stem="${stem%@*}"  # strip @version so the Crystal module name is a valid identifier
            name="Fixture_${dir}_${stem}"
            cp "$f" "$workspace/${name}.cr"
            printf 'require "./%s"\n' "$name" >> "$driver"
            printf '%s.cr <- %s\n' "$name" "$f"
          done < /tmp/files-to-lint
          crystal run "$driver"
      # `uv` is needed by the `Crystal roundtrip` step below; it runs
      # the helper in project mode so `import literalizer` resolves.
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      # Basic JSON -> Crystal -> JSON round-trip (issue 1867). Runs here
      # because this is the job with the Crystal toolchain; `uv run`
      # (project mode, not `--no-project`) is required so `import
      # literalizer` resolves. See
      # `.github/scripts/run_crystal_roundtrip.py`.
      - name: Crystal roundtrip
        run: uv run python .github/scripts/run_crystal_roundtrip.py

  # Mojo reserves ~3.6 GB of virtual address space per invocation
  # (upstream: modular/modular#6433), so ubuntu-latest's 7 GB runner
  # crashes in libKGENCompilerRTShared.so before producing any output —
  # and even with overcommit + swap workarounds it could only run
  # serially. Ubicloud's 16 GB runner comfortably fits `$(nproc)`
  # parallel invocations without the workarounds.
  lint-mojo:
    runs-on: ubicloud-standard-4
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.mojo' -print0 > /tmp/files-to-lint
          && test -s /tmp/files-to-lint
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      # ``mojo-compiler==1.0.0b1`` is >= the ``VersionFormats.V24_5``
      # value of ``Mojo.language_version`` in
      # ``src/literalizer/languages/mojo.py``; keep them in sync.
      - name: Install Mojo
        run: uv tool install --prerelease=allow 'mojo-compiler==1.0.0b1'
      - name: Check Mojo syntax
        run: xargs -0 -P "$(nproc)" -n1 mojo run --Werror < /tmp/files-to-lint

  lint-nim:
    runs-on: ubuntu-latest
    # Promote every Nim warning to a CI failure. Nim's
    # ``--warningAsError`` rejects ``all:on`` and bare ``on``, so list
    # each warning name explicitly. The catalogue comes from
    # ``nim check --warnings:list`` — revisit when Nim is upgraded in
    # case new warnings have been added. Shared across both the syntax
    # check and the run step via a job-level env var.
    env:
      # Pin the Nim toolchain so the installed compiler does not drift.
      # ``2.2.10`` is ``>=`` the ``Nim.language_version`` (``V2``, i.e.
      # Nim 2.x) default in ``src/literalizer/languages/nim.py``; keep
      # them in sync. The ``NIM_WARNING_FLAGS`` catalogue below is
      # Nim-version-sensitive (it must list exactly the warnings the
      # pinned compiler's ``nim check --warnings:list`` reports, e.g.
      # ``ImplicitRangeConversion`` is absent in older 2.2.x patch
      # releases such as 2.2.4), so regenerate that list when bumping
      # this pin.
      NIM_VERSION: 2.2.10
      NIM_WARNING_FLAGS: >-
        --warningAsError:AboveMaxSizeSet:on
        --warningAsError:AmbiguousLink:on
        --warningAsError:AnyEnumConv:on
        --warningAsError:BareExcept:on
        --warningAsError:BrokenLink:on
        --warningAsError:CStringConv:on
        --warningAsError:CannotOpen:on
        --warningAsError:CannotOpenFile:on
        --warningAsError:CaseTransition:on
        --warningAsError:CastSizes:on
        --warningAsError:CommentXIgnored:on
        --warningAsError:ConfigDeprecated:on
        --warningAsError:CycleCreated:on
        --warningAsError:Deprecated:on
        --warningAsError:Destructor:on
        --warningAsError:DotLikeOps:on
        --warningAsError:EachIdentIsTuple:on
        --warningAsError:Effect:on
        --warningAsError:EnumConv:on
        --warningAsError:FieldXNotSupported:on
        --warningAsError:FileChanged:on
        --warningAsError:GcMem:on
        --warningAsError:GcUnsafe:on
        --warningAsError:GcUnsafe2:on
        --warningAsError:GlobalVarConstructorTemporary:on
        --warningAsError:HoleEnumConv:on
        --warningAsError:IgnoredSymbolInjection:on
        --warningAsError:ImplicitDefaultValue:on
        --warningAsError:ImplicitRangeConversion:on
        --warningAsError:ImplicitTemplateRedefinition:on
        --warningAsError:IndexCheck:on
        --warningAsError:InheritFromException:on
        --warningAsError:LanguageXNotSupported:on
        --warningAsError:LockLevel:on
        --warningAsError:LongLiterals:on
        --warningAsError:ObservableStores:on
        --warningAsError:OctalEscape:on
        --warningAsError:ProveField:on
        --warningAsError:ProveIndex:on
        --warningAsError:ProveInit:on
        --warningAsError:PtrToCstringConv:on
        --warningAsError:RedefinitionOfLabel:on
        --warningAsError:ResultShadowed:on
        --warningAsError:ResultUsed:on
        --warningAsError:SmallLshouldNotBeUsed:on
        --warningAsError:Spacing:on
        --warningAsError:StdPrefix:on
        --warningAsError:StmtListLambda:on
        --warningAsError:StrictNotNil:on
        --warningAsError:TypelessParam:on
        --warningAsError:Uninit:on
        --warningAsError:UnknownMagic:on
        --warningAsError:UnknownNotes:on
        --warningAsError:UnknownSubstitutionX:on
        --warningAsError:UnnamedBreak:on
        --warningAsError:UnreachableCode:on
        --warningAsError:UnreachableElse:on
        --warningAsError:UnsafeCode:on
        --warningAsError:UnsafeDefault:on
        --warningAsError:UnsafeSetLen:on
        --warningAsError:UnusedImport:on
        --warningAsError:UnusedImportdoc:on
        --warningAsError:UseBase:on
        --warningAsError:User:on
        --warningAsError:WriteToForeignHeap:on
        --warningAsError:XIsNeverRead:on
        --warningAsError:XmightNotBeenInit:on
        --warningAsError:warnRstStyle:on
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.nim' -print0 > /tmp/files-to-lint
          && test -s /tmp/files-to-lint
      - name: Install Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: ${{ env.NIM_VERSION }}
      # Nim derives the module name from the source filename and
      # rejects ``@`` as a non-identifier character, so copy each
      # fixture to a sanitized name before invoking ``nim c -r``.
      - name: Run Nim files
        run: |-
          cat > /tmp/run-nim.sh <<'SCRIPT'
          read -r -a warning_flags <<< "$NIM_WARNING_FLAGS"
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          cp "$1" "$tmpdir/check.nim"
          nim c -r --hints:off "${warning_flags[@]}" \
            --nimcache:"$tmpdir" "$tmpdir/check.nim"
          SCRIPT
          xargs -0 -P "$(nproc)" -n1 bash /tmp/run-nim.sh < /tmp/files-to-lint

      # ``uv`` is needed by the ``Nim roundtrip`` step below; it runs
      # the helper in project mode so ``import literalizer`` resolves.
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      # Basic JSON -> Nim -> JSON round-trip (issue 1867). Runs here
      # because this is the job with the Nim toolchain (pinned by the
      # ``Install Nim`` step above); ``uv run`` (project mode, not
      # ``--no-project``) is required so ``import literalizer`` resolves.
      # See ``.github/scripts/run_nim_roundtrip.py``.
      - name: Nim roundtrip
        run: uv run python .github/scripts/run_nim_roundtrip.py

  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      # ``test -s`` guards against the version tag drifting from these
      # patterns and silently dropping every fixture; see the
      # ``Python.VersionFormats`` enum in
      # ``src/literalizer/languages/python.py``.
      - name: Find Python 3.8 golden files
        shell: bash
        run: find tests/integration/cases -name 'Python_version_py38@py38.py' -print0
          > /tmp/files-python38 && test -s /tmp/files-python38
      - name: Run Python 3.8 golden files
        run: xargs -0 -P "$(nproc)" -n1 uv run --python 3.8 --no-project python <
          /tmp/files-python38
      - name: Find default Python golden files
        shell: bash
        run: find tests/integration/cases -name 'Python@py39.py' -print0 > /tmp/files-python
          && test -s /tmp/files-python
      # The default (``@py39``) Python fixtures emit ``datetime.UTC``,
      # which requires Python 3.11+, so they cannot run on the 3.8
      # interpreter used above. Pin this run to the
      # ``requires-python = ">=3.12"`` floor in ``pyproject.toml`` so a
      # generator change that outpaces the declared minimum interpreter
      # fails CI loudly here rather than silently working on a newer
      # version; keep this in sync with that floor.
      - name: Run default Python golden files
        run: xargs -0 -P "$(nproc)" -n1 uv run --python 3.12 --no-project python <
          /tmp/files-python

  lint-racket:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.rkt' -print0 > /tmp/files-to-lint
          && test -s /tmp/files-to-lint
      # The pinned Racket ``8.17`` is ``>=`` the ``V8`` default of
      # ``Racket.language_version`` in
      # ``src/literalizer/languages/racket.py``; keep them in sync.
      # Racket has no ``--langversion``-style flag, so the pinned
      # release is the only mechanism for pinning the language version.
      # Without an explicit ``version`` the installed Racket drifts
      # with the ``setup-racket`` action default.
      - uses: Bogdanp/setup-racket@v1.15
        with:
          version: '8.17'
      - name: Check Racket syntax
        run: xargs -0 raco make < /tmp/files-to-lint
      - name: Run Racket files
        run: xargs -0 -P "$(nproc)" -n1 racket < /tmp/files-to-lint
      # `uv` is needed by the `Racket roundtrip` step below; it runs
      # the helper in project mode so `import literalizer` resolves.
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      # Basic JSON -> Racket -> JSON round-trip (issue 1867). Runs here
      # because this is the job with the Racket toolchain (`racket` on
      # PATH, the built-in `json` module available); `uv run` (project
      # mode, not `--no-project`) is required so `import literalizer`
      # resolves. See `.github/scripts/run_racket_roundtrip.py`.
      - name: Racket roundtrip
        run: uv run python .github/scripts/run_racket_roundtrip.py

  lint-raku:
    runs-on: ubuntu-latest
    # The pinned Rakudo ``2026.04`` release implements Raku language
    # version 6.d, the ``V6D`` default of ``Raku.language_version`` in
    # ``src/literalizer/languages/raku.py``; keep them in sync. Rakudo
    # has no ``--langversion``-style flag, so the pinned compiler
    # release is the only mechanism for pinning the language version.
    env:
      RAKU_VERSION: '2026.04'
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.raku' -print0 > /tmp/files-to-lint
          && test -s /tmp/files-to-lint
      - name: Install Raku
        uses: Raku/setup-raku@v1
        with:
          raku-version: ${{ env.RAKU_VERSION }}
      # ``JSON::Fast`` is the standard Raku JSON library used by the
      # ``Raku roundtrip`` step below; Rakudo has no standard-library
      # JSON serializer.  ``--/test`` skips the module's own test suite
      # to keep the install fast.  See
      # ``.github/scripts/run_raku_roundtrip.py``.
      - name: Install JSON::Fast
        run: zef install --/test JSON::Fast
      - name: Check Raku syntax
        run: xargs -0 -P "$(nproc)" -n1 raku -c < /tmp/files-to-lint
      - name: Run Raku files
        run: xargs -0 -P "$(nproc)" -n1 raku < /tmp/files-to-lint

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      # Basic JSON -> Raku -> JSON round-trip (issue 1867). Runs here
      # because this is the job with the Raku toolchain (pinned by the
      # `Install Raku` step above) and ``JSON::Fast`` provisioned by the
      # `Install JSON::Fast` step; `uv run` (project mode, not
      # `--no-project`) is required so `import literalizer` resolves.
      # See `.github/scripts/run_raku_roundtrip.py`.
      - name: Raku roundtrip
        run: uv run python .github/scripts/run_raku_roundtrip.py

  lint-zig:
    runs-on: ubuntu-latest
    # Every Zig fixture on disk carries the tag from
    # ``Zig.VersionFormats`` (e.g. `Zig@v0_12.zig`); bumping the
    # compiler pin and the enum member name are reviewed together.
    env:
      ZIG_VERSION: 0.14.0
      ZIG_FIXTURE_TAG: v0_12
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: python3 -m tests.integration.list_fixtures .zig "$ZIG_FIXTURE_TAG" >
          /tmp/files-to-lint && test -s /tmp/files-to-lint
      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      # Compile every fixture in a single `zig run` invocation to pay
      # the Zig compiler + std parse cost once instead of per fixture.
      # Fixtures all declare `pub fn main() void`, renamed to a unique
      # `pub fn fixtureN()` and `@import`-ed from a generated driver
      # that calls each one so every fixture body still executes. The
      # mapping is printed so failures still point back to the original
      # path.
      - name: Run Zig files
        run: |-
          workspace=$(mktemp -d)
          driver="$workspace/main.zig"
          imports="$workspace/imports.zig.part"
          calls="$workspace/calls.zig.part"
          : > "$imports"
          : > "$calls"
          i=0
          while IFS= read -r -d '' f; do
            sed "s/^pub fn main(/pub fn fixture$i(/" "$f" \
              > "$workspace/fixture_$i.zig"
            printf 'const fix%d = @import("fixture_%d.zig");\n' "$i" "$i" >> "$imports"
            printf '    fix%d.fixture%d();\n' "$i" "$i" >> "$calls"
            printf 'fixture_%d.zig <- %s\n' "$i" "$f"
            i=$((i+1))
          done < /tmp/files-to-lint
          {
            cat "$imports"
            printf 'pub fn main() void {\n'
            cat "$calls"
            printf '}\n'
          } > "$driver"
          zig run "$driver"
      # `uv` is needed by the `Zig roundtrip` step below; it runs the
      # helper in project mode so `import literalizer` resolves.
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      # Basic JSON -> Zig -> JSON round-trip (issue 1867). Runs here
      # because this is the job with the Zig toolchain; `uv run`
      # (project mode, not `--no-project`) is required so
      # `import literalizer` resolves. See
      # `.github/scripts/run_zig_roundtrip.py`.
      - name: Zig roundtrip
        run: uv run python .github/scripts/run_zig_roundtrip.py

  lint-systemverilog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.sv' -print0 > /tmp/files-to-lint
          && test -s /tmp/files-to-lint
      - name: Install Verilator
        uses: veryl-lang/setup-verilator@v2
      # `--language 1800-2017` matches `SystemVerilog.language_version` in
      # `src/literalizer/languages/systemverilog.py`
      # (`SystemVerilog.VersionFormats.IEEE_1800_2017` maps to the
      # IEEE 1800-2017 SystemVerilog standard); keep them in sync.
      - name: Check SystemVerilog syntax
        run: xargs -0 -P "$(nproc)" -n1 verilator --lint-only --language 1800-2017
          -Wno-REALCVT < /tmp/files-to-lint

  lint-v:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.v' -print0 > /tmp/files-to-lint
          && test -s /tmp/files-to-lint
      # The pinned ``weekly.2026.08`` release is ``>=`` the ``V0_4``
      # default of ``V.language_version`` in
      # ``src/literalizer/languages/v.py``; keep them in sync.  Use a
      # prebuilt release archive (which bundles the ``v`` binary and
      # tcc) rather than building from source: V's ``make`` re-clones
      # the *latest* ``vc`` C bootstrap, which fails to compile an old
      # tagged ``vlib``.  A pinned release artifact stops the compiler
      # drifting with upstream ``master``.  A ``weekly.*`` tag (rather
      # than the ``0.5.1`` stable, which is from 2024) is required:
      # ``0.5.1`` has an interface-codegen bug that miscompiles the
      # literalizer's ``IVal`` float fixtures (``main__IVal has no
      # member named _f64``).  The bundled tcc also miscompiles V's
      # generated C on this runner (``undefined symbol
      # builtin__memdup``), so the build uses the runner's system
      # ``gcc`` as the C backend (``-cc gcc``) instead.
      - name: Install V
        run: |
          curl -fsSL -o /tmp/v_linux.zip https://github.com/vlang/v/releases/download/weekly.2026.08/v_linux.zip
          unzip -q /tmp/v_linux.zip -d /tmp
          sudo ln -s /tmp/v/v /usr/local/bin/v
          # The prebuilt binary lazily creates ``~/.vmodules`` (and the
          # C compile cache) on its first run.  The ``Check V syntax``
          # and ``Run V files`` steps each fan out across ``nproc``
          # parallel ``v`` processes, which otherwise race to create
          # those folders and panic (``V panic: folder: ~/.vmodules/,
          # error: File exists``).  Warm up once, serially, with the
          # same ``v -cc gcc run`` invocation the parallel step uses so
          # every lazily-created directory exists beforehand.
          echo 'fn main() {}' > /tmp/v-warmup.v
          v -cc gcc run /tmp/v-warmup.v > /dev/null 2>&1 || true
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      - name: Check V syntax
        run: xargs -0 -P "$(nproc)" -n1 uv run --no-project python .github/scripts/check_v_syntax.py
          < /tmp/files-to-lint
      - name: Run V files
        run: xargs -0 -P "$(nproc)" -n1 v -cc gcc run < /tmp/files-to-lint
      # Driven from `lint-v` because that is the job where the pinned
      # `v` binary (installed by the `Install V` step above) is on
      # `PATH`; `uv run` (project mode, not `--no-project`) is required
      # so `import literalizer` resolves.
      # See `.github/scripts/run_v_roundtrip.py`.
      - name: V roundtrip
        run: uv run python .github/scripts/run_v_roundtrip.py

  lint-objectivec:
    # ``macos-15`` pins the runner image (the current ``macos-latest``
    # alias) so the Apple ``clang`` it ships stays fixed. That clang
    # supports the Objective-C 2.0 (``V2``) language generation that
    # ``ObjectiveC.language_version`` in
    # ``src/literalizer/languages/objective_c.py`` defaults to; keep them
    # in sync. ``V2`` is a fixed language generation, so the pin is for
    # build reproducibility, not to track a moving standard.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name 'ObjectiveC*.m' -print0 > /tmp/files-to-lint
          && test -s /tmp/files-to-lint
      # Every fixture `#import`s `<Foundation/Foundation.h>`, whose parse
      # cost dominates each tiny TU. Precompile Foundation once and
      # preload it in the syntax-check and build-and-run steps so the
      # parsed AST is reused instead of re-parsed per fixture. clang-tidy
      # runs in a separate job (`lint-objectivec-tidy`) and deliberately
      # skips the PCH — see the note on `lint-cpp-tidy`.
      - name: Build precompiled header
        run: clang -x objective-c-header .github/scripts/lint-objc-pch.h -o /tmp/pch.h.pch
      - name: Check Objective-C syntax
        run: xargs -0 -P "$(sysctl -n hw.ncpu)" -n1 clang -fsyntax-only -Werror -include-pch
          /tmp/pch.h.pch < /tmp/files-to-lint
      # Each fixture defines its own main, so compile and run directly.
      # Link against Foundation and execute to surface runtime errors.
      # Each invocation gets a private tmpdir so parallel builds don't
      # clobber each other's output binary.
      - name: Run Objective-C files
        run: |-
          cat > /tmp/run-objc.sh <<'SCRIPT'
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          clang -framework Foundation -Werror -include-pch /tmp/pch.h.pch "$1" \
            -o "$tmpdir/out" || exit 1
          "$tmpdir/out" || exit 1
          SCRIPT
          xargs -0 -P "$(sysctl -n hw.ncpu)" -n1 bash /tmp/run-objc.sh < /tmp/files-to-lint
      # `uv` is needed by the `Objective-C roundtrip` step below; it runs
      # the helper in project mode so `import literalizer` resolves.
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      # Basic JSON -> Objective-C -> JSON round-trip (issue 2668). Runs
      # here because this is the job with the Objective-C toolchain
      # (Apple `clang` plus the `Foundation` framework); `uv run`
      # (project mode, not `--no-project`) is required so
      # `import literalizer` resolves. See
      # `.github/scripts/run_objective_c_roundtrip.py`.
      - name: Objective-C roundtrip
        run: uv run python .github/scripts/run_objective_c_roundtrip.py

  lint-objectivec-tidy:
    # ``macos-15`` pins the runner image to match ``lint-objectivec`` so
    # the Apple ``clang`` headers that Homebrew ``clang-tidy`` parses stay
    # fixed against the Objective-C 2.0 (``V2``)
    # ``ObjectiveC.language_version`` default in
    # ``src/literalizer/languages/objective_c.py``; keep them in sync.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name 'ObjectiveC*.m' -print0 > /tmp/files-to-lint
          && test -s /tmp/files-to-lint
      # macos-15-arm64 ships Apple's clang but no clang-tidy, so pull it
      # from Homebrew's llvm formula. The PyPI clang-tidy (used in the
      # Ubuntu jobs) doesn't work here: it can't find Apple's Foundation
      # framework headers and mis-parses Objective-C literal initializers.
      # This job is split from the syntax and build-and-run job
      # (`lint-objectivec`) so the Homebrew install runs in parallel with
      # the Apple-clang compile steps instead of serializing after them —
      # Homebrew's llvm would otherwise prepend itself to `PATH` and
      # shadow the Apple clang that the PCH was built against.
      - name: Install clang-tidy
        run: |-
          brew install --quiet llvm
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"
      - name: Run clang-tidy
        run: xargs -0 -P "$(sysctl -n hw.ncpu)" -n1 clang-tidy < /tmp/files-to-lint

  completion-lint:
