      - lint-cpp-tidy
      - lint-cobol
      - lint-cpp
      - lint-kotlin
      - lint-swift
      - lint-ocaml
      - lint-commonlisp
      - lint-scala
      - lint-haxe
      - lint-dart
      - lint-go
      - lint-julia
      - lint-r
      - lint-d
      - lint-crystal
      - lint-mojo
      - lint-nim
      - lint-python
