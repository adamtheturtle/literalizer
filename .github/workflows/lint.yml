  lint-matlab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/Matlab*.m
      - name: Install Octave
        if: steps.find-files.outputs.found == 'true'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq octave
      # Octave is a practical CI substitute, but it does not support
      # every MATLAB builtin.  Skip files that use features Octave lacks:
      #  - datetime(): not yet implemented in Octave
      #  - ""-escaped quotes: Octave accepts some backslash escapes
      #    (e.g. \") that MATLAB rejects, so the check would be misleading
      - name: Check MATLAB syntax (Octave-compatible files)
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            if grep -q '""' "$f"; then
              echo "Skipping Octave parse check for MATLAB-escaped quotes in $f"
              continue
            fi
            if grep -qw 'datetime' "$f"; then
              echo "Skipping $f — uses datetime(), which Octave does not implement"
              continue
            fi
            octave --norc --no-gui "$f" || exit 1
          done < /tmp/files-to-lint

  lint-mojo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.mojo
      - name: Install pixi
        if: steps.find-files.outputs.found == 'true'
        uses: fabasoad/setup-mojo-action@v3
      - name: Install Mojo
        if: steps.find-files.outputs.found == 'true'
        run: |-
          pixi global install --channel conda-forge --channel https://conda.modular.com/max mojo
      # The Mojo runtime has a known bug where it randomly crashes
      # with "mojo: error: execution crashed" (see #558).
      # This is not caused by our code. Retry each file individually
      # so that a crash on one file does not block the rest.
      - name: Check Mojo syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          failed=0
          while IFS= read -r -d '' f; do
            ok=0
            for attempt in 1 2 3; do
              if mojo run --Werror "$f"; then
                ok=1
                break
              fi
              echo "::warning::Attempt $attempt failed for $f, retrying..."
              sleep 2
            done
            if [ "$ok" -eq 0 ]; then
              echo "::error::Failed after 3 attempts: $f"
              failed=1
            fi
          done < /tmp/files-to-lint
          exit "$failed"

