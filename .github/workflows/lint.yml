  lint-yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.yaml' ! -name 'input.yaml' -print0
          > /tmp/files-to-lint
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      - name: Check YAML syntax
        run: |-
          xargs -0 uvx yamllint --strict -d '{extends: default, rules: {document-start: disable, line-length: disable}}' -- < /tmp/files-to-lint

  lint-systemverilog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.sv' -print0 > /tmp/files-to-lint
      - name: Install Verilator
        uses: veryl-lang/setup-verilator@v2
      - name: Check SystemVerilog syntax
        run: xargs -0 -P "$(nproc)" -n1 verilator --lint-only --language 1800-2017
          -Wno-REALCVT < /tmp/files-to-lint

  lint-visualbasic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.vb' -print0 > /tmp/files-to-lint
      - name: Initialize .NET runtime
        run: |
          mkdir -p /tmp/.dotnet/shm
          dotnet --info
      # Build a small Roslyn host once, then feed every fixture through
      # its stdin so the .NET runtime and VB compiler load once instead
      # of per fixture. Replaces `dotnet build` per fixture, which paid
      # MSBuild + NuGet restore + compiler startup each time.
      - name: Build VB lint host
        run: dotnet publish .github/scripts/lint-vb/lint-vb.csproj -c Release -o /tmp/lint-vb
          --nologo
      - name: Check VB.NET syntax
        run: dotnet /tmp/lint-vb/lint-vb.dll < /tmp/files-to-lint

  lint-forth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.fth' -print0 > /tmp/files-to-lint
      - name: Install Gforth
        run: sudo apt-get update -qq && sudo apt-get install -y -qq gforth
      - name: Check Forth syntax
        run: |-
          while IFS= read -r -d '' f; do
            gforth "$f" -e bye || exit 1
          done < /tmp/files-to-lint

  lint-fortran:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.f90' -print0 > /tmp/files-to-lint
      - name: Check Fortran syntax
        run: xargs -0 gfortran -std=f2008 -ffree-line-length-none -fsyntax-only <
          /tmp/files-to-lint
      # Every fixture defines its own `fval_m` module, and the syntax
      # check above leaves an `fval_m.mod` in the working directory
      # (gfortran emits .mod files even under `-fsyntax-only`). gfortran
      # would then reuse that stale .mod instead of recompiling each
      # file's inline module, masking references to names defined only
      # in the current file. Compile each file from inside a private
      # tmpdir so the stale .mod is not on the module search path and
      # parallel runs cannot clobber each other's output.
      - name: Run Fortran files
        run: |-
          cat > /tmp/run-fortran.sh <<'SCRIPT'
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          src=$(realpath "$1")
          cd "$tmpdir" || exit 1
          gfortran -std=f2008 -ffree-line-length-none "$src" -o run || exit 1
          ./run || exit 1
          SCRIPT
          xargs -0 -P "$(nproc)" -n1 bash /tmp/run-fortran.sh < /tmp/files-to-lint

  lint-objectivec:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name 'ObjectiveC*.m' -print0 > /tmp/files-to-lint
      # Every fixture `#import`s `<Foundation/Foundation.h>`, whose parse
      # cost dominates each tiny TU. Precompile Foundation once and
      # preload it in the syntax-check and build-and-run steps so the
      # parsed AST is reused instead of re-parsed per fixture. clang-tidy
      # runs in a separate job (`lint-objectivec-tidy`) and deliberately
      # skips the PCH — see the note on `lint-cpp-tidy`.
      - name: Build precompiled header
        run: clang -x objective-c-header .github/scripts/lint-objc-pch.h -o /tmp/pch.h.pch
      - name: Check Objective-C syntax
        run: xargs -0 -P "$(sysctl -n hw.ncpu)" -n1 clang -fsyntax-only -Werror -include-pch
          /tmp/pch.h.pch < /tmp/files-to-lint
      # Fixtures define `check_(void)` with no main entry point, so
      # compile each alongside a tiny wrapper that calls it. Link
      # against Foundation and execute to surface runtime errors. Each
      # invocation gets a private tmpdir so parallel builds don't clobber
      # each other's output binary.
      - name: Run Objective-C files
        run: |-
          cat > /tmp/run-objc.sh <<'SCRIPT'
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          clang -framework Foundation -Werror -include-pch /tmp/pch.h.pch "$1" \
            .github/scripts/objc_main.m -o "$tmpdir/out" || exit 1
          "$tmpdir/out" || exit 1
          SCRIPT
          xargs -0 -P "$(sysctl -n hw.ncpu)" -n1 bash /tmp/run-objc.sh < /tmp/files-to-lint

  lint-objectivec-tidy:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name 'ObjectiveC*.m' -print0 > /tmp/files-to-lint
      # macos-15-arm64 ships Apple's clang but no clang-tidy, so pull it
      # from Homebrew's llvm formula. This job is split from the syntax
      # and build-and-run job (`lint-objectivec`) so the Homebrew install
      # runs in parallel with the Apple-clang compile steps instead of
      # serializing after them — Homebrew's llvm would otherwise prepend
      # itself to `PATH` and shadow the Apple clang that the PCH was
      # built against.
      - name: Install clang-tidy
        run: |-
          brew install --quiet llvm
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"
      - name: Run clang-tidy
        run: xargs -0 -P "$(sysctl -n hw.ncpu)" -n1 clang-tidy < /tmp/files-to-lint

  lint-wren:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.wren' -print0 > /tmp/files-to-lint
      - name: Install Wren CLI
        run: |
          curl -fsSL https://github.com/wren-lang/wren-cli/releases/download/0.4.0/wren-cli-linux-0.4.0.zip -o /tmp/wren.zip
          unzip -o /tmp/wren.zip -d /tmp/wren
          sudo install /tmp/wren/wren-cli-linux-0.4.0/wren_cli /usr/local/bin/wren_cli
      - name: Run Wren files
        run: xargs -0 -P "$(nproc)" -n1 wren_cli < /tmp/files-to-lint

  lint-v:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.v' -print0 > /tmp/files-to-lint
      - name: Install V
        run: |
          git clone --depth=1 https://github.com/vlang/v /tmp/vlang
          cd /tmp/vlang && make
          sudo ln -s /tmp/vlang/v /usr/local/bin/v
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      - name: Check V syntax
        run: xargs -0 -P "$(nproc)" -n1 uv run --no-project python check_v_syntax.py
          < /tmp/files-to-lint

  completion-lint:
    needs:
      - pre-commit
      - lint-bash
      - lint-ruby
      - lint-gleam
      - lint-go
      - lint-groovy
      - lint-javascript
      - lint-json5
      - lint-jsonnet
      - lint-typescript
      - lint-java
      - lint-c
      - lint-cobol
      - lint-cpp
      - lint-cpp-tidy
      - lint-kotlin
      - lint-rust
      - lint-swift
      - lint-csharp
      - lint-elixir
      - lint-elm
      - lint-erlang
      - lint-fsharp
      - lint-ocaml
      - lint-haskell
      - lint-commonlisp
      - lint-hcl
      - lint-clojure
      - lint-scala
      - lint-dart
      - lint-dhall
      - lint-julia
      - lint-perl
      - lint-lua
      - lint-tcl
      - lint-php
      - lint-r
      - lint-d
      - lint-ada
      - lint-occam
      - lint-crystal
      - lint-matlab
      - lint-mojo
      - lint-nim
      - lint-nix
      - lint-norg
      - lint-purescript
      - lint-racket
      - lint-odin
      - lint-raku
      - lint-scheme
      - lint-sml
      - lint-zig
      - lint-toml
      - lint-v
      - lint-wren
      - lint-yaml
      - lint-powershell
      - lint-systemverilog
      - lint-visualbasic
      - lint-forth
      - lint-fortran
      - lint-objectivec
      - lint-objectivec-tidy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |-
          if ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}; then
            echo "One or more jobs failed or were cancelled"
            exit 1
          fi
