---
name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: 0 1 * * *
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: lint-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  pre-commit:
    strategy:
      matrix:
        python-version: ['3.12', '3.13', '3.14']
        platform: [ubuntu-latest, windows-latest]
        hook-stage: [pre-commit, pre-push, manual]

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Lint
        shell: bash
        run: uv run --extra=dev prek run --all-files --hook-stage ${{ matrix.hook-stage }}
          --verbose
        env:
          UV_PYTHON: ${{ matrix.python-version }}

      - uses: pre-commit-ci/lite-action@v1.1.0
        if: always()

  lint-bash:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.sh
      - name: Check Bash syntax
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 bash -n < /tmp/files-to-lint
      - name: Run Bash files
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 -P "$(nproc)" -n1 bash < /tmp/files-to-lint

  lint-ruby:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.rb
      - name: Check Ruby syntax
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 -P "$(nproc)" -n1 ruby -c < /tmp/files-to-lint
      - name: Run Ruby files
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 -P "$(nproc)" -n1 ruby < /tmp/files-to-lint

  lint-gleam:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.gleam
          extra_config_patterns: check_gleam_syntax.py
      - name: Install Gleam
        if: steps.find-files.outputs.found == 'true'
        uses: erlef/setup-beam@v1
        with:
          gleam-version: latest
          otp-version: 27
      - name: Install uv
        if: steps.find-files.outputs.found == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      - name: Check Gleam compiles
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 -n1 uv run --no-project python check_gleam_syntax.py < /tmp/files-to-lint

  lint-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.go
      - name: Check Go syntax
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 gofmt -e < /tmp/files-to-lint
      - name: Check Go compilation
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 -P "$(nproc)" -n1 go vet < /tmp/files-to-lint
      - name: Run Go files
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 -P "$(nproc)" -n1 go run < /tmp/files-to-lint

  lint-groovy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.groovy
      - name: Install Groovy
        if: steps.find-files.outputs.found == 'true'
        uses: wtfjoke/setup-groovy@v3
        with:
          groovy-version: 4.x
      - name: Check Groovy syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            tmpdir=$(mktemp -d)
            groovyc -d "$tmpdir" "$(realpath "$f")" || exit 1
          done < /tmp/files-to-lint

  lint-javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.js
      - name: Check JavaScript syntax
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 -P "$(nproc)" -n1 node --check < /tmp/files-to-lint
      - name: Run JavaScript files
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 -P "$(nproc)" -n1 node < /tmp/files-to-lint

  lint-json5:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.json5
      - name: Install json5
        if: steps.find-files.outputs.found == 'true'
        run: npm install -g json5
      - name: Check JSON5 syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            json5 "$f" > /dev/null || exit 1
          done < /tmp/files-to-lint

  lint-jsonnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.jsonnet
      - name: Install jsonnet
        if: steps.find-files.outputs.found == 'true'
        run: |-
          go install github.com/google/go-jsonnet/cmd/jsonnet@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Check Jsonnet syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            jsonnet "$f" > /dev/null || exit 1
          done < /tmp/files-to-lint

  lint-typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.ts
      - name: Install TypeScript
        if: steps.find-files.outputs.found == 'true'
        run: npm install -g typescript
      - name: Check TypeScript syntax
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 -P "$(nproc)" -n1 tsc --noEmit --noResolve --skipLibCheck --lib
          es2015 < /tmp/files-to-lint

  lint-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.java
      - name: Check Java syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          tmpdir=$(mktemp -d)
          while IFS= read -r -d '' f; do
            javac -d "$tmpdir" "$f" || exit 1
          done < /tmp/files-to-lint

  lint-c:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.c
          extra_config_patterns: .clang-tidy
      - name: Check C syntax
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 clang -fsyntax-only -std=c11 < /tmp/files-to-lint
      - name: Run clang-tidy
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 -P "$(nproc)" -n1 clang-tidy --extra-arg=-std=c11 < /tmp/files-to-lint

  lint-cobol:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      # Install before find-lint-files because the action wipes /tmp.
      # https://github.com/fabasoad/setup-cobol-action/issues/146
      - name: Install GnuCOBOL
        uses: fabasoad/setup-cobol-action@v1
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.cob
      - name: Check COBOL syntax
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 -P "$(nproc)" -n1 cobc -free -fsyntax-only < /tmp/files-to-lint

  lint-cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.cpp
          extra_config_patterns: .clang-tidy
      - name: Check C++ syntax
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 clang++ -fsyntax-only -std=c++20 < /tmp/files-to-lint
      - name: Run clang-tidy
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 -P "$(nproc)" -n1 clang-tidy --extra-arg=-std=c++20 < /tmp/files-to-lint

  lint-kotlin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.kts
      - name: Install Kotlin
        if: steps.find-files.outputs.found == 'true'
        uses: fwilhe2/setup-kotlin@v1
      - name: Check Kotlin syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          xargs -0 -P "$(nproc)" -n 1 kotlinc -script < /tmp/files-to-lint

  lint-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.rs
      # Compile and run in one step because the compiled binary lives in a
      # temp directory that is cleaned up when the step exits.
      - name: Check Rust syntax and run binaries
        if: steps.find-files.outputs.found == 'true'
        run: |-
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          cargo init "$tmpdir/chrono-check"
          cargo add --manifest-path "$tmpdir/chrono-check/Cargo.toml" chrono
          cargo build --manifest-path "$tmpdir/chrono-check/Cargo.toml"
          deps="$tmpdir/chrono-check/target/debug/deps"
          chrono_rlib=$(find "$deps" -name "libchrono-*.rlib" -print -quit)
          while IFS= read -r -d '' f; do
            rustc --edition 2021 \
              -L "dependency=$deps" \
              --extern "chrono=$chrono_rlib" \
              "$f" -o "$tmpdir/out" 2>&1 || exit 1
            "$tmpdir/out" || exit 1
          done < /tmp/files-to-lint

  lint-swift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.swift
      - name: Install Swift
        if: steps.find-files.outputs.found == 'true'
        uses: SwiftyLab/setup-swift@v1
        with:
          cache-snapshot: true
      - name: Check Swift syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            tmpdir=$(mktemp -d)
            cp "$f" "$tmpdir/check.swift"
            swiftc -typecheck "$tmpdir/check.swift" || exit 1
          done < /tmp/files-to-lint

  lint-csharp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.cs
          extra_config_patterns: check_csharp_syntax.py
      - name: Initialize .NET runtime
        if: steps.find-files.outputs.found == 'true'
        run: |
          mkdir -p /tmp/.dotnet/shm
          dotnet --info
      - name: Install uv
        if: steps.find-files.outputs.found == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      - name: Check C# syntax
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 -P "$(nproc)" -n1 uv run --no-project python check_csharp_syntax.py
          < /tmp/files-to-lint

  lint-elixir:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.ex
      - name: Install Elixir
        if: steps.find-files.outputs.found == 'true'
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18'
          otp-version: '27'
      - name: Check Elixir syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            tmpdir=$(mktemp -d)
            cp "$f" "$tmpdir/check.ex"
            (cd "$tmpdir" && elixirc check.ex) || exit 1
          done < /tmp/files-to-lint

  lint-elm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.elm
          extra_config_patterns: check_elm_syntax.py
      - name: Install elm-format and elm
        if: steps.find-files.outputs.found == 'true'
        run: npm install -g elm-format elm
      - name: Install uv
        if: steps.find-files.outputs.found == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      - name: Check Elm formatting
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            elm-format --stdin < "$f" > /dev/null || exit 1
          done < /tmp/files-to-lint
      - name: Check Elm compiles
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 uv run --no-project python check_elm_syntax.py < /tmp/files-to-lint

  lint-erlang:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.erl
      - name: Install Erlang
        if: steps.find-files.outputs.found == 'true'
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          install-rebar: false
          install-hex: false
      - name: Check Erlang syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            tmpdir=$(mktemp -d)
            cp "$f" "$tmpdir/check.erl"
            (cd "$tmpdir" && erlc check.erl) || exit 1
          done < /tmp/files-to-lint

  lint-fsharp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: |
            tests/integration/cases/**/*.fs
            tests/integration/cases/**/*.fsi
      - name: Initialize .NET runtime
        if: steps.find-files.outputs.found == 'true'
        run: |
          mkdir -p /tmp/.dotnet/shm
          dotnet --info
      - name: Check F# syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            tmpdir=$(mktemp -d)
            DOTNET_SKIP_FIRST_TIME_EXPERIENCE=1 DOTNET_NOLOGO=1 \
              TMPDIR="$tmpdir" HOME="$tmpdir" \
              dotnet fsi --nologo --exec "$f" || exit 1
          done < /tmp/files-to-lint

  lint-ocaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.ml
      - name: Install OCaml
        if: steps.find-files.outputs.found == 'true'
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5
      - name: Check OCaml syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          tmpdir=$(mktemp -d)
          xargs -0 -n1 opam exec -- ocamlopt -c -o "$tmpdir/check.o" < /tmp/files-to-lint

  lint-haskell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.hs
      - uses: haskell-actions/setup@v2
        if: steps.find-files.outputs.found == 'true'
        with:
          ghc-version: latest
      - name: Check Haskell syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          tmpdir=$(mktemp -d)
          xargs -0 -n1 ghc -fno-code -outputdir "$tmpdir" < /tmp/files-to-lint

  lint-commonlisp:
    runs-on: ubuntu-latest
    env:
      LISP: sbcl-bin
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.lisp
      - name: Install SBCL
        if: steps.find-files.outputs.found == 'true'
        uses: 40ants/setup-lisp@v4
      - name: Check Common Lisp syntax
        if: steps.find-files.outputs.found == 'true'
        run: >-
          xargs -0 -P "$(nproc)" -I{} ros run
          --eval '(sb-ext:disable-debugger)'
          --load {}
          --quit
          < /tmp/files-to-lint

  lint-hcl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.hcl
      - name: Install hcl2json
        if: steps.find-files.outputs.found == 'true'
        run: |-
          go install github.com/tmccombs/hcl2json@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Check HCL syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            hcl2json "$f" > /dev/null || exit 1
          done < /tmp/files-to-lint

  lint-clojure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.clj
      - name: Install clj-kondo
        if: steps.find-files.outputs.found == 'true'
        uses: DeLaGuardo/setup-clojure@13
        with:
          clj-kondo: latest
      - name: Check Clojure syntax
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 clj-kondo --lint < /tmp/files-to-lint

  lint-scala:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.scala
      - name: Install Scala
        if: steps.find-files.outputs.found == 'true'
        uses: coursier/setup-action@v3
        with:
          apps: scalac
      - name: Check Scala syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            tmpdir=$(mktemp -d)
            scalac -d "$tmpdir" "$f" || exit 1
          done < /tmp/files-to-lint

  lint-dart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.dart
      - name: Install Dart
        if: steps.find-files.outputs.found == 'true'
        uses: dart-lang/setup-dart@v1
      - name: Check Dart syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            tmpdir=$(mktemp -d)
            printf 'name: check\nenvironment:\n  sdk: ^3.0.0\n' > "$tmpdir/pubspec.yaml"
            cp "$f" "$tmpdir/check.dart"
            dart analyze --fatal-infos "$tmpdir/check.dart" || exit 1
          done < /tmp/files-to-lint

  lint-dhall:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.dhall
      - name: Install dhall
        if: steps.find-files.outputs.found == 'true'
        run: |-
          curl -fsSL https://github.com/dhall-lang/dhall-haskell/releases/download/1.42.2/dhall-1.42.2-x86_64-linux.tar.bz2 \
            | tar -xj
          echo "$PWD/bin" >> "$GITHUB_PATH"
      - name: Check Dhall syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            dhall < "$f" > /dev/null || exit 1
          done < /tmp/files-to-lint

  lint-julia:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.jl
      - name: Install Julia
        if: steps.find-files.outputs.found == 'true'
        uses: julia-actions/setup-julia@v3
      - name: Check Julia syntax
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 -P "$(nproc)" -n1 julia --startup-file=no -e 'Meta.parseall(read(ARGS[1],
          String))' -- < /tmp/files-to-lint

  lint-perl:
    runs-on: ubuntu-latest
    steps:
