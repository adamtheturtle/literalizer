---
name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: 0 1 * * *
  workflow_dispatch: {}

permissions: {}

jobs:
  build:
    strategy:
      matrix:
        python-version: ['3.13']
        platform: [ubuntu-latest, windows-latest]
        hook-stage: [pre-commit, pre-push, manual]

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Lint
        shell: bash
        run: uv run --extra=dev prek run --all-files --hook-stage ${{ matrix.hook-stage }}
          --verbose
        env:
          UV_PYTHON: ${{ matrix.python-version }}

      - uses: pre-commit-ci/lite-action@v1.1.0
        if: always()

  lint-ruby:
    uses: ./.github/workflows/lint-ruby.yml

  lint-go:
    uses: ./.github/workflows/lint-go.yml

  lint-groovy:
    uses: ./.github/workflows/lint-groovy.yml

  lint-javascript:
    uses: ./.github/workflows/lint-javascript.yml

  lint-typescript:
    uses: ./.github/workflows/lint-typescript.yml

  lint-java:
    uses: ./.github/workflows/lint-java.yml

  lint-c:
    uses: ./.github/workflows/lint-c.yml

  lint-cpp:
    uses: ./.github/workflows/lint-cpp.yml

  lint-kotlin:
    uses: ./.github/workflows/lint-kotlin.yml

  lint-rust:
    uses: ./.github/workflows/lint-rust.yml

  lint-swift:
    uses: ./.github/workflows/lint-swift.yml

  lint-csharp:
    uses: ./.github/workflows/lint-csharp.yml

  lint-elixir:
    uses: ./.github/workflows/lint-elixir.yml

  lint-erlang:
    uses: ./.github/workflows/lint-erlang.yml

  lint-fsharp:
    uses: ./.github/workflows/lint-fsharp.yml

  lint-ocaml:
    uses: ./.github/workflows/lint-ocaml.yml

  lint-haskell:
    uses: ./.github/workflows/lint-haskell.yml

  lint-clojure:
    uses: ./.github/workflows/lint-clojure.yml

  lint-scala:
    uses: ./.github/workflows/lint-scala.yml

  lint-dart:
    uses: ./.github/workflows/lint-dart.yml

  lint-julia:
    uses: ./.github/workflows/lint-julia.yml

  lint-perl:
    uses: ./.github/workflows/lint-perl.yml

  lint-lua:
    uses: ./.github/workflows/lint-lua.yml

  lint-php:
    uses: ./.github/workflows/lint-php.yml

  lint-r:
    uses: ./.github/workflows/lint-r.yml

  lint-d:
    uses: ./.github/workflows/lint-d.yml

  lint-ada:
    uses: ./.github/workflows/lint-ada.yml

  lint-matlab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install Octave
        run: sudo apt-get install -y octave
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      - name: Check MATLAB syntax
        run: >
          find tests/integration/cases -name "*.m" -print0 |
          xargs -0 uv run python check_matlab_golden_syntax.py

  completion-lint:
    needs:
      - build
      - lint-ruby
      - lint-go
      - lint-groovy
      - lint-javascript
      - lint-typescript
      - lint-java
      - lint-c
      - lint-cpp
      - lint-kotlin
      - lint-rust
      - lint-swift
      - lint-csharp
      - lint-elixir
      - lint-erlang
      - lint-fsharp
      - lint-ocaml
      - lint-haskell
      - lint-clojure
      - lint-scala
      - lint-dart
      - lint-julia
      - lint-perl
      - lint-lua
      - lint-php
      - lint-r
      - lint-d
      - lint-ada
      - lint-matlab
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |-
          if ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}; then
            echo "One or more jobs failed or were cancelled"
            exit 1
          fi
