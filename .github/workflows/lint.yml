      - uses: astral-sh/setup-uv@v7
        if: steps.find-files.outputs.found == 'true'
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      - name: Check TOML syntax
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 uv run --with 'tomli>=2.4.0' --no-project python check_toml_syntax.py
          < /tmp/files-to-lint

  lint-yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: |
            tests/integration/cases/**/*.yaml
            !tests/integration/cases/**/input.yaml
          exclude_patterns: input.yaml
      - name: Install uv
        if: steps.find-files.outputs.found == 'true'
        uses: astral-sh/setup-uv@v7
      - name: Check YAML syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          xargs -0 uvx yamllint --strict -d '{extends: default, rules: {document-start: disable, line-length: disable}}' -- < /tmp/files-to-lint

