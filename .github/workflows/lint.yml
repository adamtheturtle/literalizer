---
name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: 0 1 * * *
  workflow_dispatch: {}

permissions: {}

jobs:
  build:
    strategy:
      matrix:
        python-version: ['3.13']
        platform: [ubuntu-latest, windows-latest]
        hook-stage: [pre-commit, pre-push, manual]

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Lint
        shell: bash
        run: uv run --extra=dev prek run --all-files --hook-stage ${{ matrix.hook-stage }}
          --verbose
        env:
          UV_PYTHON: ${{ matrix.python-version }}

      - uses: pre-commit-ci/lite-action@v1.1.0
        if: always()

  lint-bash:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.sh
      - name: Check Bash syntax
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 bash -n < /tmp/files-to-lint

  lint-ruby:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.rb
      - name: Check Ruby syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            ruby -c "$f" || exit 1
          done < /tmp/files-to-lint

  lint-gleam:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.gleam
          extra_config_patterns: check_gleam_golden_syntax.py
      - name: Install Gleam
        if: steps.find-files.outputs.found == 'true'
        uses: erlef/setup-beam@v1
        with:
          gleam-version: latest
          otp-version: 27
      - name: Install uv
        if: steps.find-files.outputs.found == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      - name: Check Gleam compiles
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 uv run --no-project python check_gleam_golden_syntax.py < /tmp/files-to-lint

  lint-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.go
      - name: Check Go syntax
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 gofmt -e < /tmp/files-to-lint
      - name: Check Go compilation
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 -n1 go vet < /tmp/files-to-lint

  lint-groovy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.groovy
      - name: Install Groovy
        if: steps.find-files.outputs.found == 'true'
        uses: wtfjoke/setup-groovy@v3
        with:
          groovy-version: 4.x
      - name: Check Groovy syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            tmpdir=$(mktemp -d)
            groovyc -d "$tmpdir" "$(realpath "$f")" || exit 1
          done < /tmp/files-to-lint

  lint-javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.js
      - name: Check JavaScript syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            node --check "$f" || exit 1
          done < /tmp/files-to-lint

  lint-json5:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.json5
      - name: Install json5
        if: steps.find-files.outputs.found == 'true'
        run: npm install -g json5
      - name: Check JSON5 syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            json5 "$f" > /dev/null || exit 1
          done < /tmp/files-to-lint

  lint-jsonnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.jsonnet
      - name: Install jsonnet
        if: steps.find-files.outputs.found == 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jsonnet
      - name: Check Jsonnet syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            jsonnet "$f" > /dev/null || exit 1
          done < /tmp/files-to-lint

  lint-typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.ts
      - name: Install TypeScript
        if: steps.find-files.outputs.found == 'true'
        run: npm install -g typescript
      - name: Check TypeScript syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            tsc --noEmit --noResolve --skipLibCheck --lib es2015 "$f" || exit 1
          done < /tmp/files-to-lint

  lint-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.java
      - name: Check Java syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          tmpdir=$(mktemp -d)
          while IFS= read -r -d '' f; do
            javac -d "$tmpdir" "$f" || exit 1
          done < /tmp/files-to-lint

  lint-c:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.c
      - name: Check C syntax
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 clang -fsyntax-only -std=c11 < /tmp/files-to-lint

  lint-cobol:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.cob
      - name: Install GnuCOBOL
        if: steps.find-files.outputs.found == 'true'
        run: sudo apt-get install -y gnucobol
      - name: Check COBOL syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            cobc -free -fsyntax-only "$f" || exit 1
          done < /tmp/files-to-lint

  lint-cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.cpp
      - name: Check C++ syntax
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 clang++ -fsyntax-only -std=c++20 < /tmp/files-to-lint

  lint-kotlin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.kts
      - name: Install Kotlin
        if: steps.find-files.outputs.found == 'true'
        uses: fwilhe2/setup-kotlin@v1
      - name: Check Kotlin syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          xargs -0 -P "$(nproc)" -n 1 kotlinc -script < /tmp/files-to-lint

  lint-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.rs
      - name: Check Rust syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          cargo init "$tmpdir/chrono-check"
          cargo add --manifest-path "$tmpdir/chrono-check/Cargo.toml" chrono
          cargo build --manifest-path "$tmpdir/chrono-check/Cargo.toml"
          deps="$tmpdir/chrono-check/target/debug/deps"
          chrono_rlib=$(find "$deps" -name "libchrono-*.rlib" -print -quit)
          while IFS= read -r -d '' f; do
            rustc --edition 2021 \
              -L "dependency=$deps" \
              --extern "chrono=$chrono_rlib" \
              "$f" -o "$tmpdir/out" 2>&1 || exit 1
          done < /tmp/files-to-lint

  lint-swift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.swift
      - name: Install Swift
        if: steps.find-files.outputs.found == 'true'
        uses: SwiftyLab/setup-swift@v1
        with:
          cache-snapshot: true
      - name: Check Swift syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            tmpdir=$(mktemp -d)
            cp "$f" "$tmpdir/check.swift"
            swiftc -typecheck "$tmpdir/check.swift" || exit 1
          done < /tmp/files-to-lint

  lint-csharp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.cs
          extra_config_patterns: check_csharp_golden_syntax.py
      - name: Initialize .NET runtime
        if: steps.find-files.outputs.found == 'true'
        run: |
          mkdir -p /tmp/.dotnet/shm
          dotnet --info
      - name: Install uv
        if: steps.find-files.outputs.found == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      - name: Check C# syntax
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 uv run --no-project python check_csharp_golden_syntax.py < /tmp/files-to-lint

  lint-elixir:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.ex
      - name: Install Elixir
        if: steps.find-files.outputs.found == 'true'
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18'
          otp-version: '27'
      - name: Check Elixir syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            tmpdir=$(mktemp -d)
            cp "$f" "$tmpdir/check.ex"
            (cd "$tmpdir" && elixirc check.ex) || exit 1
          done < /tmp/files-to-lint

  lint-elm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.elm
          extra_config_patterns: check_elm_golden_syntax.py
      - name: Install elm-format and elm
        if: steps.find-files.outputs.found == 'true'
        run: npm install -g elm-format elm
      - name: Install uv
        if: steps.find-files.outputs.found == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      - name: Check Elm formatting
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            elm-format --stdin < "$f" > /dev/null || exit 1
          done < /tmp/files-to-lint
      - name: Check Elm compiles
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 uv run --no-project python check_elm_golden_syntax.py < /tmp/files-to-lint

  lint-erlang:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.erl
      - name: Install Erlang
        if: steps.find-files.outputs.found == 'true'
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          install-rebar: false
          install-hex: false
      - name: Check Erlang syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            tmpdir=$(mktemp -d)
            cp "$f" "$tmpdir/check.erl"
            (cd "$tmpdir" && erlc check.erl) || exit 1
          done < /tmp/files-to-lint

  lint-fsharp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: |
            tests/integration/cases/**/*.fs
            tests/integration/cases/**/*.fsi
      - name: Initialize .NET runtime
        if: steps.find-files.outputs.found == 'true'
        run: |
          mkdir -p /tmp/.dotnet/shm
          dotnet --info
      - name: Check F# syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            tmpdir=$(mktemp -d)
            DOTNET_SKIP_FIRST_TIME_EXPERIENCE=1 DOTNET_NOLOGO=1 \
              TMPDIR="$tmpdir" HOME="$tmpdir" \
              dotnet fsi --nologo --exec "$f" || exit 1
          done < /tmp/files-to-lint

  lint-ocaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.ml
      - name: Install OCaml
        if: steps.find-files.outputs.found == 'true'
        run: sudo apt-get install -y ocaml
      - name: Check OCaml syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          tmpdir=$(mktemp -d)
          while IFS= read -r -d '' f; do
            ocamlopt -c -o "$tmpdir/check.o" "$f" || exit 1
          done < /tmp/files-to-lint

  lint-haskell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.hs
      - uses: haskell-actions/setup@v2
        if: steps.find-files.outputs.found == 'true'
        with:
          ghc-version: latest
      - name: Check Haskell syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          tmpdir=$(mktemp -d)
          while IFS= read -r -d '' f; do
            ghc -fno-code -outputdir "$tmpdir" "$f" || exit 1
          done < /tmp/files-to-lint

  lint-commonlisp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.lisp
      - name: Install SBCL
        if: steps.find-files.outputs.found == 'true'
        run: sudo apt-get install -y sbcl
      - name: Check Common Lisp syntax
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 -I{} sbcl --script {} < /tmp/files-to-lint

  lint-hcl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.hcl
      - name: Install hcl2json
        if: steps.find-files.outputs.found == 'true'
        run: go install github.com/tmccombs/hcl2json@latest
      - name: Add Go bin to PATH
        if: steps.find-files.outputs.found == 'true'
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Check HCL syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            hcl2json "$f" > /dev/null || exit 1
          done < /tmp/files-to-lint

  lint-clojure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.clj
      - name: Install clj-kondo
        if: steps.find-files.outputs.found == 'true'
        uses: DeLaGuardo/setup-clojure@13
        with:
          clj-kondo: latest
      - name: Check Clojure syntax
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 clj-kondo --lint < /tmp/files-to-lint

  lint-scala:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.scala
      - name: Install Scala
        if: steps.find-files.outputs.found == 'true'
        uses: coursier/setup-action@v3
        with:
          apps: scalac
      - name: Check Scala syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            tmpdir=$(mktemp -d)
            scalac -d "$tmpdir" "$f" || exit 1
          done < /tmp/files-to-lint

  lint-dart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.dart
      - name: Install Dart
        if: steps.find-files.outputs.found == 'true'
        uses: dart-lang/setup-dart@v1
      - name: Check Dart syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            tmpdir=$(mktemp -d)
            printf 'name: check\nenvironment:\n  sdk: ^3.0.0\n' > "$tmpdir/pubspec.yaml"
            cp "$f" "$tmpdir/check.dart"
            dart analyze --fatal-infos "$tmpdir/check.dart" || exit 1
          done < /tmp/files-to-lint

  lint-dhall:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.dhall
      - name: Install dhall
        if: steps.find-files.outputs.found == 'true'
        run: |-
          curl -fsSL https://github.com/dhall-lang/dhall-haskell/releases/download/1.42.2/dhall-1.42.2-x86_64-linux.tar.bz2 \
            | tar -xj
          echo "$PWD/bin" >> "$GITHUB_PATH"
      - name: Check Dhall syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            dhall < "$f" > /dev/null || exit 1
          done < /tmp/files-to-lint

  lint-julia:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.jl
      - name: Install Julia
        if: steps.find-files.outputs.found == 'true'
        uses: julia-actions/setup-julia@v2
      - name: Check Julia syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            julia --startup-file=no -e 'Meta.parseall(read(ARGS[1], String))' -- "$f" || exit 1
          done < /tmp/files-to-lint

  lint-perl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.pl
      - name: Install Perl dependencies
        if: steps.find-files.outputs.found == 'true'
        run: |-
          sudo apt-get update
          sudo apt-get install -y cpanminus
          sudo cpanm --notest DateTime
      - name: Check Perl syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            perl -c "$f" || exit 1
          done < /tmp/files-to-lint

  lint-lua:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.lua
      - name: Install Lua
        if: steps.find-files.outputs.found == 'true'
        uses: leafo/gh-actions-lua@v12
        with:
          luaVersion: '5.4'
      - name: Check Lua syntax
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 luac -p < /tmp/files-to-lint

  lint-php:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.php
      - name: Check PHP syntax
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 php -l < /tmp/files-to-lint

  lint-r:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.R
      - name: Install R
        if: steps.find-files.outputs.found == 'true'
        uses: r-lib/actions/setup-r@v2
        with:
          windows-path-include-rtools: false
      - name: Check R syntax
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 Rscript -e 'for (f in commandArgs(trailingOnly=TRUE)) parse(file=f)'
          < /tmp/files-to-lint

  lint-d:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.d
      - name: Install DMD
        if: steps.find-files.outputs.found == 'true'
        uses: dlang-community/setup-dlang@v2
        with:
          compiler: dmd-latest
      - name: Check D syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            dmd -o- -c "$f" || exit 1
          done < /tmp/files-to-lint

  lint-powershell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.ps1
      - name: Check PowerShell syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            pwsh -NoProfile -NonInteractive -Command \
              "\$null = [scriptblock]::Create((Get-Content -Raw '$f'))" || exit 1
          done < /tmp/files-to-lint

  lint-ada:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.adb
          extra_config_patterns: check_ada_golden_syntax.py
      - name: Install GNAT
        if: steps.find-files.outputs.found == 'true'
        run: sudo apt-get install -y gnat
      - name: Install uv
        if: steps.find-files.outputs.found == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      - name: Check Ada syntax
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 uv run --no-project python check_ada_golden_syntax.py < /tmp/files-to-lint

  lint-occam:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.occ
          extra_config_patterns: check_occam_golden_syntax.py
      - name: Install uv
        if: steps.find-files.outputs.found == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      - name: Check Occam-pi syntax
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 uv run --no-project python check_occam_golden_syntax.py < /tmp/files-to-lint

  lint-crystal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.cr
      - name: Install Crystal
        if: steps.find-files.outputs.found == 'true'
        uses: crystal-lang/install-crystal@v1
      - name: Check Crystal syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            crystal build --no-codegen "$f" || exit 1
          done < /tmp/files-to-lint

  lint-matlab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/Matlab*.m
      - name: Install Octave
        if: steps.find-files.outputs.found == 'true'
        run: sudo apt-get update && sudo apt-get install -y octave
      # Octave is a practical CI substitute, but it does not support
      # every MATLAB builtin.  Skip files that use features Octave lacks:
      #  - datetime(): not yet implemented in Octave
      #  - ""-escaped quotes: Octave accepts some backslash escapes
      #    (e.g. \") that MATLAB rejects, so the check would be misleading
      - name: Check MATLAB syntax (Octave-compatible files)
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            if grep -q '""' "$f"; then
              echo "Skipping Octave parse check for MATLAB-escaped quotes in $f"
              continue
            fi
            if grep -qw 'datetime' "$f"; then
              echo "Skipping $f — uses datetime(), which Octave does not implement"
              continue
            fi
            octave --norc --no-gui "$f" || exit 1
          done < /tmp/files-to-lint

  lint-mojo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.mojo
      - name: Install pixi
        if: steps.find-files.outputs.found == 'true'
        uses: fabasoad/setup-mojo-action@v3
      - name: Install Mojo
        if: steps.find-files.outputs.found == 'true'
        run: |-
          pixi global install --channel conda-forge --channel https://conda.modular.com/max mojo
      # The Mojo runtime has a known bug where it randomly crashes
      # with "mojo: error: execution crashed" (see #558).
      # This is not caused by our code. Retry each file individually
      # so that a crash on one file does not block the rest.
      - name: Check Mojo syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          failed=0
          while IFS= read -r -d '' f; do
            ok=0
            for attempt in 1 2 3; do
              if mojo run --Werror "$f"; then
                ok=1
                break
              fi
              echo "::warning::Attempt $attempt failed for $f, retrying..."
              sleep 2
            done
            if [ "$ok" -eq 0 ]; then
              echo "::error::Failed after 3 attempts: $f"
              failed=1
            fi
          done < /tmp/files-to-lint
          exit "$failed"

  lint-nim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.nim
      - name: Install Nim
        if: steps.find-files.outputs.found == 'true'
        uses: jiro4989/setup-nim-action@v2
      - name: Check Nim syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            tmpdir=$(mktemp -d)
            nim check --hints:off --nimcache:"$tmpdir" "$f" || exit 1
          done < /tmp/files-to-lint

  lint-norg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.norg
      - name: Install tree-sitter CLI
        if: steps.find-files.outputs.found == 'true'
        run: npm install tree-sitter-cli
      - name: Build tree-sitter-norg parser
        if: steps.find-files.outputs.found == 'true'
        run: |-
          git clone --depth=1 https://github.com/nvim-neorg/tree-sitter-norg.git /tmp/tree-sitter-norg
          cc -shared -fPIC -o /tmp/norg.so \
            -I /tmp/tree-sitter-norg/src \
            /tmp/tree-sitter-norg/src/parser.c \
            -x c++ /tmp/tree-sitter-norg/src/scanner.cc \
            -lstdc++
      - name: Check Norg syntax
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 npx tree-sitter parse --lib-path /tmp/norg.so --lang-name norg
          --quiet < /tmp/files-to-lint

  lint-racket:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.rkt
      - name: Install Racket
        if: steps.find-files.outputs.found == 'true'
        run: sudo apt-get install -y racket
      - name: Check Racket syntax
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 raco make < /tmp/files-to-lint

  lint-odin:
