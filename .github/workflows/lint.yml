---
name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: 0 1 * * *
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: lint-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  pre-commit:
    strategy:
      matrix:
        python-version: ['3.12', '3.13', '3.14']
        platform: [ubuntu-latest, windows-latest]
        hook-stage: [pre-commit, pre-push, manual]

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Lint
        shell: bash
        run: uv run --extra=dev prek run --all-files --hook-stage ${{ matrix.hook-stage }}
          --verbose
        env:
          UV_PYTHON: ${{ matrix.python-version }}

      - uses: pre-commit-ci/lite-action@v1.1.0
        if: always()

  # Fixture languages whose lint is a handful of seconds — either the
  # toolchain is preinstalled on ubuntu-latest, or the install is quick
  # enough that splitting them into separate runners would spend more
  # time on runner startup than on linting.
  lint-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install Lua
        uses: leafo/gh-actions-lua@v13
        with:
          luaVersion: '5.4'
      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Lint Bash
        run: |-
          find tests/integration/cases -name '*.sh' -print0 > /tmp/files-bash
          xargs -0 bash -n < /tmp/files-bash
          xargs -0 -P "$(nproc)" -n1 bash < /tmp/files-bash

      - name: Lint Ruby
        run: |-
          find tests/integration/cases -name '*.rb' -print0 > /tmp/files-ruby
          xargs -0 -P "$(nproc)" -n1 ruby -c < /tmp/files-ruby
          xargs -0 -P "$(nproc)" -n1 ruby < /tmp/files-ruby

      - name: Lint JavaScript
        run: |-
          find tests/integration/cases -name '*.js' -print0 > /tmp/files-js
          xargs -0 -P "$(nproc)" -n1 node --check < /tmp/files-js
          xargs -0 -P "$(nproc)" -n1 node < /tmp/files-js

      # The host compiles each fixture into an in-memory assembly, then
      # reflectively constructs `Check` and invokes its `check()` method
      # (or runs field initializers on field-only fixtures), so javac
      # emit-success and runtime errors (e.g. bad `Instant.parse` input)
      # both fail here.
      - name: Lint Java
        run: |-
          find tests/integration/cases -name '*.java' -print0 > /tmp/files-java
          xargs -0 java CheckJavaSyntax.java < /tmp/files-java

      - name: Lint Php
        run: |-
          find tests/integration/cases -name '*.php' -print0 > /tmp/files-php
          xargs -0 php -l < /tmp/files-php
          xargs -0 -P "$(nproc)" -n1 php < /tmp/files-php

      # Parse every fixture inside a single pwsh invocation so the .NET
      # and PowerShell startup cost is paid once instead of per fixture.
      # The run step reuses the same trick: one pwsh process iterates
      # every fixture, executing its script block in a child scope so
      # `$my_data` (and anything else) does not leak between fixtures.
      - name: Lint PowerShell
        run: |-
          find tests/integration/cases -name '*.ps1' -print0 > /tmp/files-ps1
          pwsh -NoProfile -NonInteractive -File .github/scripts/lint-powershell.ps1 < /tmp/files-ps1

      - name: Run PowerShell files
        run: pwsh -NoProfile -NonInteractive -File .github/scripts/run-powershell.ps1
          < /tmp/files-ps1

      # Every fixture defines its own `fval_m` module, and the syntax
      # check leaves an `fval_m.mod` in the working directory (gfortran
      # emits .mod files even under `-fsyntax-only`). gfortran would
      # then reuse that stale .mod instead of recompiling each file's
      # inline module, masking references to names defined only in the
      # current file. Compile each file from inside a private tmpdir so
      # the stale .mod is not on the module search path and parallel
      # runs cannot clobber each other's output.
      - name: Lint Fortran
        run: |-
          find tests/integration/cases -name '*.f90' -print0 > /tmp/files-fortran
          xargs -0 gfortran -std=f2008 -ffree-line-length-none -fsyntax-only < /tmp/files-fortran
          cat > /tmp/run-fortran.sh <<'SCRIPT'
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          src=$(realpath "$1")
          cd "$tmpdir" || exit 1
          gfortran -std=f2008 -ffree-line-length-none "$src" -o run || exit 1
          ./run || exit 1
          SCRIPT
          xargs -0 -P "$(nproc)" -n1 bash /tmp/run-fortran.sh < /tmp/files-fortran

      - name: Lint Lua
        run: |-
          find tests/integration/cases -name '*.lua' -print0 > /tmp/files-lua
          xargs -0 luac -p < /tmp/files-lua
          xargs -0 -P "$(nproc)" -n1 lua < /tmp/files-lua

      - name: Lint Nix
        run: |-
          find tests/integration/cases -name '*.nix' -print0 > /tmp/files-nix
          xargs -0 -P "$(nproc)" -n1 nix-instantiate --parse < /tmp/files-nix > /dev/null

  # Split out from lint-fast because two odin invocations on the same
  # runner deadlock regardless of filesystem isolation.  The matrix
  # spreads shards across separate runners so no two odin processes
  # ever share a kernel; each shard runs its files serially.
  lint-odin:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shard: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install Odin
        uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Odin files
        run: |-
          mapfile -d '' -t files < <(find tests/integration/cases -name '*.odin' -print0 | sort -z)
          n=${#files[@]}
          build_odin() {
            local src="$1"
            local wd
            wd=$(mktemp -d)
            trap 'rm -rf "$wd"' RETURN
            cp "$src" "$wd/main.odin"
            ( cd "$wd" && odin build . -out:"$wd/prog" )
          }
          for (( i=${{ matrix.shard }}; i<n; i+=4 )); do
            src=$(realpath "${files[i]}")
            build_odin "$src" || build_odin "$src" || exit 1
          done

  # Fixture languages whose interpreter is a quick `apt-get install`.
  # Grouped so the apt-get cost is paid once for the whole group.
  lint-apt-basics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install apt packages and Perl deps
        run: |-
          sudo apt-get update -qq
          sudo apt-get install -y -qq gforth tcl guile-3.0 octave cpanminus
          sudo cpanm --notest DateTime

      - name: Lint Forth
        run: |-
          find tests/integration/cases -name '*.fth' -print0 > /tmp/files-forth
          xargs -0 -P "$(nproc)" -I{} gforth {} -e bye < /tmp/files-forth

      - name: Lint Tcl
        run: |-
          find tests/integration/cases -name '*.tcl' -print0 > /tmp/files-tcl
          xargs -0 -P "$(nproc)" -n1 tclsh < /tmp/files-tcl

      - name: Lint Scheme
        run: |-
          find tests/integration/cases -name '*.scm' -print0 > /tmp/files-scheme
          xargs -0 -P "$(nproc)" -I{} guile --no-auto-compile -s {} < /tmp/files-scheme

      # Octave is a practical CI substitute, but it does not support
      # every MATLAB builtin.  The per-fixture skip rules (for ``""``
      # escaped quotes and the ``datetime`` builtin) are documented in
      # .github/scripts/lint-matlab-fixture.sh.
      - name: Lint Matlab
        run: |-
          find tests/integration/cases -name 'Matlab*.m' -print0 > /tmp/files-matlab
          xargs -0 -P "$(nproc)" -n1 bash .github/scripts/lint-matlab-fixture.sh < /tmp/files-matlab

      - name: Lint Perl
        run: |-
          find tests/integration/cases -name '*.pl' -print0 > /tmp/files-perl
          xargs -0 -P "$(nproc)" -n1 perl -c < /tmp/files-perl
          xargs -0 -P "$(nproc)" -n1 perl < /tmp/files-perl

  # Fixture languages linted by small tools fetched via `go install`.
  lint-go-installed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install Go-sourced linters
        run: |-
          go install github.com/google/go-jsonnet/cmd/jsonnet@latest
          go install github.com/tmccombs/hcl2json@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Lint Jsonnet
        run: |-
          find tests/integration/cases -name '*.jsonnet' -print0 > /tmp/files-jsonnet
          xargs -0 -P "$(nproc)" -n1 jsonnet < /tmp/files-jsonnet > /dev/null

      - name: Lint Hcl
        run: |-
          find tests/integration/cases -name '*.hcl' -print0 > /tmp/files-hcl
          xargs -0 -P "$(nproc)" -n1 hcl2json < /tmp/files-hcl > /dev/null

  # Fixture languages linted by tools fetched via `npm install -g`.
  lint-npm-installed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install npm-sourced linters
        run: npm install -g json5 tree-sitter-cli typescript tsx elm-format elm
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Build tree-sitter-norg parser
        run: |-
          git clone --depth=1 https://github.com/nvim-neorg/tree-sitter-norg.git /tmp/tree-sitter-norg
          cc -shared -fPIC -o /tmp/norg.so \
            -I /tmp/tree-sitter-norg/src \
            /tmp/tree-sitter-norg/src/parser.c \
            -x c++ /tmp/tree-sitter-norg/src/scanner.cc \
            -lstdc++

      - name: Lint Json5
        run: |-
          find tests/integration/cases -name '*.json5' -print0 > /tmp/files-json5
          xargs -0 -P "$(nproc)" -n1 json5 < /tmp/files-json5 > /dev/null

      - name: Lint Norg
        run: |-
          find tests/integration/cases -name '*.norg' -print0 > /tmp/files-norg
          xargs -0 tree-sitter parse --lib-path /tmp/norg.so --lang-name norg --quiet < /tmp/files-norg

      - name: Lint TypeScript
        run: |-
          find tests/integration/cases -name '*.ts' -print0 > /tmp/files-ts
          xargs -0 -P "$(nproc)" -n1 tsc --noEmit --noResolve --skipLibCheck --lib es2015 < /tmp/files-ts
      - name: Run TypeScript files
        run: xargs -0 -P "$(nproc)" -n1 tsx < /tmp/files-ts

      - name: Lint Elm
        run: |-
          find tests/integration/cases -name '*.elm' -print0 > /tmp/files-elm
          while IFS= read -r -d '' f; do
            elm-format --stdin < "$f" > /dev/null || exit 1
          done < /tmp/files-elm
          PYTHONPATH=. xargs -0 uv run --no-project python .github/scripts/check_elm_syntax.py < /tmp/files-elm
          xargs -0 uv run --no-project python run_elm.py < /tmp/files-elm

  # Fixture languages whose check is a small `uv run python ...` helper.
  lint-uv-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install apt packages for Ada
        run: sudo apt-get update -qq && sudo apt-get install -y -qq gnat
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Lint Ada
        run: |-
          find tests/integration/cases -name '*.adb' -print0 > /tmp/files-ada
          xargs -0 -P "$(nproc)" -n1 uv run --no-project python .github/scripts/check_ada_syntax.py < /tmp/files-ada
      - name: Run Ada files
        run: xargs -0 -P "$(nproc)" -n1 uv run --no-project python run_ada.py < /tmp/files-ada

      - name: Lint Occam
        run: |-
          find tests/integration/cases -name '*.occ' -print0 > /tmp/files-occam
          xargs -0 -P "$(nproc)" -n1 uv run --no-project python .github/scripts/check_occam_syntax.py < /tmp/files-occam

      - name: Lint Toml
        run: |-
          find tests/integration/cases -name '*.toml' -print0 > /tmp/files-toml
          xargs -0 -P "$(nproc)" -n1 uv run --with 'tomli>=2.4.0' --no-project python .github/scripts/check_toml_syntax.py < /tmp/files-toml

      - name: Lint Yaml
        run: |-
          find tests/integration/cases -name '*.yaml' ! -name 'input.yaml' -print0 > /tmp/files-yaml
          xargs -0 uvx yamllint --strict -d '{extends: default, rules: {document-start: disable, line-length: disable}}' -- < /tmp/files-yaml

  # .NET-hosted linters. Run host builds in parallel-looking sequential
  # steps so the .NET runtime startup is paid once for the whole job.
  lint-dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Initialize .NET runtime
        run: |
          mkdir -p /tmp/.dotnet/shm
          dotnet --info

      # Build a small Roslyn host once, then feed every fixture through
      # its stdin so the .NET runtime and C# compiler load once instead
      # of per fixture. Replaces `dotnet build` per fixture, which paid
      # MSBuild + NuGet restore + compiler startup each time.
      - name: Build C# lint host
        run: dotnet publish .github/scripts/lint-csharp/lint-csharp.csproj -c Release
          -o /tmp/lint-csharp --nologo
      # Build a small Roslyn host once, then feed every fixture through
      # its stdin so the .NET runtime and VB compiler load once instead
      # of per fixture.
      - name: Build VB lint host
        run: dotnet publish .github/scripts/lint-vb/lint-vb.csproj -c Release -o /tmp/lint-vb
          --nologo

      # The host compiles each fixture into an in-memory assembly and
      # invokes its entry point, so emit-success and runtime errors
      # (e.g. undefined members on an unstubbed object) both fail here.
      - name: Lint CSharp
        run: |-
          find tests/integration/cases -name '*.cs' -print0 > /tmp/files-cs
          dotnet /tmp/lint-csharp/lint-csharp.dll < /tmp/files-cs

      - name: Lint VisualBasic
        run: |-
          find tests/integration/cases -name '*.vb' -print0 > /tmp/files-vb
          dotnet /tmp/lint-vb/lint-vb.dll < /tmp/files-vb

      # Generate an FSX driver that `#load`s every fixture, then
      # evaluate it in a single `dotnet fsi --exec` invocation so the
      # .NET runtime and FSI compiler start up once instead of per
      # fixture. Each fixture re-declares `module Check`; FSI shadows
      # the previous definition, which is fine because the top-level
      # bindings still execute at load time.
      - name: Lint FSharp
        run: |-
          find tests/integration/cases \( -name '*.fs' -o -name '*.fsi' \) -print0 > /tmp/files-fs
          driver=$(mktemp -d)/driver.fsx
          while IFS= read -r -d '' f; do
            printf '#load "%s"\n' "$(realpath "$f")"
          done < /tmp/files-fs > "$driver"
          DOTNET_SKIP_FIRST_TIME_EXPERIENCE=1 DOTNET_NOLOGO=1 \
            dotnet fsi --nologo --exec "$driver"

  # Fixture languages whose toolchain is a tarball download.
  lint-curl-tarballs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install MLton
        run: |
          curl -fsSL https://github.com/MLton/mlton/releases/download/on-20241230-release/mlton-20241230-1.amd64-linux.ubuntu-24.04_static.tgz | tar xz -C /tmp
          echo "/tmp/mlton-20241230-1.amd64-linux.ubuntu-24.04_static/bin" >> "$GITHUB_PATH"
      - name: Install Dhall
        run: |-
          curl -fsSL https://github.com/dhall-lang/dhall-haskell/releases/download/1.42.2/dhall-1.42.2-x86_64-linux.tar.bz2 \
            | tar -xj
          echo "$PWD/bin" >> "$GITHUB_PATH"
      - name: Install Wren CLI
        run: |
          curl -fsSL https://github.com/wren-lang/wren-cli/releases/download/0.4.0/wren-cli-linux-0.4.0.zip -o /tmp/wren.zip
          unzip -o /tmp/wren.zip -d /tmp/wren
          sudo install /tmp/wren/wren-cli-linux-0.4.0/wren_cli /usr/local/bin/wren_cli

      # Every fixture defines its own entry point at top level, so compile
      # and run each file directly. Each invocation gets a private tmpdir
      # so parallel builds don't clobber each other's output binary.
      - name: Lint Sml
        run: |-
          find tests/integration/cases -name '*.sml' -print0 > /tmp/files-sml
          cat > /tmp/run-sml.sh <<'SCRIPT'
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          cp "$1" "$tmpdir/check.sml"
          mlton -output "$tmpdir/out" "$tmpdir/check.sml" || exit 1
          "$tmpdir/out" || exit 1
          SCRIPT
          xargs -0 -P "$(nproc)" -n1 bash /tmp/run-sml.sh < /tmp/files-sml

      - name: Lint Dhall
        run: |-
          find tests/integration/cases -name '*.dhall' -print0 > /tmp/files-dhall
          cat > /tmp/check-dhall.sh <<'SCRIPT'
          dhall < "$1" > /dev/null
          SCRIPT
          xargs -0 -P "$(nproc)" -n1 bash /tmp/check-dhall.sh < /tmp/files-dhall

      - name: Lint Wren
        run: |-
          find tests/integration/cases -name '*.wren' -print0 > /tmp/files-wren
          xargs -0 -P "$(nproc)" -n1 wren_cli < /tmp/files-wren

  # Erlang + Elixir + Gleam all share the BEAM runtime via setup-beam,
  # so one install serves all three.
  lint-beam:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install Erlang, Elixir and Gleam
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18'
          gleam-version: v1.16.0
          otp-version: '27'
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      # Populate a shared primed project once up front so each parallel
      # `.github/scripts/check_gleam_syntax.py` worker can copy from it instead of
      # running its own `gleam deps download`. 168 parallel downloads
      # otherwise hammer hex.pm and trip transient network failures.
      - name: Prime Gleam project
        run: |-
          mkdir -p "$RUNNER_TEMP/lint-gleam-primed/src"
          cp .github/scripts/lint-gleam.toml "$RUNNER_TEMP/lint-gleam-primed/gleam.toml"
          (cd "$RUNNER_TEMP/lint-gleam-primed" && gleam deps download)

      - name: Lint Gleam
        env:
          LINT_GLEAM_PRIMED_DIR: ${{ runner.temp }}/lint-gleam-primed
        run: |-
          find tests/integration/cases -name '*.gleam' -print0 > /tmp/files-gleam
          xargs -0 -P "$(nproc)" -n1 uv run --no-project python .github/scripts/check_gleam_syntax.py < /tmp/files-gleam
      - name: Run Gleam files
        env:
          LINT_GLEAM_PRIMED_DIR: ${{ runner.temp }}/lint-gleam-primed
        run: |-
          grep -zEv 'float_special_values' /tmp/files-gleam > /tmp/files-gleam-run || true
          xargs -0 -P "$(nproc)" -n1 uv run --no-project python .github/scripts/run_gleam.py < /tmp/files-gleam-run

      # Fixtures only declare `defmodule Check` with a `def x` body, so
      # `elixir` compiles the module but never invokes it. The script
      # compiles each fixture, calls `Check.x()` to force the body to
      # execute, and purges the module between fixtures — all inside a
      # single BEAM VM, paying the cold-start cost once instead of twice
      # per fixture (serial `elixirc` + `elixir` loops).
      - name: Lint Elixir
        run: |-
          find tests/integration/cases -name '*.ex' -print0 > /tmp/files-elixir
          elixir .github/scripts/lint-elixir.exs < /tmp/files-elixir

      # Compile every fixture in a single erlc invocation to pay the
      # BEAM VM startup cost once. Each fixture already carries a unique
      # module name derived from its case directory and stem, so a plain
      # copy suffices; no sed rewriting needed.
      - name: Lint Erlang
        env:
          ERLANG_FIXTURE_DIR: ${{ runner.temp }}/lint-erlang
        run: |-
          find tests/integration/cases -name '*.erl' -print0 > /tmp/files-erlang
          mkdir -p "$ERLANG_FIXTURE_DIR"
          while IFS= read -r -d '' f; do
            dir=${f%/*}; dir=${dir##*/}
            stem=$(basename "$f" .erl)
            name="fixture_${dir,,}_${stem,,}"
            cp "$f" "$ERLANG_FIXTURE_DIR/$name.erl"
          done < /tmp/files-erlang
          (cd "$ERLANG_FIXTURE_DIR" && erlc -Werror fixture_*.erl)

      # `erlc` only compiles; runtime errors (undefined functions, missing
      # imports, failed assertions) slip past unless each fixture is
      # actually executed. Every module name starts with ``fixture_``;
      # invoke each in a single BEAM VM and collect failures so one bad
      # fixture does not mask others.
      - name: Run Erlang files
        env:
          ERLANG_FIXTURE_DIR: ${{ runner.temp }}/lint-erlang
        run: |-
          modules=$(find "$ERLANG_FIXTURE_DIR" -maxdepth 1 -name '*.beam' -printf '%f\n' | sed 's|\.beam$||' | paste -sd, -)
          erl -noshell -pa "$ERLANG_FIXTURE_DIR" -eval "
            Run = fun(M) ->
                try M:x(), ok
                catch K:R:S -> io:format(\"FAIL ~p: ~p:~p~n~p~n\", [M,K,R,S]), error
                end
            end,
            Results = [Run(M) || M <- [$modules]],
            case lists:member(error, Results) of true -> halt(1); false -> halt(0) end."

  # Small JVM-based lints that each do a quick action install.
  lint-jvm-mini:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install clj-kondo and Babashka
        uses: DeLaGuardo/setup-clojure@13
        with:
          clj-kondo: latest
          bb: latest
      - name: Install Groovy
        uses: wtfjoke/setup-groovy@v3
        with:
          groovy-version: 4.x

      - name: Lint Clojure
        run: |-
          find tests/integration/cases -name '*.clj' -print0 > /tmp/files-clj
          xargs -0 clj-kondo --lint < /tmp/files-clj
      - name: Run Clojure files
        run: xargs -0 -P "$(nproc)" -n1 bb < /tmp/files-clj

      # Parse and run every fixture inside a single Groovy JVM via
      # GroovyShell, so the compiler stays warm across iterations
      # instead of cold-starting groovyc/groovy per file. A fresh
      # GroovyShell per fixture keeps classloaders isolated, since
      # some fixtures declare top-level classes with shared names.
      - name: Lint Groovy
        run: |-
          find tests/integration/cases -name '*.groovy' -print0 > /tmp/files-groovy
          groovy .github/scripts/lint-groovy.groovy < /tmp/files-groovy

  # Haskell + PureScript share the Haskell toolchain.
  lint-haskell-family:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: haskell-actions/setup@v2
        with:
          ghc-version: latest
      - uses: purescript-contrib/setup-purescript@main
        with:
          purescript: latest
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Lint Haskell
        run: |-
          find tests/integration/cases -name '*.hs' -print0 > /tmp/files-haskell
          workspace=$(mktemp -d)
          tmpdir=$(mktemp -d)
          xargs -0 -n1 ghc -fno-code -Wall -Werror -outputdir "$tmpdir" < /tmp/files-haskell
          while IFS= read -r -d '' f; do
            dir=$(basename "$(dirname "$f")")
            stem=$(basename "$f" .hs)
            mod="Fixture_${dir}_${stem}"
            cp "$f" "$workspace/$mod.hs"
          done < /tmp/files-haskell
          find "$workspace" -name '*.hs' -print0 | \
          xargs -0 -P "$(nproc)" -n1 uv run --no-project python run_haskell.py

      - name: Lint PureScript
        run: |-
          find tests/integration/cases -name '*.purs' -print0 > /tmp/files-purescript
          PYTHONPATH=. xargs -0 -P "$(nproc)" -n 1 uv run --no-project python .github/scripts/check_purescript_syntax.py < /tmp/files-purescript
      - name: Run PureScript files
        run: xargs -0 uv run --no-project python run_purescript.py < /tmp/files-purescript

  # Ubuntu's packaged clang-tidy is several releases behind and is the
  # dominant cost of this job on runners. Pull a recent build from PyPI
  # via uv instead.
  # Pass compile flags after `--` so clang-tidy treats them as the full
  # compile command and skips searching for a compile_commands.json.
  lint-c-tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      - name: Install clang-tidy
        run: uv tool install clang-tidy
      - name: Run clang-tidy on C files
        run: |-
          find tests/integration/cases -name '*.c' -print0 > /tmp/files-c-tidy
          xargs -0 -P "$(nproc)" -n1 -I{} clang-tidy {} -- -std=c11 < /tmp/files-c-tidy

  lint-cpp-tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      - name: Install clang-tidy
        run: uv tool install clang-tidy
      - name: Run clang-tidy on C++ files
        run: |-
          find tests/integration/cases -name '*.cpp' -print0 > /tmp/files-cpp-tidy
          xargs -0 -P "$(nproc)" -n1 -I{} clang-tidy {} -- -std=c++20 < /tmp/files-cpp-tidy

  lint-cobol:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      # Install before writing /tmp/files-to-lint because the action wipes /tmp.
      # https://github.com/fabasoad/setup-cobol-action/issues/146
      - name: Install GnuCOBOL
        uses: fabasoad/setup-cobol-action@v1
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.cob' -print0 > /tmp/files-to-lint
      - name: Check COBOL syntax
        run: xargs -0 -P "$(nproc)" -n1 cobc -free -fsyntax-only < /tmp/files-to-lint
      - name: Run COBOL files
        run: |-
          cat > /tmp/run-cobol.sh <<'SCRIPT'
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          cobc -x -free "$1" -o "$tmpdir/run" || exit 1
          "$tmpdir/run" || exit 1
          SCRIPT
          xargs -0 -P "$(nproc)" -n1 bash /tmp/run-cobol.sh < /tmp/files-to-lint

  lint-c:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.c' -print0 > /tmp/files-to-lint
      # Each fixture defines its own main, so compile and run directly.
      # The build-and-run step also surfaces any syntax errors, so a
      # separate `-fsyntax-only` pass would be redundant.
      - name: Run C files
        run: |-
          cat > /tmp/run-c.sh <<'SCRIPT'
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          clang -std=c11 "$1" -o "$tmpdir/run" || exit 1
          "$tmpdir/run" || exit 1
          SCRIPT
          xargs -0 -P "$(nproc)" -n1 bash /tmp/run-c.sh < /tmp/files-to-lint

  lint-cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.cpp' -print0 > /tmp/files-to-lint
      # Fixtures are tiny TUs whose cost is dominated by re-parsing the
      # same standard headers 269 times. Build a precompiled header once
      # covering every header any fixture includes, then preload it in
      # each compile invocation so the parsed AST is reused instead of
      # re-parsed per file.
      - name: Build precompiled header
        run: clang++ -std=c++20 -x c++-header .github/scripts/lint-cpp-pch.hpp -o
          /tmp/pch.hpp.pch
      # Each fixture defines its own main, so compile and run directly.
      # The build-and-run step also surfaces any syntax errors, so a
      # separate `-fsyntax-only` pass would be redundant.
      - name: Run C++ files
        run: |-
          cat > /tmp/run-cpp.sh <<'SCRIPT'
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          clang++ -std=c++20 -include-pch /tmp/pch.hpp.pch "$1" \
            -o "$tmpdir/run" || exit 1
          "$tmpdir/run" || exit 1
          SCRIPT
          xargs -0 -P "$(nproc)" -n1 bash /tmp/run-cpp.sh < /tmp/files-to-lint

  lint-kotlin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.kts' -print0 > /tmp/files-to-lint
      - name: Install Kotlin
        uses: fwilhe2/setup-kotlin@v1
        with:
          # 2.3.10's kotlin-scripting-jvm references a legacy
          # ``ScriptExpectedLocation`` class that is no longer shipped,
          # so ``K2JVMCompiler.exec("-script", ...)`` from inside a
          # ``.main.kts`` host blows up with NoClassDefFoundError.
          # 2.3.20 drops the stale reference.
          version: 2.3.20
      # Invoke K2JVMCompiler from a single `.main.kts` JVM instead of
      # spawning one `kotlinc -script` per fixture. The JVM + compiler
      # classes load once and each fixture is compiled against the warm
      # compiler, cutting ~355 cold JVM starts to one.
      - name: Check Kotlin syntax
        run: kotlin .github/scripts/lint-kotlin.main.kts < /tmp/files-to-lint

  lint-swift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.swift' -print0 > /tmp/files-to-lint
      - name: Install Swift
        uses: SwiftyLab/setup-swift@v1
        with:
          cache-snapshot: true
      - name: Check Swift syntax
        run: |-
          cat > /tmp/check-swift.sh <<'SCRIPT'
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          cp "$1" "$tmpdir/check.swift"
          swiftc -typecheck -warnings-as-errors "$tmpdir/check.swift" || exit 1
          SCRIPT
          xargs -0 -P "$(nproc)" -n1 bash /tmp/check-swift.sh < /tmp/files-to-lint
      - name: Run Swift files
        run: xargs -0 -P "$(nproc)" -n1 swift -warnings-as-errors < /tmp/files-to-lint

  lint-ocaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.ml' -print0 > /tmp/files-to-lint
      - name: Install OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5
      - name: Check OCaml syntax
        run: |-
          tmpdir=$(mktemp -d)
          xargs -0 -n1 opam exec -- ocamlopt -c -o "$tmpdir/check.o" < /tmp/files-to-lint
      # Fixtures only declare ``module Check = struct ... end`` with a
      # ``my_data`` let-binding; OCaml evaluates struct bodies when the
      # module is initialized, so running the file as a script forces
      # the binding's right-hand side to execute.
      - name: Run OCaml files
        run: xargs -0 -P "$(nproc)" -n1 opam exec -- ocaml < /tmp/files-to-lint

  lint-commonlisp:
    runs-on: ubuntu-latest
    env:
      LISP: sbcl-bin
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.lisp' -print0 > /tmp/files-to-lint
      - name: Install SBCL
        uses: 40ants/setup-lisp@v4
      - name: Check Common Lisp syntax
        run: >-
          xargs -0 -P "$(nproc)" -I{} ros run
          --eval '(sb-ext:disable-debugger)'
          --load {}
          --quit
          < /tmp/files-to-lint

  lint-scala:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.scala' -print0 > /tmp/files-to-lint
      - name: Install scala-cli
        uses: VirtusLab/scala-cli-setup@v1
      # Compile every fixture in a single scala-cli invocation to pay
      # the Scala compile + Bloop daemon startup cost once instead of
      # per fixture. Each fixture already carries a unique object name
      # derived from its case directory and stem, so a plain copy
      # suffices; no sed rewriting needed.
      - name: Run Scala files
        run: |-
          workspace=$(mktemp -d)
          main="$workspace/Main.scala"
          printf '@main def __run(): Unit = {\n' > "$main"
          while IFS= read -r -d '' f; do
            dir=$(basename "$(dirname "$f")")
            stem=$(basename "$f" .scala)
            name="Fixture_${dir}_${stem}"
            cp "$f" "$workspace/${name}.scala"
            printf '%s.scala <- %s\n' "$name" "$f"
            printf '  val _%s = %s\n' "$name" "$name" >> "$main"
          done < /tmp/files-to-lint
          printf '}\n' >> "$main"
          scala-cli run "$workspace" --main-class __run

  lint-dart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.dart' -print0 > /tmp/files-to-lint
      - name: Install Dart
        uses: dart-lang/setup-dart@v1
      # Each fixture is its own implicit Dart library (no `library`
      # or `part` directives), so copying them all into one package
      # and analyzing in a single `dart analyze` invocation pays the
      # Dart VM startup cost once instead of per fixture. Fixtures are
      # renamed to `fixture_N.dart` because several fixtures share a
      # basename (e.g. `Dart.dart`); the mapping is printed so failures
      # still point back to the original path.
      #
      # Fixtures only declare a top-level `final my_data = ...`, and
      # Dart initializes top-level `final` lazily — `dart run` on a
      # bare fixture would never evaluate its initializer. Generate a
      # `main.dart` driver that imports every fixture and references
      # each `my_data`, so one `dart run` forces all initializers to
      # execute and surfaces runtime errors (e.g. a bad
      # `DateTime.parse` argument). Paying Dart VM startup once across
      # all fixtures keeps this step cheap.
      - name: Check Dart syntax and run fixtures
        run: |-
          tmpdir=$(mktemp -d)
          printf 'name: check\nenvironment:\n  sdk: ^3.0.0\n' > "$tmpdir/pubspec.yaml"
          driver="$tmpdir/main.dart"
          : > "$driver"
          i=0
          while IFS= read -r -d '' f; do
            cp "$f" "$tmpdir/fixture_$i.dart"
            printf 'import "fixture_%d.dart" as f%d;\n' "$i" "$i" >> "$driver"
            printf 'fixture_%s.dart <- %s\n' "$i" "$f"
            i=$((i+1))
          done < /tmp/files-to-lint
          {
            printf 'void main() {\n'
            printf '  final sink = <Object?>[\n'
            for ((j=0; j<i; j++)); do
              printf '    f%d.my_data,\n' "$j"
            done
            printf '  ];\n'
            printf "  if (sink.isEmpty) throw StateError('unreachable');\n"
            printf '}\n'
          } >> "$driver"
          dart analyze --fatal-infos "$tmpdir"
          (cd "$tmpdir" && dart run main.dart)

  lint-julia:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.jl' -print0 > /tmp/files-to-lint
      - name: Install Julia
        uses: julia-actions/setup-julia@v3
      - name: Set up Julia project
        run: |
          mkdir -p /tmp/julia-lint
          julia --startup-file=no --project=/tmp/julia-lint -e \
            'using Pkg; Pkg.add("DataStructures"); Pkg.precompile()'
      - name: Run Julia golden files
        run: xargs -0 -P "$(nproc)" -n1 julia --startup-file=no --project=/tmp/julia-lint
          < /tmp/files-to-lint

  lint-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.go' -print0 > /tmp/files-to-lint
      - name: Check Go syntax
        run: xargs -0 gofmt -e < /tmp/files-to-lint
      - name: Check Go compilation
        run: xargs -0 -P "$(nproc)" -n1 go vet < /tmp/files-to-lint
      - name: Run Go files
        run: xargs -0 -P "$(nproc)" -n1 go run < /tmp/files-to-lint

  lint-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.rs' -print0 > /tmp/files-to-lint
      - name: Check Rust syntax and run binaries
        run: |-
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          cargo init "$tmpdir/chrono-check"
          cargo add --manifest-path "$tmpdir/chrono-check/Cargo.toml" chrono
          cargo build --manifest-path "$tmpdir/chrono-check/Cargo.toml"
          deps="$tmpdir/chrono-check/target/debug/deps"
          chrono_rlib=$(find "$deps" -name "libchrono-*.rlib" -print -quit)
          while IFS= read -r -d '' f; do
            rustc --edition 2021 \
              -L "dependency=$deps" \
              --extern "chrono=$chrono_rlib" \
              "$f" -o "$tmpdir/out" 2>&1 || exit 1
            "$tmpdir/out" || exit 1
          done < /tmp/files-to-lint

  lint-r:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.R' -print0 > /tmp/files-to-lint
      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          windows-path-include-rtools: false
      - name: Check R syntax
        run: xargs -0 Rscript -e 'for (f in commandArgs(trailingOnly=TRUE)) parse(file=f)'
          < /tmp/files-to-lint
      - name: Run R files
        run: xargs -0 -P "$(nproc)" -n1 Rscript < /tmp/files-to-lint

  lint-d:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.d' -print0 > /tmp/files-to-lint
      - name: Install DMD
        uses: dlang-community/setup-dlang@v2
        with:
          compiler: dmd-latest
      - name: Check D syntax
        run: xargs -0 -P "$(nproc)" -n1 dmd -o- -c < /tmp/files-to-lint
      # Each fixture defines its own main, so compile and run directly.
      # Each invocation gets a private tmpdir so parallel builds don't
      # clobber each other's intermediate object files or output binary.
      - name: Run D files
        run: |-
          cat > /tmp/run-d.sh <<'SCRIPT'
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          cp "$1" "$tmpdir/check.d"
          dmd -of="$tmpdir/run" -od="$tmpdir" "$tmpdir/check.d" || exit 1
          "$tmpdir/run" || exit 1
          SCRIPT
          xargs -0 -P "$(nproc)" -n1 bash /tmp/run-d.sh < /tmp/files-to-lint

  lint-crystal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.cr' -print0 > /tmp/files-to-lint
      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: 1.20.0
      # Compile every fixture in a single `crystal run` invocation to
      # pay Crystal's front-end + LLVM codegen + link cost once instead
      # of per fixture. Each fixture already carries a unique module name
      # derived from its case directory and stem, so a plain copy
      # suffices; no shell wrapping or sed rewriting needed. The driver
      # `require`s every fixture so each module body executes at program
      # start. The `name.cr <- original-path` mapping is printed so
      # failures still point back to the source.
      - name: Run Crystal files
        run: |-
          workspace=$(mktemp -d)
          driver="$workspace/run_all.cr"
          : > "$driver"
          while IFS= read -r -d '' f; do
            dir=$(basename "$(dirname "$f")")
            stem=$(basename "$f" .cr)
            name="Fixture_${dir}_${stem}"
            cp "$f" "$workspace/${name}.cr"
            printf 'require "./%s"\n' "$name" >> "$driver"
            printf '%s.cr <- %s\n' "$name" "$f"
          done < /tmp/files-to-lint
          crystal run "$driver"

  # Mojo reserves ~3.6 GB of virtual address space per invocation
  # (upstream: modular/modular#6433), so ubuntu-latest's 7 GB runner
  # crashes in libKGENCompilerRTShared.so before producing any output —
  # and even with overcommit + swap workarounds it could only run
  # serially. Ubicloud's 16 GB runner comfortably fits `$(nproc)`
  # parallel invocations without the workarounds.
  lint-mojo:
    runs-on: ubicloud-standard-4
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.mojo' -not -name '*_ref.mojo' -print0
          > /tmp/files-to-lint
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      - name: Install Mojo
        run: uv tool install mojo-compiler
      - name: Check Mojo syntax
        run: xargs -0 -P "$(nproc)" -n1 mojo run --Werror < /tmp/files-to-lint

  lint-nim:
    runs-on: ubuntu-latest
    # Promote every Nim warning to a CI failure. Nim's
    # ``--warningAsError`` rejects ``all:on`` and bare ``on``, so list
    # each warning name explicitly. The catalogue comes from
    # ``nim check --warnings:list`` — revisit when Nim is upgraded in
    # case new warnings have been added. Shared across both the syntax
    # check and the run step via a job-level env var.
    env:
      NIM_WARNING_FLAGS: >-
        --warningAsError:AboveMaxSizeSet:on
        --warningAsError:AmbiguousLink:on
        --warningAsError:AnyEnumConv:on
        --warningAsError:BareExcept:on
        --warningAsError:BrokenLink:on
        --warningAsError:CStringConv:on
        --warningAsError:CannotOpen:on
        --warningAsError:CannotOpenFile:on
        --warningAsError:CaseTransition:on
        --warningAsError:CastSizes:on
        --warningAsError:CommentXIgnored:on
        --warningAsError:ConfigDeprecated:on
        --warningAsError:CycleCreated:on
        --warningAsError:Deprecated:on
        --warningAsError:Destructor:on
        --warningAsError:DotLikeOps:on
        --warningAsError:EachIdentIsTuple:on
        --warningAsError:Effect:on
        --warningAsError:EnumConv:on
        --warningAsError:FieldXNotSupported:on
        --warningAsError:FileChanged:on
        --warningAsError:GcMem:on
        --warningAsError:GcUnsafe:on
        --warningAsError:GcUnsafe2:on
        --warningAsError:GlobalVarConstructorTemporary:on
        --warningAsError:HoleEnumConv:on
        --warningAsError:IgnoredSymbolInjection:on
        --warningAsError:ImplicitDefaultValue:on
        --warningAsError:ImplicitRangeConversion:on
        --warningAsError:ImplicitTemplateRedefinition:on
        --warningAsError:IndexCheck:on
        --warningAsError:InheritFromException:on
        --warningAsError:LanguageXNotSupported:on
        --warningAsError:LockLevel:on
        --warningAsError:LongLiterals:on
        --warningAsError:ObservableStores:on
        --warningAsError:OctalEscape:on
        --warningAsError:ProveField:on
        --warningAsError:ProveIndex:on
        --warningAsError:ProveInit:on
        --warningAsError:PtrToCstringConv:on
        --warningAsError:RedefinitionOfLabel:on
        --warningAsError:ResultShadowed:on
        --warningAsError:ResultUsed:on
        --warningAsError:SmallLshouldNotBeUsed:on
        --warningAsError:Spacing:on
        --warningAsError:StdPrefix:on
        --warningAsError:StmtListLambda:on
        --warningAsError:StrictNotNil:on
        --warningAsError:TypelessParam:on
        --warningAsError:Uninit:on
        --warningAsError:UnknownMagic:on
        --warningAsError:UnknownNotes:on
        --warningAsError:UnknownSubstitutionX:on
        --warningAsError:UnnamedBreak:on
        --warningAsError:UnreachableCode:on
        --warningAsError:UnreachableElse:on
        --warningAsError:UnsafeCode:on
        --warningAsError:UnsafeDefault:on
        --warningAsError:UnsafeSetLen:on
        --warningAsError:UnusedImport:on
        --warningAsError:UnusedImportdoc:on
        --warningAsError:UseBase:on
        --warningAsError:User:on
        --warningAsError:WriteToForeignHeap:on
        --warningAsError:XIsNeverRead:on
        --warningAsError:XmightNotBeenInit:on
        --warningAsError:warnRstStyle:on
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.nim' -print0 > /tmp/files-to-lint
      - name: Install Nim
        uses: jiro4989/setup-nim-action@v2
      - name: Run Nim files
        run: |-
          cat > /tmp/run-nim.sh <<'SCRIPT'
          read -r -a warning_flags <<< "$NIM_WARNING_FLAGS"
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          nim c -r --hints:off "${warning_flags[@]}" \
            --nimcache:"$tmpdir" "$1"
          SCRIPT
          xargs -0 -P "$(nproc)" -n1 bash /tmp/run-nim.sh < /tmp/files-to-lint

  lint-racket:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.rkt' -print0 > /tmp/files-to-lint
      - uses: Bogdanp/setup-racket@v1.15
      - name: Check Racket syntax
        run: xargs -0 raco make < /tmp/files-to-lint
      - name: Run Racket files
        run: xargs -0 -P "$(nproc)" -n1 racket < /tmp/files-to-lint

  lint-raku:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.raku' -print0 > /tmp/files-to-lint
      - name: Install Raku
        uses: Raku/setup-raku@v1
      - name: Check Raku syntax
        run: xargs -0 -P "$(nproc)" -n1 raku -c < /tmp/files-to-lint
      - name: Run Raku files
        run: xargs -0 -P "$(nproc)" -n1 raku < /tmp/files-to-lint

  lint-zig:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.zig' -print0 > /tmp/files-to-lint
      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.0
      # Compile every fixture in a single `zig run` invocation to pay
      # the Zig compiler + std parse cost once instead of per fixture.
      # Fixtures all declare `pub fn main() void`, renamed to a unique
      # `pub fn fixtureN()` and `@import`-ed from a generated driver
      # that calls each one so every fixture body still executes. The
      # mapping is printed so failures still point back to the original
      # path.
      - name: Run Zig files
        run: |-
          workspace=$(mktemp -d)
          driver="$workspace/main.zig"
          imports="$workspace/imports.zig.part"
          calls="$workspace/calls.zig.part"
          : > "$imports"
          : > "$calls"
          i=0
          while IFS= read -r -d '' f; do
            sed "s/^pub fn main(/pub fn fixture$i(/" "$f" \
              > "$workspace/fixture_$i.zig"
            printf 'const fix%d = @import("fixture_%d.zig");\n' "$i" "$i" >> "$imports"
            printf '    fix%d.fixture%d();\n' "$i" "$i" >> "$calls"
            printf 'fixture_%d.zig <- %s\n' "$i" "$f"
            i=$((i+1))
          done < /tmp/files-to-lint
          {
            cat "$imports"
            printf 'pub fn main() void {\n'
            cat "$calls"
            printf '}\n'
          } > "$driver"
          zig run "$driver"

  lint-systemverilog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.sv' -print0 > /tmp/files-to-lint
      - name: Install Verilator
        uses: veryl-lang/setup-verilator@v2
      - name: Check SystemVerilog syntax
        run: xargs -0 -P "$(nproc)" -n1 verilator --lint-only --language 1800-2017
          -Wno-REALCVT < /tmp/files-to-lint

  lint-v:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name '*.v' -print0 > /tmp/files-to-lint
      - name: Install V
        run: |
          git clone --depth=1 https://github.com/vlang/v /tmp/vlang
          cd /tmp/vlang && make
          sudo ln -s /tmp/vlang/v /usr/local/bin/v
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      - name: Check V syntax
        run: xargs -0 -P "$(nproc)" -n1 uv run --no-project python .github/scripts/check_v_syntax.py
          < /tmp/files-to-lint
      - name: Run V files
        run: |
          grep -z -v 'heterogeneous_strategy_error' /tmp/files-to-lint > /tmp/files-to-run || true
          xargs -0 -P "$(nproc)" -n1 v run < /tmp/files-to-run

  lint-objectivec:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name 'ObjectiveC*.m' -not -name 'ObjectiveC*_ref.m'
          -print0 > /tmp/files-to-lint
      # Every fixture `#import`s `<Foundation/Foundation.h>`, whose parse
      # cost dominates each tiny TU. Precompile Foundation once and
      # preload it in the syntax-check and build-and-run steps so the
      # parsed AST is reused instead of re-parsed per fixture. clang-tidy
      # runs in a separate job (`lint-objectivec-tidy`) and deliberately
      # skips the PCH — see the note on `lint-cpp-tidy`.
      - name: Build precompiled header
        run: clang -x objective-c-header .github/scripts/lint-objc-pch.h -o /tmp/pch.h.pch
      - name: Check Objective-C syntax
        run: xargs -0 -P "$(sysctl -n hw.ncpu)" -n1 clang -fsyntax-only -Werror -include-pch
          /tmp/pch.h.pch < /tmp/files-to-lint
      # Each fixture defines its own main, so compile and run directly.
      # Link against Foundation and execute to surface runtime errors.
      # Each invocation gets a private tmpdir so parallel builds don't
      # clobber each other's output binary.
      - name: Run Objective-C files
        run: |-
          cat > /tmp/run-objc.sh <<'SCRIPT'
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          clang -framework Foundation -Werror -include-pch /tmp/pch.h.pch "$1" \
            -o "$tmpdir/out" || exit 1
          "$tmpdir/out" || exit 1
          SCRIPT
          xargs -0 -P "$(sysctl -n hw.ncpu)" -n1 bash /tmp/run-objc.sh < /tmp/files-to-lint

  lint-objectivec-tidy:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Find files to lint
        shell: bash
        run: find tests/integration/cases -name 'ObjectiveC*.m' -not -name 'ObjectiveC*_ref.m'
          -print0 > /tmp/files-to-lint
      # macos-15-arm64 ships Apple's clang but no clang-tidy, so pull it
      # from Homebrew's llvm formula. The PyPI clang-tidy (used in the
      # Ubuntu jobs) doesn't work here: it can't find Apple's Foundation
      # framework headers and mis-parses Objective-C literal initializers.
      # This job is split from the syntax and build-and-run job
      # (`lint-objectivec`) so the Homebrew install runs in parallel with
      # the Apple-clang compile steps instead of serializing after them —
      # Homebrew's llvm would otherwise prepend itself to `PATH` and
      # shadow the Apple clang that the PCH was built against.
      - name: Install clang-tidy
        run: |-
          brew install --quiet llvm
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"
      - name: Run clang-tidy
        run: xargs -0 -P "$(sysctl -n hw.ncpu)" -n1 clang-tidy < /tmp/files-to-lint

  completion-lint:
    needs:
      - pre-commit
      - lint-fast
      - lint-odin
      - lint-apt-basics
      - lint-go-installed
      - lint-npm-installed
      - lint-uv-scripts
      - lint-dotnet
      - lint-curl-tarballs
      - lint-beam
      - lint-jvm-mini
      - lint-haskell-family
      - lint-c-tidy
      - lint-cpp-tidy
      - lint-c
      - lint-cobol
      - lint-cpp
      - lint-kotlin
      - lint-swift
      - lint-ocaml
      - lint-commonlisp
      - lint-scala
      - lint-dart
      - lint-go
      - lint-julia
      - lint-r
      - lint-d
      - lint-crystal
      - lint-mojo
      - lint-nim
      - lint-racket
      - lint-raku
      - lint-rust
      - lint-zig
      - lint-systemverilog
      - lint-v
      - lint-objectivec
      - lint-objectivec-tidy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |-
          if ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}; then
            echo "One or more jobs failed or were cancelled"
            exit 1
          fi
