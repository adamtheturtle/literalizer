---
name: Lint Mojo

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-mojo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: tj-actions/changed-files@v47
        id: changes
        with:
          files_yaml: |
            config:
              - '**/*.yml'
            lang:
              - 'tests/integration/cases/**/*.mojo'
      - name: Find files to lint
        id: files
        if: github.event_name != 'pull_request' || steps.changes.outputs.config_any_changed
          == 'true' || steps.changes.outputs.lang_any_modified == 'true'
        env:
          CONFIG_CHANGED: ${{ steps.changes.outputs.config_any_changed }}
          LANG_FILES: ${{ steps.changes.outputs.lang_all_modified_files }}
        run: |-
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "$CONFIG_CHANGED" != "true" ]; then
            # shellcheck disable=SC2086
            printf '%s\0' $LANG_FILES
          else
            find tests/integration/cases -name "*.mojo" -print0
          fi > /tmp/files-to-lint
          if [ -s /tmp/files-to-lint ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Install pixi
        if: steps.files.outputs.found == 'true'
        uses: fabasoad/setup-mojo-action@v3
      - name: Install Mojo
        if: steps.files.outputs.found == 'true'
        run: |-
          pixi global install --channel conda-forge --channel https://conda.modular.com/max mojo
      # The Mojo runtime has a known bug where it randomly crashes
      # with "mojo: error: execution crashed" (see #558).
      # This is not caused by our code. Retry each file individually
      # so that a crash on one file does not block the rest.
      - name: Check Mojo syntax
        if: steps.files.outputs.found == 'true'
        run: |-
          failed=0
          while IFS= read -r -d '' f; do
            ok=0
            for attempt in 1 2 3; do
              if mojo run --Werror "$f"; then
                ok=1
                break
              fi
              echo "::warning::Attempt $attempt failed for $f, retrying..."
              sleep 2
            done
            if [ "$ok" -eq 0 ]; then
              echo "::error::Failed after 3 attempts: $f"
              failed=1
            fi
          done < /tmp/files-to-lint
          exit "$failed"
