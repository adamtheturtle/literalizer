---
name: Lint Mojo

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-mojo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install pixi
        uses: fabasoad/setup-mojo-action@v3
      - name: Install Mojo
        run: |-
          pixi global install --channel conda-forge --channel https://conda.modular.com/max mojo
      - name: Check declarations use var keyword
        run: |-
          missing=$(grep -rL '\bvar\b' --include='*_varname.mojo' --include='*_combined.mojo' \
            tests/integration/cases || true)
          if [ -n "$missing" ]; then
            printf "ERROR: missing 'var' keyword in:\n%s\n" "$missing" >&2
            exit 1
          fi
      - name: Check Mojo syntax
        run: |-
          set -o pipefail
          find tests/integration/cases -name "*.mojo" -print0 | \
            while IFS= read -r -d '' f; do
              if ! output=$(mojo run "$f" 2>&1); then
                if ! printf "%s" "$output" | grep -qE \
                  "no matching function|is not compatible|cannot emit an empty"; then
                  printf "%s\n" "$output" >&2
                  exit 1
                fi
              fi
            done
