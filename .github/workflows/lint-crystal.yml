---
name: Lint Crystal

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-crystal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.cr
          exclude_dirs: |
            tests/integration/cases/comment_scalar
            tests/integration/cases/comment_scalar_document_markers
            tests/integration/cases/comment_scalar_only_comments
      - name: Install Crystal
        if: steps.find-files.outputs.found == 'true'
        uses: crystal-lang/install-crystal@v1
      - name: Check Crystal syntax
        if: steps.find-files.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            crystal build --no-codegen "$f" || exit 1
          done < /tmp/files-to-lint
