---
name: Lint Ada

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-ada:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |-
            relevant:
              - 'tests/integration/cases/**'
              - '**/*.yml'
              - '**/*.toml'
              - 'check_ada_golden_syntax.py'
      - name: Install GNAT
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant
          == 'true'
        run: sudo apt-get install -y gnat
      - name: Install uv
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant
          == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      - name: Check Ada syntax
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant
          == 'true'
        run: >-
          find tests/integration/cases -name "*.adb" -print0 |
          xargs -0 uv run python check_ada_golden_syntax.py
