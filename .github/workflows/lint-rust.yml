---
name: Lint Rust

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Check Rust syntax
        run: |-
          set -o pipefail
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          cargo init "$tmpdir/deps"
          cargo add --manifest-path "$tmpdir/deps/Cargo.toml" chrono
          cargo build --manifest-path "$tmpdir/deps/Cargo.toml"
          deps="$tmpdir/deps/target/debug/deps"
          chrono_rlib=$(find "$deps" -name "libchrono-*.rlib" -print -quit)
          find tests/integration/cases -name "*.rs" -print0 | \
            while IFS= read -r -d '' f; do
              rustc --edition 2021 \
                -L "dependency=$deps" \
                --extern "chrono=$chrono_rlib" \
                "$f" -o "$tmpdir/out" 2>&1 || exit 1
            done
