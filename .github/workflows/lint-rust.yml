---
name: Lint Rust

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Check for relevant changes
        id: changes
        env:
          BASE_REF: ${{ github.base_ref }}
          EVENT_NAME: ${{ github.event_name }}
        run: |-
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "should-lint=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changes=$(git diff --name-only "origin/${BASE_REF}...HEAD")
          if echo "$changes" | grep -qE '(^tests/integration/cases/|\.yml$|\.toml$)'; then
            echo "should-lint=true" >> "$GITHUB_OUTPUT"
          else
            echo "should-lint=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Check Rust syntax
        if: steps.changes.outputs.should-lint == 'true'
        run: |-
          set -o pipefail
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          cargo init "$tmpdir/chrono-check"
          cargo add --manifest-path "$tmpdir/chrono-check/Cargo.toml" chrono
          cargo build --manifest-path "$tmpdir/chrono-check/Cargo.toml"
          deps="$tmpdir/chrono-check/target/debug/deps"
          chrono_rlib=$(find "$deps" -name "libchrono-*.rlib" -print -quit)
          find tests/integration/cases -name "*.rs" -print0 | \
            while IFS= read -r -d '' f; do
              rustc --edition 2021 \
                -L "dependency=$deps" \
                --extern "chrono=$chrono_rlib" \
                "$f" -o "$tmpdir/out" 2>&1 || exit 1
            done
