---
name: Lint Rust

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: tj-actions/changed-files@v47
        id: changes
        with:
          files_yaml: |
            config:
              - '**/*.yml'
            lang:
              - 'tests/integration/cases/**/*.rs'
      - name: Find files to lint
        id: files
        if: github.event_name != 'pull_request' || steps.changes.outputs.config_any_changed
          == 'true' || steps.changes.outputs.lang_any_modified == 'true'
        env:
          CONFIG_CHANGED: ${{ steps.changes.outputs.config_any_changed }}
          LANG_FILES: ${{ steps.changes.outputs.lang_all_modified_files }}
        run: |-
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "$CONFIG_CHANGED" != "true" ]; then
            # shellcheck disable=SC2086
            printf '%s\0' $LANG_FILES
          else
            find tests/integration/cases -name "*.rs" -print0
          fi > /tmp/files-to-lint
          if [ -s /tmp/files-to-lint ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Check Rust syntax
        if: steps.files.outputs.found == 'true'
        run: |-
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          cargo init "$tmpdir/chrono-check"
          cargo add --manifest-path "$tmpdir/chrono-check/Cargo.toml" chrono
          cargo build --manifest-path "$tmpdir/chrono-check/Cargo.toml"
          deps="$tmpdir/chrono-check/target/debug/deps"
          chrono_rlib=$(find "$deps" -name "libchrono-*.rlib" -print -quit)
          while IFS= read -r -d '' f; do
            rustc --edition 2021 \
              -L "dependency=$deps" \
              --extern "chrono=$chrono_rlib" \
              "$f" -o "$tmpdir/out" 2>&1 || exit 1
          done < /tmp/files-to-lint
