---
name: Lint Groovy

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-groovy:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/lint-lang
        id: lint-lang
        with:
          lang_patterns: tests/integration/cases/**/*.groovy
      - name: Install Groovy
        if: steps.lint-lang.outputs.found == 'true'
        uses: wtfjoke/setup-groovy@v3
        with:
          groovy-version: 4.x
      - name: Check Groovy syntax
        if: steps.lint-lang.outputs.found == 'true'
        run: |-
          while IFS= read -r -d '' f; do
            tmpdir=$(mktemp -d)
            groovyc -d "$tmpdir" "$(realpath "$f")" || exit 1
          done < /tmp/files-to-lint
