---
name: Lint C#

on:
  workflow_call: {}

permissions: {}

jobs:
  lint-csharp:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/find-lint-files
        id: find-files
        with:
          lang_patterns: tests/integration/cases/**/*.cs
          extra_config_patterns: check_csharp_golden_syntax.py
          find_command: find tests/integration/cases -name "*.cs" -print0
      - name: Initialize .NET runtime
        if: steps.find-files.outputs.found == 'true'
        run: |
          mkdir -p /tmp/.dotnet/shm
          dotnet --info
      - name: Install uv
        if: steps.find-files.outputs.found == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'
      - name: Check C# syntax
        if: steps.find-files.outputs.found == 'true'
        run: xargs -0 uv run --no-project python check_csharp_golden_syntax.py < /tmp/files-to-lint
