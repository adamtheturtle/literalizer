name = "check"
version = "1.0.0"
target = "erlang"

[dependencies]
gleam_stdlib = ">= 0.44.0 and < 2.0.0"
# `gleam_json` is only used by the round-trip helper
# (`.github/scripts/run_gleam_roundtrip.py`), but it lives in the
# shared primed project so the round-trip step can reuse the existing
# `LINT_GLEAM_PRIMED_DIR` rather than priming a second project.
gleam_json = ">= 1.0.0 and < 4.0.0"
