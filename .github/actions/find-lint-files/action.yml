---
name: Find lint files
description: >-
  Detect changed files and produce a null-delimited list at
  /tmp/files-to-lint. The repo must already be checked out.

inputs:
  lang_patterns:
    description: >-
      Newline-separated glob patterns for language files
      (used for change detection by tj-actions/changed-files).
    required: true
  extra_config_patterns:
    description: >-
      Newline-separated glob patterns for extra config files
      beyond '**/*.yml' (used for change detection).
    required: false
    default: ''
  exclude_patterns:
    description: >-
      Newline-separated filename patterns to exclude from the
      find command (e.g. "input.yaml"). Used on non-PR events
      or when config files changed.
    required: false
    default: ''

outputs:
  found:
    description: Whether any files to lint were found
    value: ${{ steps.files.outputs.found }}

runs:
  using: composite
  steps:
    - id: build-yaml
      shell: bash
      run: |-
        {
          echo "config:"
          echo "  - '**/*.yml'"
          if [ -n "$EXTRA_CONFIG" ]; then
            while IFS= read -r pattern; do
              [ -n "$pattern" ] && echo "  - '$pattern'"
            done <<< "$EXTRA_CONFIG"
          fi
          echo "lang:"
          while IFS= read -r pattern; do
            [ -n "$pattern" ] && echo "  - '$pattern'"
          done <<< "$LANG_PATTERNS"
        } > /tmp/files-yaml-config.yml
        {
          echo "yaml<<ENDOFYAML"
          cat /tmp/files-yaml-config.yml
          echo "ENDOFYAML"
        } >> "$GITHUB_OUTPUT"
      env:
        EXTRA_CONFIG: ${{ inputs.extra_config_patterns }}
        LANG_PATTERNS: ${{ inputs.lang_patterns }}
    - uses: tj-actions/changed-files@v47
      id: changes
      with:
        files_yaml: ${{ steps.build-yaml.outputs.yaml }}
    - name: Find files to lint
      id: files
      if: github.event_name != 'pull_request' || steps.changes.outputs.config_any_changed
        == 'true' || steps.changes.outputs.lang_any_modified == 'true'
      shell: bash
      env:
        CONFIG_CHANGED: ${{ steps.changes.outputs.config_any_changed }}
        LANG_FILES: ${{ steps.changes.outputs.lang_all_modified_files }}
        LANG_PATTERNS: ${{ inputs.lang_patterns }}
        EXCLUDE_PATTERNS: ${{ inputs.exclude_patterns }}
      run: |-
        if [ "${{ github.event_name }}" = "pull_request" ] && [ "$CONFIG_CHANGED" != "true" ]; then
          # shellcheck disable=SC2086
          for f in $LANG_FILES; do [ -f "$f" ] && printf '%s\0' "$f"; done
        else
          # Build a find command from lang_patterns and exclude_patterns.
          # Each lang_pattern is a glob like "dir/**/*.ext"; extract the
          # search directory from the first pattern and collect -name args
          # from all of them.
          first_dir=""
          name_args=()
          while IFS= read -r pattern; do
            [ -z "$pattern" ] && continue
            # Skip negation patterns (handled by exclude_patterns)
            [[ "$pattern" == !* ]] && continue
            dir="${pattern%%/\*\*/*}"
            name_part="${pattern##*/}"
            if [ -z "$first_dir" ]; then
              first_dir="$dir"
            fi
            if [ ${#name_args[@]} -gt 0 ]; then
              name_args+=("-o")
            fi
            name_args+=("-name" "$name_part")
          done <<< "$LANG_PATTERNS"

          exclude_args=()
          if [ -n "$EXCLUDE_PATTERNS" ]; then
            while IFS= read -r pattern; do
              [ -z "$pattern" ] && continue
              exclude_args+=("!" "-name" "$pattern")
            done <<< "$EXCLUDE_PATTERNS"
          fi

          if [ ${#name_args[@]} -gt 2 ]; then
            find "$first_dir" \( "${name_args[@]}" \) "${exclude_args[@]}" -print0
          else
            find "$first_dir" "${name_args[@]}" "${exclude_args[@]}" -print0
          fi
        fi > /tmp/files-to-lint
        if [ -s /tmp/files-to-lint ]; then
          echo "found=true" >> "$GITHUB_OUTPUT"
        fi
